# ============================================================================
# EXAMPLE: SCA with License Compliance
# ============================================================================
# Fail on specific license types
# ============================================================================

# - task: Bash@3
#   displayName: 'SCA Scan with License Check'
#   inputs:
#     targetType: 'inline'
#     script: |
#       ./ci.sh scan \
#         --app $(APP_NAME) \
#         --allow-dirty \
#         --no-upload
#
#       # Parse results for license violations
#       # Custom script to check licenses
#       python check_licenses.py sca-results.json
#   env:
#     SRCCLR_API_TOKEN: $(SRCCLR_API_TOKEN)

# ============================================================================
# CONFIGURATION OPTIONS
# ============================================================================
#
# SCA Agent Parameters:
# --app: Application name in Veracode Platform
# --allow-dirty: Allow uncommitted changes
# --maven: Scan Maven projects
# --gradle: Scan Gradle projects
# --npm: Scan npm projects
# --yarn: Scan Yarn projects
# --pnpm: Scan pnpm projects
# --pip: Scan Python pip projects
# --pipenv: Scan Python pipenv projects
# --poetry: Scan Python poetry projects
# --go: Scan Go modules
# --ruby: Scan Ruby gems
# --nuget: Scan .NET NuGet packages
# --no-upload: Scan without uploading to platform
# --recursive: Scan subdirectories
# --url: Veracode Platform URL
# --threshold-cvss: Minimum CVSS score to fail (0.0-10.0)
# --threshold-cve-severity: Minimum severity (low, medium, high, critical)
# --json: Output results in JSON format
#
# Environment Variables:
# - SRCCLR_API_TOKEN: SCA Agent API token (required)
# - SRCCLR_SCM_URI: Source control repository URL
# - SRCCLR_SCM_REF: Git reference (branch/tag)
# - SRCCLR_SCM_REF_TYPE: Reference type (branch, tag, commit)
# - SRCCLR_SCM_REV: Git commit SHA
#
# Supported Package Managers:
# - Maven (pom.xml)
# - Gradle (build.gradle, build.gradle.kts)
# - npm (package.json, package-lock.json)
# - Yarn (yarn.lock)
# - pnpm (pnpm-lock.yaml)
# - pip (requirements.txt, Pipfile)
# - Poetry (poetry.lock)
# - Composer (composer.json, composer.lock)
# - Go Modules (go.mod)
# - NuGet (packages.config, *.csproj)
# - Bundler (Gemfile, Gemfile.lock)
# - CocoaPods (Podfile, Podfile.lock)
#
# Severity Levels:
# - Critical: CVSS 9.0-10.0
# - High: CVSS 7.0-8.9
# - Medium: CVSS 4.0-6.9
# - Low: CVSS 0.1-3.9
#
# ============================================================================

# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# Common Issues:
#
# 1. Authentication Errors:
#    Problem: "401 Unauthorized" or "Authentication failed"
#    Solution:
#    - Verify SRCCLR_API_TOKEN is set correctly in pipeline variables
#    - Token must be from: Platform → SCA → Agent-Based Scan → Create Agent
#    - Ensure token is marked as "secret" (locked) in Azure DevOps variables
#    - Tokens don't expire, but can be regenerated (which invalidates old token)
#    - If token was regenerated, update pipeline variable with new value
#    - Check you have required permissions (Security Lead or Workspace Editor/Admin)
#    - For regional deployments, ensure SRCCLR_REGION is set (ER or FED)
#
# 2. No Dependencies Found:
#    - Ensure dependency manifest files exist (pom.xml, package.json, etc.)
#    - Verify you're in the correct directory
#    - Check package manager is installed (if needed)
#    - Use specific scan type flag (--maven, --npm, etc.)
#
# 3. Build Failures:
#    - Set continueOnError: true to not fail build on vulnerabilities
#    - Adjust threshold-cvss or threshold-cve-severity
#    - Review vulnerabilities in Veracode Platform
#    - Consider using --allow-dirty for uncommitted changes
#
# 4. Transitive Dependencies Not Scanned:
#    - Ensure lock files exist (package-lock.json, yarn.lock, etc.)
#    - Run package manager install/update before scan
#    - Use --recursive for monorepos
#
# 5. Slow Scans:
#    - SCA is typically fast (minutes)
#    - Network issues may slow download of vulnerability data
#    - Large dependency trees take longer
#    - Consider caching dependencies
#
# 6. Private Dependencies:
#    - Configure package manager authentication before scan
#    - Set up .npmrc, settings.xml, etc.
#    - Ensure credentials are available to agent
#
# 7. License Compliance:
#    - Review licenses in Veracode Platform
#    - Use custom scripts to parse JSON output
#    - Define acceptable licenses in your organization
#
# For more help: https://docs.veracode.com/r/Agent_Based_Scans
# ============================================================================

</script>

<script type="text/yaml" id="card21">
# URL: https://github.com/enzo-appsec/veracode-ci-cd-templates/blob/main/bitbucket/cli-examples.yml
# ============================================================================
# Veracode CLI Examples - Bitbucket Pipelines
# ============================================================================
# Various Veracode CLI operations for advanced scanning workflows.
#
# Documentation: https://docs.veracode.com/r/Veracode_CLI
# ============================================================================

image: alpine:latest

definitions:
  steps:
    - step: &cli-setup
        name: Install Veracode CLI
        script:
          - apk add --no-cache curl bash
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"
          - veracode --version
          - veracode whoami

    - step: &scan-status
        name: Check Scan Status
        script:
          - apk add --no-cache curl bash
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"
          - veracode static scan info --app "${BITBUCKET_REPO_SLUG}"

    - step: &download-results
        name: Download Scan Results
        script:
          - apk add --no-cache curl bash
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"
          - mkdir -p reports
          - veracode static scan results --app "${BITBUCKET_REPO_SLUG}" --format xml --output reports/detailed.xml
          - veracode static scan results --app "${BITBUCKET_REPO_SLUG}" --format json --output reports/summary.json
        artifacts:
          - reports/**

    - step: &generate-reports
        name: Generate Reports
        script:
          - apk add --no-cache curl bash
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"
          - mkdir -p reports
          - veracode static findings --app "${BITBUCKET_REPO_SLUG}" --format csv --output reports/findings.csv
          - veracode static policy --app "${BITBUCKET_REPO_SLUG}" --format json --output reports/policy.json
        artifacts:
          - reports/**

    - step: &list-apps
        name: List Applications
        script:
          - apk add --no-cache curl bash
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"
          - veracode static app list --format table
          - veracode static app info --app "${BITBUCKET_REPO_SLUG}"

    - step: &sandbox-ops
        name: Sandbox Operations
        script:
          - apk add --no-cache curl bash
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"
          - veracode static sandbox list --app "${BITBUCKET_REPO_SLUG}"

    - step: &check-policy
        name: Check Policy Compliance
        script:
          - apk add --no-cache curl bash jq
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"
          - veracode static policy --app "${BITBUCKET_REPO_SLUG}" --format json --output policy.json
          - COMPLIANCE=$(jq -r '.policy_compliance_status' policy.json)
          - echo "Policy - $COMPLIANCE"
          - test "$COMPLIANCE" = "Pass"

pipelines:
  custom:
    cli-setup:
      - step: *cli-setup

    scan-status:
      - step: *scan-status

    download-results:
      - step: *download-results

    generate-reports:
      - step: *generate-reports

    list-apps:
      - step: *list-apps

    sandbox-ops:
      - step: *sandbox-ops

    check-policy:
      - step: *check-policy

    all-operations:
      - step: *cli-setup
      - step: *scan-status
      - step: *download-results
      - step: *generate-reports
      - step: *check-policy

# ============================================================================
# CLI COMMAND REFERENCE - See Azure Pipelines template for full reference
# ============================================================================
</script>

<script type="text/yaml" id="card22">
# URL: https://github.com/enzo-appsec/veracode-ci-cd-templates/blob/main/bitbucket/packaging-examples.yml
# ============================================================================
# Veracode Packaging Examples - Bitbucket Pipelines
# ============================================================================
# This template demonstrates the Veracode CLI package command for automating
# application packaging before Static Analysis scans.
#
# The veracode package command:
# - Auto-detects build tools and dependencies
# - Compiles code into scannable artifacts
# - Packages into proper archive format
# - Validates artifact completeness
#
# Use Cases:
# - Upload and Scan (Policy Scan)
# - Pipeline Scan
# - NOT for SCA Agent-based Scan (use SCA Agent directly)
#
# Prerequisites:
# - Veracode API credentials in Bitbucket variables
# - Source code with build configuration
# - Build tools available in Docker images
#
# Documentation:
# - Package Command: https://docs.veracode.com/r/veracode_package
# - Autopackaging: https://docs.veracode.com/r/About_auto_packaging
# ============================================================================

image: alpine:latest

definitions:
  caches:
    maven: ~/.m2/repository
    npm: node_modules
    pip: ~/.cache/pip

  # ========================================================================
  # REUSABLE STEPS
  # ========================================================================

  steps:
    - step: &package-discover
        name: Discover Build Configuration
        script:
          - apk add --no-cache curl bash
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"

          - echo "Discovering build configuration..."

          # Run package discover (supports MSBuild and Maven)
          - |
            veracode package discover \
              --source . \
              --verbose

          # Show generated veracode.yml
          - |
            if [ -f veracode.yml ]; then
              echo "Generated veracode.yml:"
              cat veracode.yml
            else
              echo "No veracode.yml generated (not MSBuild or Maven project)"
            fi

        artifacts:
          - veracode.yml

    - step: &package-maven
        name: Package Java (Maven)
        image: maven:3.9-eclipse-temurin-17
        script:
          - echo "Installing Veracode CLI..."
          - apt-get update && apt-get install -y curl
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"

          - echo "Packaging Maven project..."
          - mkdir -p veracode-artifacts

          - |
            veracode package \
              --source . \
              --output veracode-artifacts \
              --trust \
              --verbose

          - echo "✓ Packaging complete"
          - ls -lh veracode-artifacts

        artifacts:
          - veracode-artifacts/**

        caches:
          - maven

    - step: &package-maven-custom
        name: Package Maven (Custom Config)
        image: maven:3.9-eclipse-temurin-17
        script:
          - apt-get update && apt-get install -y curl
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"

          - echo "Packaging with custom Maven command..."
          - mkdir -p veracode-artifacts

          # Set custom Maven arguments
          - export SRCCLR_CUSTOM_MAVEN_COMMAND="clean install -DskipTests -P production"
          - echo "Using: $SRCCLR_CUSTOM_MAVEN_COMMAND"

          - |
            veracode package \
              --source . \
              --output veracode-artifacts \
              --trust \
              --verbose

          - ls -lh veracode-artifacts

        artifacts:
          - veracode-artifacts/**

        caches:
          - maven

    - step: &package-dotnet
        name: Package .NET Application
        image: mcr.microsoft.com/dotnet/sdk:8.0
        script:
          - echo "Installing Veracode CLI..."
          - apt-get update && apt-get install -y curl bash
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"

          - echo "Discovering .NET projects..."
          - veracode package discover --source . --verbose

          - echo "Packaging .NET application..."
          - mkdir -p veracode-artifacts

          # Set build configuration
          - export SRCCLR_MSVC_CONFIGURATION=Release
          - export SRCCLR_MSVC_PLATFORM=x64

          - echo "Configuration: $SRCCLR_MSVC_CONFIGURATION"
          - echo "Platform: $SRCCLR_MSVC_PLATFORM"

          - |
            veracode package \
              --source . \
              --output veracode-artifacts \
              --trust \
              --verbose

          - ls -lh veracode-artifacts

        artifacts:
          - veracode-artifacts/**

    - step: &package-nodejs
        name: Package Node.js Application
        image: node:18-alpine
        script:
          - echo "Installing Veracode CLI..."
          - apk add --no-cache curl bash
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"

          - echo "Packaging Node.js application..."
          - mkdir -p veracode-artifacts

          - |
            veracode package \
              --source . \
              --output veracode-artifacts \
              --trust \
              --verbose

          - ls -lh veracode-artifacts

        artifacts:
          - veracode-artifacts/**

        caches:
          - npm

    - step: &package-python
        name: Package Python Application
        image: python:3.11-alpine
        script:
          - echo "Installing Veracode CLI..."
          - apk add --no-cache curl bash
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"

          - echo "Packaging Python application..."
          - echo "Note: Projects without package manager will generate 'no-pm' artifact"
          - mkdir -p veracode-artifacts

          - |
            veracode package \
              --source . \
              --output veracode-artifacts \
              --trust \
              --verbose

          - ls -lh veracode-artifacts

        artifacts:
          - veracode-artifacts/**

        caches:
          - pip

    - step: &package-go
        name: Package Go Application
        image: golang:1.21-alpine
        script:
          - echo "Installing Veracode CLI..."
          - apk add --no-cache curl bash git
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"

          - echo "Packaging Go application..."
          - mkdir -p veracode-artifacts

          # Enable CGO code generation if needed
          - export VERACODE_PACKAGE_GOLANG_GENERATE=true

          - echo "CGO generation: $VERACODE_PACKAGE_GOLANG_GENERATE"
          - echo "Note: Nested Go modules are excluded from packaging"

          - |
            veracode package \
              --source . \
              --output veracode-artifacts \
              --trust \
              --verbose

          - ls -lh veracode-artifacts

        artifacts:
          - veracode-artifacts/**

    - step: &package-repository
        name: Package from Git Repository
        script:
          - echo "Installing Veracode CLI..."
          - apk add --no-cache curl bash git
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"

          - echo "Packaging from GitHub repository..."
          - mkdir -p veracode-artifacts

          # Package from public repository
          - |
            veracode package \
              --source https://github.com/veracode/verademo \
              --type repo \
              --output veracode-artifacts \
              --trust \
              --verbose

          - echo "✓ Repository packaged successfully"
          - ls -lh veracode-artifacts

        artifacts:
          - veracode-artifacts/**

    - step: &package-and-upload
        name: Package + Upload to Veracode
        image: maven:3.9-eclipse-temurin-17
        script:
          - echo "Installing Veracode CLI..."
          - apt-get update && apt-get install -y curl
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"
          - veracode --version

          - echo "Step 1: Packaging application..."
          - mkdir -p veracode-artifacts

          - |
            veracode package \
              --source . \
              --output veracode-artifacts \
              --trust \
              --verbose \
              --strict

          - echo "✓ Packaging complete"
          - ls -lh veracode-artifacts

          - echo "Step 2: Uploading to Veracode for Policy Scan..."

          # Find the packaged artifact
          - ARTIFACT=$(find veracode-artifacts -name "*.zip" -o -name "*.jar" | head -1)

          - |
            if [ -z "$ARTIFACT" ]; then
              echo "❌ No artifact found in veracode-artifacts"
              exit 1
            fi

          - echo "Found artifact: $ARTIFACT"

          # Upload using veracode static scan
          - |
            veracode static scan \
              --source "$ARTIFACT" \
              --app "${BITBUCKET_REPO_SLUG}" \
              --create-app \
              --sandbox-name "Bitbucket-${BITBUCKET_BUILD_NUMBER}" \
              --results-file results.json

        artifacts:
          - veracode-artifacts/**
          - results.json

    - step: &package-and-pipeline-scan
        name: Package + Pipeline Scan
        image: maven:3.9-eclipse-temurin-17
        script:
          - apt-get update && apt-get install -y curl
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"

          - echo "Packaging application..."
          - mkdir -p veracode-artifacts

          - |
            veracode package \
              --source . \
              --output veracode-artifacts \
              --trust \
              --verbose

          - echo "Running Pipeline Scan..."

          - ARTIFACT=$(find veracode-artifacts -name "*.zip" -o -name "*.jar" | head -1)

          # Run Pipeline Scan for fast feedback
          - |
            veracode static pipeline-scan \
              --file "$ARTIFACT" \
              --fail-on-severity "Very High,High" \
              --json-output-file pipeline-results.json

        artifacts:
          - veracode-artifacts/**
          - pipeline-results.json

    - step: &debug-packaging
        name: Debug Packaging Issues
        script:
          - apk add --no-cache curl bash
          - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          - export PATH="$HOME/.veracode-cli:$PATH"

          - echo "Running package with verbose output and error handling..."
          - mkdir -p veracode-artifacts

          - set -e  # Exit on error

          - |
            veracode package \
              --source . \
              --output veracode-artifacts \
              --trust \
              --verbose \
              --strict || {
                EXIT_CODE=$?
                echo "❌ Packaging failed with exit code: $EXIT_CODE"

                if [ $EXIT_CODE -eq 4 ]; then
                  echo "Build failure detected (exit code 4)"
                fi

                exit $EXIT_CODE
              }

          - echo "✓ Packaging succeeded"

# ============================================================================
# PIPELINES
# ============================================================================

pipelines:
  # ========================================================================
  # CUSTOM PIPELINES
  # ========================================================================

  custom:
    # Discovery
    package-discover:
      - step: *package-discover

    # Language-specific packaging
    package-maven:
      - step: *package-maven

    package-maven-custom:
      - step: *package-maven-custom

    package-dotnet:
      - step: *package-dotnet

    package-nodejs:
      - step: *package-nodejs

    package-python:
      - step: *package-python

    package-go:
      - step: *package-go

    # Repository packaging
    package-repository:
      - step: *package-repository

    # Complete workflows
    package-and-upload:
      - step: *package-and-upload

    package-and-pipeline-scan:
      - step: *package-and-pipeline-scan

    # Troubleshooting
    debug-packaging:

    # ======================================================================

    # ======================================================================

<script type="text/yaml" id="card23">
# URL: https://github.com/enzo-appsec/veracode-ci-cd-templates/blob/main/bitbucket/pipeline-scan.yml
# ============================================================================
# Veracode Pipeline Scan (SAST) - Bitbucket Pipelines Template
# ============================================================================
# This template demonstrates how to integrate Veracode Pipeline Scan into
# your Bitbucket Pipelines for fast Static Application Security Testing.
#
# Pipeline Scan provides results in minutes (vs hours for Policy Scan) and is
# ideal for shift-left security in CI/CD workflows.
#
# Prerequisites:
# - Veracode API credentials stored in Bitbucket repository variables:
#   - VERACODE_API_ID (secured)
#   - VERACODE_API_KEY (secured)
# - Application compiled/packaged (JAR, WAR, ZIP, etc.)
# - Veracode Pipeline Scanner (downloaded during pipeline execution)
#
# Usage:
# Copy this content into your bitbucket-pipelines.yml file or merge with existing config
#
# Documentation: https://docs.veracode.com/r/Pipeline_Scan
# ============================================================================

# ============================================================================
# GLOBAL CONFIGURATION
# ============================================================================

image: maven:3.9-eclipse-temurin-11  # Default image, customize as needed

# ============================================================================
# DEFINITIONS
# ============================================================================
# Reusable pipeline components
# ============================================================================

definitions:
  # Caches for faster builds
  caches:
    maven: ~/.m2/repository
    gradle: ~/.gradle/caches
    npm: node_modules

  # ========================================================================
  # VERACODE PIPELINE SCAN STEP (Reusable)
  # ========================================================================
  # This is a reusable step that can be included in multiple pipelines
  # ========================================================================

  steps:
    - step: &build-application
        name: Build Application
        # ================================================================
        # BUILD BLOCK - Customize for your application
        # ================================================================

        script:
          - echo "Building application..."

          # Example: Maven build
          - mvn clean package -DskipTests

          # Example: Gradle build
          # - ./gradlew build -x test

          # Example: npm build
          # - npm ci
          # - npm run build

          # Example: .NET build
          # - apt-get update && apt-get install -y dotnet-sdk-7.0
          # - dotnet restore
          # - dotnet publish -c Release -o ./publish

          - echo "Build completed successfully"
          - ls -la target/  # Verify build artifacts

        # Preserve build artifacts for security scan
        artifacts:
          - target/**  # Customize path to your build output
          # Additional paths:
          # - build/libs/**
          # - dist/**
          # - publish/**

        # Cache dependencies for faster builds
        caches:
          - maven
          # - gradle
          # - npm

    - step: &veracode-pipeline-scan
        name: Veracode Pipeline Scan
        image: openjdk:11-jdk-slim  # Java runtime for Pipeline Scanner

        # ================================================================
        # SETUP BLOCK - Download Veracode Pipeline Scanner
        # ================================================================

        script:
          - echo "Setting up Veracode Pipeline Scanner..."
          - apt-get update && apt-get install -y curl unzip

          # Download Veracode Pipeline Scanner
          - curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          - unzip -o pipeline-scan-LATEST.zip
          - ls -la pipeline-scan.jar

          # ============================================================
          # SCAN BLOCK - Execute Veracode Pipeline Scan
          # ============================================================
          # This runs the actual security scan on your application
          #
          # Key Parameters:
          # - veracode_api_id: Your Veracode API ID (from repo variables)
          # - veracode_api_key: Your Veracode API Key (from repo variables)
          # - file: Path to the file to scan (JAR, WAR, ZIP, etc.)
          # - fail_on_severity: Fail build on specified severities
          # - fail_on_cwe: Fail build on specific CWE IDs
          # ============================================================

          - echo "Starting Veracode Pipeline Scan..."
          - mkdir -p veracode-results

          - |
            java -jar pipeline-scan.jar \
              --veracode_api_id "$VERACODE_API_ID" \
              --veracode_api_key "$VERACODE_API_KEY" \
              --file "target/*.jar" \
              --project_name "${BITBUCKET_REPO_SLUG}" \
              --project_url "${BITBUCKET_GIT_HTTP_ORIGIN}" \
              --project_ref "${BITBUCKET_BRANCH}" \
              --fail_on_severity="Very High, High" \
              --json_output_file "veracode-results/results.json" \
              --summary_output \
              --summary_output_file "veracode-results/summary.json" \
              || SCAN_EXIT_CODE=$?

          # Display scan summary
          - echo "Scan completed. Summary:"
          - cat veracode-results/summary.json || true

          # Exit with scan status (fail build on high severity findings)
          - exit ${SCAN_EXIT_CODE:-0}

        # ================================================================
        # RESULTS BLOCK - Preserve scan results as artifacts
        # ================================================================

        artifacts:
          - veracode-results/**

    - step: &veracode-baseline-scan
        name: Veracode Pipeline Scan (with Baseline)
        image: openjdk:11-jdk-slim

        script:
          - echo "Setting up Veracode Pipeline Scanner..."
          - apt-get update && apt-get install -y curl unzip
          - curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          - unzip -o pipeline-scan-LATEST.zip
          - mkdir -p veracode-results

          # Download baseline file (customize based on your storage)
          # Option 1: From Bitbucket Downloads
          # - curl -o baseline.json "${BITBUCKET_GIT_HTTP_ORIGIN}/downloads/baseline.json"
          # Option 2: From external storage
          # - curl -o baseline.json https://your-storage/baseline.json

          - echo "Running Pipeline Scan with baseline comparison..."
          - |
            java -jar pipeline-scan.jar \
              --veracode_api_id "$VERACODE_API_ID" \
              --veracode_api_key "$VERACODE_API_KEY" \
              --file "target/*.jar" \
              --baseline_file "baseline.json" \
              --fail_on_severity="Very High, High" \
              --json_output_file "veracode-results/results.json"

        artifacts:
          - veracode-results/**

# ============================================================================
# PIPELINES
# ============================================================================

pipelines:
  # ========================================================================
  # DEFAULT PIPELINE
  # ========================================================================
  # Runs on all branches not matching other pipeline definitions
  # ========================================================================

  default:
    - step: *build-application
    - step: *veracode-pipeline-scan

  # ========================================================================
  # BRANCH-SPECIFIC PIPELINES
  # ========================================================================

  branches:
    # Main branch - run full security scan
    main:
      - step: *build-application
      - step: *veracode-pipeline-scan

    # Develop branch - run security scan
    develop:
      - step: *build-application
      - step: *veracode-pipeline-scan

    # Feature branches - run security scan
    feature/*:
      - step: *build-application
      - step: *veracode-pipeline-scan

  # ========================================================================
  # PULL REQUEST PIPELINE
  # ========================================================================
  # Runs when pull requests are created or updated
  # ========================================================================

  pull-requests:
    '**':  # All pull requests
      - step: *build-application
      - step: *veracode-pipeline-scan

  # ========================================================================
  # TAG PIPELINE
  # ========================================================================
  # Runs when tags are created (e.g., releases)
  # ========================================================================

  tags:
    'v*':  # Tags matching v* (e.g., v1.0.0)
      - step: *build-application
      - step:
          <<: *veracode-pipeline-scan
          name: Veracode Release Scan
          # Stricter criteria for releases
          script:
            - apt-get update && apt-get install -y curl unzip
            - curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
            - unzip -o pipeline-scan-LATEST.zip
            - mkdir -p veracode-results
            - |
              java -jar pipeline-scan.jar \
                --veracode_api_id "$VERACODE_API_ID" \
                --veracode_api_key "$VERACODE_API_KEY" \
                --file "target/*.jar" \
                --fail_on_severity="Medium, High, Very High" \
                --json_output_file "veracode-results/results.json"

  # ========================================================================
  # CUSTOM PIPELINE (Manual Trigger)
  # ========================================================================
  # Can be triggered manually from Bitbucket UI
  # ========================================================================

  custom:
    security-scan-only:
      - step: *build-application
      - step: *veracode-pipeline-scan

    security-scan-with-baseline:
      - step: *build-application
      - step: *veracode-baseline-scan

# ============================================================================
# ADVANCED CONFIGURATION EXAMPLES
# ============================================================================

# ============================================================================
# EXAMPLE: Multi-stage Pipeline with Parallel Scans
# ============================================================================
# Uncomment to run multiple security scans in parallel
# ============================================================================

# pipelines:

#     - step: *build-application

# pipelines:

#           name: Deploy to Production

# ============================================================================
# EXAMPLE: Scheduled Pipeline for Regular Scans
# ============================================================================
# Configure in Bitbucket UI: Repository settings → Pipelines → Schedules
# ============================================================================

# pipelines:
#   custom:
#     scheduled-security-scan:
#       - step: *build-application
#       - step:
#           <<: *veracode-pipeline-scan
#           name: Scheduled Security Scan
#           # More comprehensive scan for scheduled runs
#           script:
#             - apt-get update && apt-get install -y curl unzip
#             - curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
#             - unzip -o pipeline-scan-LATEST.zip
#             - mkdir -p veracode-results
#             - |
#               java -jar pipeline-scan.jar \
#                 --veracode_api_id "$VERACODE_API_ID" \
#                 --veracode_api_key "$VERACODE_API_KEY" \
#                 --file "target/*.jar" \
#                 --fail_on_severity="Low, Medium, High, Very High" \
#                 --timeout 120 \
#                 --json_output_file "veracode-results/results.json"

# ============================================================================
# CONFIGURATION OPTIONS
# ============================================================================
#
# Severity Levels (for --fail_on_severity):
# - "Very High"
# - "High"
# - "Medium"
# - "Low"
# - "Very Low"
# - "Informational"
#
# Common CWE IDs (for --fail_on_cwe):
# - 79: Cross-Site Scripting (XSS)
# - 89: SQL Injection
# - 78: OS Command Injection
# - 22: Path Traversal
# - 352: Cross-Site Request Forgery (CSRF)
# - 798: Use of Hard-coded Credentials
#
# Usage Examples:
# --fail_on_severity="Very High, High"
# --fail_on_cwe="79,89,78"
#
# Additional Pipeline Scanner Options:
# --timeout: Maximum scan time in minutes (default: 60)
# --include: Additional files to include in scan
# --exclude: Files to exclude from scan
# --development_stage: Development stage (Development/Testing/Release)
# --baseline_file: JSON file from previous scan for comparison
#
# Bitbucket-specific Variables:
# - BITBUCKET_REPO_SLUG: Repository name
# - BITBUCKET_BRANCH: Current branch name
# - BITBUCKET_COMMIT: Current commit hash
# - BITBUCKET_BUILD_NUMBER: Build number
# - BITBUCKET_GIT_HTTP_ORIGIN: Repository URL
#
# ============================================================================

# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# Common Issues:
#
# 1. Authentication Errors:
#    - Verify VERACODE_API_ID and VERACODE_API_KEY are set in repository variables
#    - Navigate to: Repository settings → Pipelines → Repository variables
#    - Ensure VERACODE_API_KEY is marked as "Secured"
#    - Check API credentials haven't expired in Veracode Platform
#
# 2. File Not Found:
#    - Verify artifact paths match between build and scan steps
#    - Check that build step completes successfully
#    - Ensure artifacts are properly configured
#    - Verify file glob patterns are correct (e.g., target/*.jar)
#
# 3. Pipeline Failures:
#    - Review pipeline logs for detailed error messages
#    - Check if --fail_on_severity threshold is appropriate
#    - Verify uploaded file is a valid application package
#    - Ensure sufficient pipeline resources
#
# 4. Step Configuration:
#    - Verify YAML anchors and aliases are correctly defined
#    - Check that reusable steps are properly referenced with *
#    - Ensure proper indentation (Bitbucket is strict about YAML syntax)
#
# 5. Artifact Issues:
#    - Verify artifact paths exist after build
#    - Check artifact size limits (Bitbucket has size restrictions)
#    - Ensure artifacts persist between steps
#
# 6. Network/Download Issues:
#    - Verify runner has internet access to download Pipeline Scanner
#    - Check corporate firewall/proxy settings
#    - Ensure downloads.veracode.com is accessible
#
# For more help:
# - Veracode: https://docs.veracode.com/r/c_pipeline_scan_commands
# - Bitbucket: https://support.atlassian.com/bitbucket-cloud/docs/get-started-with-bitbucket-pipelines/
# ============================================================================
</script>

<script type="text/yaml" id="card24">
# URL: https://github.com/enzo-appsec/veracode-ci-cd-templates/blob/main/bitbucket/policy-scan.yml
# ============================================================================
# Veracode Policy Scan (Comprehensive SAST) - Bitbucket Pipelines Template
# ============================================================================
# This template demonstrates how to integrate Veracode Policy Scan into your
# Bitbucket Pipelines for comprehensive Static Application Security Testing
# and policy compliance verification.
#
# Policy Scan provides thorough security analysis and is used for:
# - Release candidate validation
# - Policy compliance reporting
# - Detailed flaw remediation guidance
# - Security gate checks before production
#
# Note: Policy Scan takes longer than Pipeline Scan (hours vs minutes)
# but provides comprehensive results and policy enforcement.
#
# Prerequisites:
# - Veracode API credentials stored in Bitbucket repository variables
# - Application compiled/packaged (JAR, WAR, ZIP, etc.)
# - Veracode application profile created (or auto-created)
#
# Usage: Copy this into your bitbucket-pipelines.yml or merge with existing
#
# Documentation: https://docs.veracode.com/r/Veracode_Upload_and_Scan
# ============================================================================

# ============================================================================
# GLOBAL CONFIGURATION
# ============================================================================

image: maven:3.9-eclipse-temurin-11

# ============================================================================
# DEFINITIONS
# ============================================================================

definitions:
  caches:
    maven: ~/.m2/repository

  # ========================================================================
  # REUSABLE STEPS
  # ========================================================================

  steps:
    - step: &build-application
        name: Build Application
        script:
          - echo "Building application..."
          - mvn clean package -DskipTests
          - ls -la target/
        artifacts:
          - target/**
        caches:
          - maven

    - step: &upload-to-veracode
        name: Upload to Veracode Platform
        image: openjdk:11-jdk-slim

        script:
          # ============================================================
          # SETUP BLOCK - Download Veracode API Wrapper
          # ============================================================

          - echo "Downloading Veracode Java API Wrapper..."
          - apt-get update && apt-get install -y curl
          - curl -sSO https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/23.8.12.0/vosp-api-wrappers-java-23.8.12.0.jar
          - mv vosp-api-wrappers-java-23.8.12.0.jar VeracodeJavaAPI.jar

          # ============================================================
          # UPLOAD BLOCK - Upload and Initiate Scan
          # ============================================================

          - echo "Uploading ${BITBUCKET_REPO_SLUG} to Veracode..."
          - APP_VERSION="${BITBUCKET_BUILD_NUMBER}"

          - |
            java -jar VeracodeJavaAPI.jar \
              -vid "$VERACODE_API_ID" \
              -vkey "$VERACODE_API_KEY" \
              -action UploadAndScan \
              -appname "${BITBUCKET_REPO_SLUG}" \
              -createprofile true \
              -version "$APP_VERSION" \
              -filepath "target/*.jar" \
              -autoscan true

          - echo "✓ Upload completed. Scan initiated."
          - echo "Monitor at https://analysiscenter.veracode.com"

        artifacts:
          - VeracodeJavaAPI.jar

    - step: &wait-for-scan
        name: Wait for Scan Completion
        image: openjdk:11-jdk-slim

        script:
          - echo "Waiting for scan to complete..."
          - APP_VERSION="${BITBUCKET_BUILD_NUMBER}"
          - TIMEOUT_MINUTES=60
          - TIMEOUT_SECONDS=$((TIMEOUT_MINUTES * 60))
          - START_TIME=$(date +%s)

          # ============================================================
          # WAIT LOOP - Poll for Scan Completion
          # ============================================================

          - |
            while true; do
              STATUS=$(java -jar VeracodeJavaAPI.jar \
                -vid "$VERACODE_API_ID" \
                -vkey "$VERACODE_API_KEY" \
                -action GetBuildInfo \
                -appname "${BITBUCKET_REPO_SLUG}" \
                -version "$APP_VERSION" | \
                grep "status=" | cut -d'"' -f2 || echo "Unknown")

              echo "Current scan status: $STATUS"

              if [[ "$STATUS" == "Results Ready" ]]; then
                echo "✓ Scan completed successfully"
                break
              elif [[ "$STATUS" == "Scan Failed" ]] || [[ "$STATUS" == "Incomplete" ]]; then
                echo "✗ Scan failed or incomplete"
                exit 1
              fi

              CURRENT_TIME=$(date +%s)
              ELAPSED=$((CURRENT_TIME - START_TIME))

              if [ $ELAPSED -gt $TIMEOUT_SECONDS ]; then
                echo "✗ Scan timeout after $TIMEOUT_MINUTES minutes"
                exit 1
              fi

              MINUTES=$((ELAPSED / 60))
              echo "Elapsed: $MINUTES / $TIMEOUT_MINUTES minutes"
              echo "Waiting 60 seconds..."
              sleep 60
            done

        artifacts:
          - VeracodeJavaAPI.jar

    - step: &check-policy-compliance
        name: Check Policy Compliance
        image: openjdk:11-jdk-slim

        script:
          - echo "Checking policy compliance..."
          - apt-get update && apt-get install -y libxml2-utils
          - mkdir -p veracode-reports
          - APP_VERSION="${BITBUCKET_BUILD_NUMBER}"

          # ============================================================
          # DOWNLOAD RESULTS
          # ============================================================

          - echo "Downloading scan results..."

          # Detailed XML report
          - |
            java -jar VeracodeJavaAPI.jar \
              -vid "$VERACODE_API_ID" \
              -vkey "$VERACODE_API_KEY" \
              -action DetailedReport \
              -appname "${BITBUCKET_REPO_SLUG}" \
              -version "$APP_VERSION" \
              -outputfilepath "veracode-reports/detailed-report.xml"

          # Summary PDF report
          - |
            java -jar VeracodeJavaAPI.jar \
              -vid "$VERACODE_API_ID" \
              -vkey "$VERACODE_API_KEY" \
              -action SummaryReport \
              -appname "${BITBUCKET_REPO_SLUG}" \
              -version "$APP_VERSION" \
              -outputfilepath "veracode-reports/summary-report.pdf"

          # ============================================================
          # PARSE AND CHECK COMPLIANCE
          # ============================================================

          - echo "Parsing results..."

          # Extract policy status
          - POLICY_STATUS=$(grep -oP 'policy_compliance_status="\K[^"]+' veracode-reports/detailed-report.xml || echo "Unknown")
          - echo "Policy Compliance: $POLICY_STATUS"

          # Count flaws
          - VERY_HIGH=$(grep -c 'severity="5"' veracode-reports/detailed-report.xml || echo "0")
          - HIGH=$(grep -c 'severity="4"' veracode-reports/detailed-report.xml || echo "0")
          - MEDIUM=$(grep -c 'severity="3"' veracode-reports/detailed-report.xml || echo "0")

          - echo "Flaws - Very High:$VERY_HIGH High:$HIGH Medium:$MEDIUM"

          # Check compliance
          - |
            if [[ "$POLICY_STATUS" == "Pass" ]]; then
              echo "✓ Passed policy compliance"
              exit 0
            else
              echo "✗ Failed policy compliance"
              echo "Review veracode-reports/detailed-report.xml"
              exit 1
            fi

        artifacts:
          - veracode-reports/**

    - step: &sandbox-upload
        name: Upload to Sandbox
        image: openjdk:11-jdk-slim

        script:
          - apt-get update && apt-get install -y curl
          - curl -sSO https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/23.8.12.0/vosp-api-wrappers-java-23.8.12.0.jar
          - mv vosp-api-wrappers-java-23.8.12.0.jar VeracodeJavaAPI.jar

          - echo "Uploading to Development sandbox..."
          - APP_VERSION="sandbox-${BITBUCKET_BUILD_NUMBER}"

          - |
            java -jar VeracodeJavaAPI.jar \
              -vid "$VERACODE_API_ID" \
              -vkey "$VERACODE_API_KEY" \
              -action UploadAndScan \
              -appname "${BITBUCKET_REPO_SLUG}" \
              -createprofile true \
              -version "$APP_VERSION" \
              -filepath "target/*.jar" \
              -sandboxname "Development" \
              -createsandbox true \
              -autoscan true

          - echo "✓ Sandbox scan initiated"

# ============================================================================
# PIPELINES
# ============================================================================

pipelines:
  # ========================================================================
  # MAIN BRANCH - Full Policy Scan
  # ========================================================================

  branches:
    main:
      - step: *build-application
      - step: *upload-to-veracode
      - step: *wait-for-scan
      - step: *check-policy-compliance

    # ======================================================================
    # RELEASE BRANCHES - Policy Scan with Stricter Compliance
    # ======================================================================

    release/*:
      - step: *build-application
      - step: *upload-to-veracode
      - step: *wait-for-scan
      - step:
          <<: *check-policy-compliance
          name: Check Policy Compliance (Strict)

    # ======================================================================
    # DEVELOP BRANCH - Sandbox Scan
    # ======================================================================

    develop:
      - step: *build-application
      - step: *sandbox-upload

  # ========================================================================
  # TAGS - Release Validation
  # ========================================================================

  tags:
    'v*':
      - step: *build-application
      - step:
          <<: *upload-to-veracode
          name: Upload Release Build
      - step: *wait-for-scan
      - step:
          <<: *check-policy-compliance
          name: Validate Release Compliance
      - step:
          name: Deploy to Production
          deployment: production
          trigger: manual
          script:
            - echo "Policy scan passed - ready for deployment"
            - echo "Deploy your application here"

  # ========================================================================
  # CUSTOM PIPELINES
  # ========================================================================

  custom:
    policy-scan-only:
      - step: *build-application
      - step: *upload-to-veracode
      - step: *wait-for-scan
      - step: *check-policy-compliance

    sandbox-scan-only:
      - step: *build-application
      - step: *sandbox-upload

    # ======================================================================
    # Async Upload (don't wait for results)
    # ======================================================================

    async-upload:
      - step: *build-application
      - step: *upload-to-veracode

# ============================================================================
# ADVANCED EXAMPLES
# ============================================================================

# ============================================================================
# EXAMPLE: Pipeline with Manual Approval After Scan
# ============================================================================

# pipelines:
#   branches:
#     main:
#       - step: *build-application
#       - step: *upload-to-veracode
#       - step: *wait-for-scan
#       - step: *check-policy-compliance
#       - step:
#           name: Deploy to Staging
#           deployment: staging
#           trigger: manual
#           script:
#             - echo "Deploying to staging..."
#       - step:
#           name: Deploy to Production
#           deployment: production
#           trigger: manual
#           script:
#             - echo "Deploying to production..."

# ============================================================================
# EXAMPLE: Parallel Scans (Policy + Sandbox)
# ============================================================================

# pipelines:
#   branches:
#     main:
#       - step: *build-application
#       - parallel:
#         - step: *upload-to-veracode
#         - step: *sandbox-upload

# ============================================================================
# EXAMPLE: Download and Compare with Previous Scan
# ============================================================================

# - step:
#     name: Compare with Previous Scan
#     image: openjdk:11-jdk-slim
#     script:
#       - apt-get update && apt-get install -y curl
#       - curl -sSO https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/23.8.12.0/vosp-api-wrappers-java-23.8.12.0.jar
#       - mv vosp-api-wrappers-java-23.8.12.0.jar VeracodeJavaAPI.jar
#
#       # Get build list
#       - |
#         java -jar VeracodeJavaAPI.jar \
#           -vid "$VERACODE_API_ID" \
#           -vkey "$VERACODE_API_KEY" \
#           -action GetBuildList \
#           -appname "${BITBUCKET_REPO_SLUG}" \
#           -outputfilepath "build-list.xml"
#
#       # Compare flaw counts between builds
#       - echo "Analyzing trends..."

# ============================================================================
# CONFIGURATION OPTIONS
# ============================================================================
#
# UploadAndScan Parameters:
# - appname: Application name (default: repository slug)
# - createprofile: true/false - Auto-create profile
# - version: Build version identifier
# - filepath: Path to files to upload
# - sandboxname: Sandbox name (for testing)
# - createsandbox: true/false - Auto-create sandbox
# - autoscan: true/false - Start scan after upload
# - criticality: VeryHigh, High, Medium, Low, VeryLow
# - businessunit: Business unit name
# - teams: Comma-separated team names
# - scantimeout: Minutes before timeout
#
# Report Actions:
# - DetailedReport: Full XML report with findings
# - SummaryReport: Executive PDF summary
# - ThirdPartyReport: Component analysis PDF
# - ComplianceReport: Policy compliance PDF
# - GetBuildInfo: Current build status
# - GetBuildList: List of all builds for app
#
# Build Status Values:
# - Incomplete: Upload in progress
# - Pre-Scan Submitted: Waiting for prescan
# - Pre-Scan Success: Prescan completed
# - Scan In Process: Analysis running
# - Results Ready: Scan complete
# - Scan Failed: Error occurred
#
# Policy Compliance Values:
# - Pass: Meets policy requirements
# - Conditional Pass: Partial compliance
# - Did Not Pass: Failed policy
# - Not Assessed: No policy applied
#
# Bitbucket Variables:
# - BITBUCKET_REPO_SLUG: Repository name
# - BITBUCKET_BRANCH: Current branch
# - BITBUCKET_COMMIT: Current commit SHA
# - BITBUCKET_BUILD_NUMBER: Build number
# - BITBUCKET_TAG: Tag name (if applicable)
#
# ============================================================================

# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# Common Issues:
#
# 1. Upload Failures:
#    - Verify file size under 2GB per file
#    - Check supported formats (JAR, WAR, ZIP, etc.)
#    - Ensure credentials have upload permissions
#    - Check network connectivity
#
# 2. Pipeline Timeout:
#    - Bitbucket has 2-hour max timeout per step
#    - For longer scans, use async upload (don't wait)
#    - Check scan status in Veracode Platform
#    - Consider separate pipeline to check results
#
# 3. Scan Failures:
#    - Review prescan logs in Veracode Platform
#    - Check file dependencies and modules
#    - Verify compilation success
#    - Ensure all required files are uploaded
#
# 4. Policy Compliance:
#    - Review detailed-report.xml for flaws
#    - Check policy configuration in Platform
#    - Use sandboxes for development testing
#    - Review flaw remediation guidance
#
# 5. Application Profile:
#    - Set createprofile=true for auto-creation
#    - Verify app name (case-sensitive)
#    - Check permissions in Veracode Platform
#    - Ensure business unit access
#
# 6. Memory Issues:
#    - Large artifacts may need more memory
#    - Use pipe options if available
#    - Split large uploads if possible
#    - Contact Bitbucket support for limits
#
# 7. Artifact Size:
#    - Bitbucket limits artifact storage
#    - Clean up old artifacts
#    - Use shorter retention periods
#    - Store reports externally if needed
#
# For more help:
# - Veracode: https://docs.veracode.com/r/c_about_wrappers
# - Bitbucket: https://support.atlassian.com/bitbucket-cloud/docs/
# ============================================================================
  
</script>

<script type="text/yaml" id="card25">
# URL: https://github.com/enzo-appsec/veracode-ci-cd-templates/blob/main/bitbucket/sca-scan.yml
# ============================================================================
# Veracode SCA Scan (Software Composition Analysis) - Bitbucket Pipelines
# ============================================================================
# This template demonstrates how to integrate Veracode SCA scanning into your
# Bitbucket Pipelines to identify vulnerabilities in third-party dependencies
# and open-source components.
#
# SCA Scan analyzes:
# - Third-party libraries and dependencies
# - Known vulnerabilities (CVEs)
# - License compliance and risks
# - Outdated components
# - Transitive dependencies
#
# SCA runs quickly (minutes) and can run in parallel with other scans.
#
# Prerequisites:
# - Veracode SCA Agent credentials in Bitbucket variables (SRCCLR_API_TOKEN)
# - Dependency manifest files (pom.xml, package.json, requirements.txt, etc.)
# - Source code with dependency declarations
#
# Usage: Copy into your bitbucket-pipelines.yml or merge with existing
#
# Documentation: https://docs.veracode.com/r/Agent_Based_Scans
# ============================================================================

# ============================================================================
# SRCCLR_API_TOKEN SETUP INSTRUCTIONS
# ============================================================================
# This pipeline requires a Veracode SCA Agent token stored as a Bitbucket variable.
#
# 1. Obtain Your SCA Agent Token:
#    - Log into Veracode Platform (https://analysiscenter.veracode.com/)
#    - Navigate to: Scans & Analysis → Software Composition Analysis
#    - Select: Agent-Based Scan
#    - Select a Workspace (or create one)
#    - Select: Agents → Actions → Create
#    - Select any Integration Option
#    - Click: Create Agent & Generate Token
#    - COPY THE TOKEN IMMEDIATELY - it only displays once!
#
# 2. Store Token in Bitbucket:
#    - Go to: Repository settings → Pipelines → Repository variables
#    - Click: Add variable
#    - Name: SRCCLR_API_TOKEN
#    - Value: (paste token from step 1)
#    - Secured: ✓ (check this box)
#    - Click: Add
#
# 3. Required Permissions:
#    - Organization agent: Security Lead role
#    - Workspace agent: Security Lead, Workspace Admin, Workspace Editor, or Submitter
#
# 4. Alternative - Workspace Variables:
#    - For multiple repositories: Workspace settings → Workspace variables
#    - All repositories in workspace will have access
#
# 5. Regional Configuration (if applicable):
#    - European Region: Add SRCCLR_REGION variable with value: ER
#    - US Federal Region: Add SRCCLR_REGION variable with value: FED
#
# Documentation: https://docs.veracode.com/r/Manage_agents_and_scans
# ============================================================================

# ============================================================================
# GLOBAL CONFIGURATION
# ============================================================================

image: alpine:latest

# ============================================================================
# DEFINITIONS
# ============================================================================

definitions:
  caches:
    maven: ~/.m2/repository
    npm: node_modules
    pip: ~/.cache/pip

  # ========================================================================
  # REUSABLE STEPS
  # ========================================================================

  steps:
    - step: &sca-scan
        name: Veracode SCA Scan
        script:
          # ============================================================
          # SETUP BLOCK
          # ============================================================

          - echo "Setting up Veracode SCA Agent..."
          - apk add --no-cache curl bash

          # Download SCA Agent
          - curl -sSL https://download.sourceclear.com/ci.sh -o ci.sh
          - chmod +x ci.sh

          # ============================================================
          # SCAN BLOCK
          # ============================================================

          - echo "Starting SCA scan for ${BITBUCKET_REPO_SLUG}..."

          # Run SCA scan
          - |
            ./ci.sh scan \
              --app "${BITBUCKET_REPO_SLUG}" \
              --allow-dirty \
              --json > sca-results.json

          - echo "✓ SCA scan completed"

        artifacts:
          - sca-results.json

    - step: &sca-maven
        name: SCA Scan - Java/Maven
        image: maven:3.9-eclipse-temurin-11
        script:
          - echo "Resolving Maven dependencies..."
          - mvn dependency:resolve

          - echo "Setting up SCA Agent..."
          - apt-get update && apt-get install -y curl
          - curl -sSL https://download.sourceclear.com/ci.sh -o ci.sh
          - chmod +x ci.sh

          - echo "Running SCA scan..."
          - ./ci.sh scan --app "${BITBUCKET_REPO_SLUG}" --maven

        caches:
          - maven

    - step: &sca-npm
        name: SCA Scan - Node.js/npm
        image: node:18-alpine
        script:
          - echo "Installing npm dependencies..."
          - npm ci

          - echo "Setting up SCA Agent..."
          - apk add --no-cache curl bash
          - curl -sSL https://download.sourceclear.com/ci.sh -o ci.sh
          - chmod +x ci.sh

          - echo "Running SCA scan..."
          - ./ci.sh scan --app "${BITBUCKET_REPO_SLUG}" --npm

        caches:
          - npm

    - step: &sca-python
        name: SCA Scan - Python
        image: python:3.11-alpine
        script:
          - echo "Installing Python dependencies..."
          - pip install -r requirements.txt

          - echo "Setting up SCA Agent..."
          - apk add --no-cache curl bash
          - curl -sSL https://download.sourceclear.com/ci.sh -o ci.sh
          - chmod +x ci.sh

          - echo "Running SCA scan..."
          - ./ci.sh scan --app "${BITBUCKET_REPO_SLUG}" --python

        caches:
          - pip

    - step: &sca-with-threshold
        name: SCA Scan with Vulnerability Threshold
        script:
          - echo "Setting up SCA Agent..."
          - apk add --no-cache curl bash
          - curl -sSL https://download.sourceclear.com/ci.sh -o ci.sh
          - chmod +x ci.sh

          - echo "Running SCA with threshold..."

          # Fail on CVSS >= 7.0 or high severity
          - |
            ./ci.sh scan \
              --app "${BITBUCKET_REPO_SLUG}" \
              --threshold-cvss 7.0 \
              --threshold-cve-severity high \
              --json > sca-results.json

        artifacts:
          - sca-results.json

    - step: &generate-sbom
        name: Generate SBOM
        script:
          - apk add --no-cache curl bash
          - curl -sSL https://download.sourceclear.com/ci.sh -o ci.sh
          - chmod +x ci.sh

          - echo "Generating Software Bill of Materials..."

          # Run scan
          - ./ci.sh scan --app "${BITBUCKET_REPO_SLUG}" --json > sca-results.json

          # Generate SBOM
          - |
            ./ci.sh sbom \
              --format cyclonedx \
              --output sbom.json

          - echo "✓ SBOM generated"

        artifacts:
          - sbom.json
          - sca-results.json

# ============================================================================
# PIPELINES
# ============================================================================

pipelines:
  # ========================================================================
  # DEFAULT PIPELINE
  # ========================================================================

  default:
    - step: *sca-scan

  # ========================================================================
  # BRANCH-SPECIFIC PIPELINES
  # ========================================================================

  branches:
    main:
      - step: *sca-with-threshold

    develop:
      - step: *sca-scan

    feature/*:
      - step: *sca-scan

  # ========================================================================
  # PULL REQUEST PIPELINE
  # ========================================================================

  pull-requests:
    '**':
      - step: *sca-scan

  # ========================================================================
  # TAG PIPELINE - Generate SBOM for Releases
  # ========================================================================

  tags:
    'v*':
      - step: *generate-sbom

  # ========================================================================
  # CUSTOM PIPELINES
  # ========================================================================

  custom:
    sca-scan-only:
      - step: *sca-scan

    sca-maven:
      - step: *sca-maven

    sca-npm:
      - step: *sca-npm

            image: maven:3.9-eclipse-temurin-11
            script:

            artifacts:

        - step: *sca-scan

# ============================================================================
# CONFIGURATION OPTIONS
# ============================================================================
#
# SCA Agent Parameters:
# --app: Application name (default: repository slug)
# --allow-dirty: Allow uncommitted changes
# --maven: Scan Maven projects
# --gradle: Scan Gradle projects
# --npm: Scan npm projects
# --yarn: Scan Yarn projects
# --pip: Scan Python pip projects
# --go: Scan Go modules
# --ruby: Scan Ruby gems
# --nuget: Scan .NET NuGet
# --threshold-cvss: Min CVSS to fail (0.0-10.0)
# --threshold-cve-severity: Min severity (low, medium, high, critical)
# --json: Output JSON results
# --recursive: Scan subdirectories
# --no-upload: Don't upload to platform
# --quick: Quick scan mode
#
# Environment Variables:
# - SRCCLR_API_TOKEN: SCA Agent API token (required)
# - SRCCLR_SCM_URI: Repository URL
# - SRCCLR_SCM_REF: Branch/tag
# - SRCCLR_SCM_REV: Commit SHA
#
# Bitbucket Variables:
# - BITBUCKET_REPO_SLUG: Repository name
# - BITBUCKET_BRANCH: Current branch
# - BITBUCKET_COMMIT: Commit SHA
# - BITBUCKET_TAG: Tag name
# - BITBUCKET_BUILD_NUMBER: Build number
#
