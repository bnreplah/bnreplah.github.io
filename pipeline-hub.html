</script>

<script type="text/yaml" id="card16" src="">
# URL: https://github.com/enzo-appsec/veracode-ci-cd-templates/blob/main/azure-pipelines/cli-examples.yml
# ============================================================================
# Veracode CLI Examples - Azure Pipelines Template
# ============================================================================
# This template demonstrates various Veracode CLI operations that can be
# integrated into your Azure DevOps pipelines for advanced scanning workflows,
# reporting, and automation.
#
# The Veracode CLI provides:
# - Results download and reporting
# - Scan status checking
# - Application and sandbox management
# - Flaw annotation and mitigation
# - Custom API operations
# - Policy compliance verification
#
# Prerequisites:
# - Veracode API credentials (API ID and API Key)
# - Veracode CLI installed or downloaded during pipeline
#
# Documentation: https://docs.veracode.com/r/Veracode_CLI
# ============================================================================

trigger: none  # Manual trigger only for examples

pool:
  vmImage: 'ubuntu-latest'

# ============================================================================
# VARIABLES
# ============================================================================

variables:
  VERACODE_API_ID: $(veracode-api-id)
  VERACODE_API_KEY: $(veracode-api-key)
  APP_NAME: 'my-application'

# ============================================================================
# STAGES
# ============================================================================

stages:
  # ==========================================================================
  # SETUP AND INSTALLATION
  # ==========================================================================

  - stage: Setup
    displayName: 'Veracode CLI Setup'
    jobs:
      - job: InstallCLI
        displayName: 'Install Veracode CLI'
        steps:
          # ====================================================================
          # INSTALLATION BLOCK - Download and Install Veracode CLI
          # ====================================================================

          - task: Bash@3
            displayName: 'Download Veracode CLI'
            inputs:
              targetType: 'inline'
              script: |
                echo "Installing Veracode CLI..."
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh

                # Add to PATH for subsequent steps
                export PATH="$HOME/.veracode-cli:$PATH"

                # Verify installation
                veracode --version
                echo "✓ Veracode CLI installed successfully"

          # ====================================================================
          # AUTHENTICATION TEST
          # ====================================================================

          - task: Bash@3
            displayName: 'Test Authentication'
            inputs:
              targetType: 'inline'
              script: |
                export PATH="$HOME/.veracode-cli:$PATH"

                echo "Testing Veracode API authentication..."
                veracode whoami
            env:
              VERACODE_API_KEY_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY_SECRET: $(VERACODE_API_KEY)

  # ==========================================================================
  # SCAN OPERATIONS
  # ==========================================================================

  - stage: ScanOperations
    displayName: 'Scan Operations'
    jobs:
      - job: ScanStatus
        displayName: 'Check Scan Status'
        steps:
          - task: Bash@3
            displayName: 'Get Build Status'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh
                export PATH="$HOME/.veracode-cli:$PATH"

                echo "Checking scan status for $(APP_NAME)..."

                # Get latest build info
                veracode static scan info \
                  --app "$(APP_NAME)"

                echo "✓ Build status retrieved"
            env:
              VERACODE_API_KEY_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY_SECRET: $(VERACODE_API_KEY)

      - job: DownloadResults
        displayName: 'Download Scan Results'
        steps:
          - task: Bash@3
            displayName: 'Download Detailed Report'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh
                export PATH="$HOME/.veracode-cli:$PATH"

                echo "Downloading scan results for $(APP_NAME)..."

                # Download detailed XML report
                veracode static scan results \
                  --app "$(APP_NAME)" \
                  --format xml \
                  --output detailed-report.xml

                echo "✓ Detailed report downloaded"
                ls -lh detailed-report.xml
            env:
              VERACODE_API_KEY_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY_SECRET: $(VERACODE_API_KEY)

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Reports'
            inputs:
              targetPath: 'detailed-report.xml'
              artifact: 'veracode-reports'

  # ==========================================================================
  # REPORTING
  # ==========================================================================

  - stage: Reporting
    displayName: 'Generate Reports'
    jobs:
      - job: GenerateReports
        displayName: 'Generate Various Reports'
        steps:
          - task: Bash@3
            displayName: 'Generate Reports'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh
                export PATH="$HOME/.veracode-cli:$PATH"

                mkdir -p reports

                echo "Generating reports for $(APP_NAME)..."

                # Summary report (JSON)
                veracode static scan results \
                  --app "$(APP_NAME)" \
                  --format json \
                  --output reports/summary.json

                # Detailed findings (CSV)
                veracode static findings \
                  --app "$(APP_NAME)" \
                  --format csv \
                  --output reports/findings.csv

                # Policy compliance report
                veracode static policy \
                  --app "$(APP_NAME)" \
                  --format json \
                  --output reports/policy.json

                echo "✓ All reports generated"
                ls -lh reports/
            env:
              VERACODE_API_KEY_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY_SECRET: $(VERACODE_API_KEY)

          - task: PublishPipelineArtifact@1
            displayName: 'Publish All Reports'
            inputs:
              targetPath: 'reports'
              artifact: 'veracode-all-reports'

  # ==========================================================================
  # APPLICATION MANAGEMENT
  # ==========================================================================

  - stage: AppManagement
    displayName: 'Application Management'
    jobs:
      - job: ListApplications
        displayName: 'List Applications'
        steps:
          - task: Bash@3
            displayName: 'List All Applications'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh
                export PATH="$HOME/.veracode-cli:$PATH"

                echo "Listing all Veracode applications..."

                veracode static app list \
                  --format table

                # Get specific app details
                echo -e "\nDetails for $(APP_NAME):"
                veracode static app info \
                  --app "$(APP_NAME)"
            env:
              VERACODE_API_KEY_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY_SECRET: $(VERACODE_API_KEY)

      - job: CreateApplication
        displayName: 'Create Application Profile'
        steps:
          - task: Bash@3
            displayName: 'Create New Application'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh
                export PATH="$HOME/.veracode-cli:$PATH"

                APP_NAME_NEW="new-application"

                echo "Creating application profile: $APP_NAME_NEW..."

                veracode static app create \
                  --name "$APP_NAME_NEW" \
                  --business-unit "Engineering" \
                  --criticality "High"

                echo "✓ Application profile created"
            env:
              VERACODE_API_KEY_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY_SECRET: $(VERACODE_API_KEY)

  # ==========================================================================
  # SANDBOX OPERATIONS
  # ==========================================================================

  - stage: SandboxOps
    displayName: 'Sandbox Operations'
    jobs:
      - job: SandboxManagement
        displayName: 'Manage Sandboxes'
        steps:
          - task: Bash@3
            displayName: 'Sandbox Operations'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh
                export PATH="$HOME/.veracode-cli:$PATH"

                # List sandboxes
                echo "Listing sandboxes for $(APP_NAME)..."
                veracode static sandbox list \
                  --app "$(APP_NAME)"

                # Create a new sandbox
                echo -e "\nCreating new sandbox..."
                veracode static sandbox create \
                  --app "$(APP_NAME)" \
                  --name "Development"

                # Get sandbox scan results
                echo -e "\nGetting sandbox scan results..."
                veracode static sandbox results \
                  --app "$(APP_NAME)" \
                  --sandbox "Development" \
                  --format json \
                  --output sandbox-results.json

                # Promote sandbox to policy
                # echo -e "\nPromoting sandbox scan..."
                # veracode static sandbox promote \
                #   --app "$(APP_NAME)" \
                #   --sandbox "Development"
            env:
              VERACODE_API_KEY_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY_SECRET: $(VERACODE_API_KEY)

  # ==========================================================================
  # FLAW MANAGEMENT
  # ==========================================================================

  - stage: FlawManagement
    displayName: 'Flaw Management'
    jobs:
      - job: AnnotateFlaws
        displayName: 'Annotate and Mitigate Flaws'
        steps:
          - task: Bash@3
            displayName: 'Flaw Operations'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh
                export PATH="$HOME/.veracode-cli:$PATH"

                # Get flaws
                echo "Getting flaws for $(APP_NAME)..."
                veracode static findings \
                  --app "$(APP_NAME)" \
                  --format json \
                  --output flaws.json

                # Example: Annotate a flaw (you'll need the flaw ID)
                # FLAW_ID="12345"
                # echo "Annotating flaw $FLAW_ID..."
                # veracode static flaw annotate \
                #   --app "$(APP_NAME)" \
                #   --flaw-id "$FLAW_ID" \
                #   --action "Mitigated" \
                #   --comment "False positive - validated by security team"

                echo "✓ Flaw operations completed"
            env:
              VERACODE_API_KEY_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY_SECRET: $(VERACODE_API_KEY)

  # ==========================================================================
  # POLICY COMPLIANCE
  # ==========================================================================

  - stage: PolicyCheck
    displayName: 'Policy Compliance'
    jobs:
      - job: CheckCompliance
        displayName: 'Check Policy Compliance'
        steps:
          - task: Bash@3
            displayName: 'Verify Policy Compliance'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh
                export PATH="$HOME/.veracode-cli:$PATH"

                echo "Checking policy compliance for $(APP_NAME)..."

                # Get policy status
                veracode static policy \
                  --app "$(APP_NAME)" \
                  --format json \
                  --output policy-status.json

                # Parse compliance status
                COMPLIANCE=$(cat policy-status.json | jq -r '.policy_compliance_status' || echo "Unknown")

                echo "Policy Compliance: $COMPLIANCE"

                if [[ "$COMPLIANCE" == "Pass" ]]; then
                  echo "✓ Application passed policy compliance"
                  exit 0
                else
                  echo "✗ Application failed policy compliance"
                  exit 1
                fi
            env:
              VERACODE_API_KEY_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY_SECRET: $(VERACODE_API_KEY)

  # ==========================================================================
  # NOTE: SCA Is NOT Part of Veracode CLI
  # ==========================================================================
  # SCA scanning uses the SCA Agent (ci.sh), NOT the Veracode CLI.
  # See the sca-scan.yml template for proper SCA integration using ci.sh
  #
  # INCORRECT (does not exist):
  #   - veracode sca scan
  #   - veracode sca results
  #   - veracode sca vulnerabilities
  #
  # CORRECT (use SCA Agent):
  #   - ./ci.sh scan --app <name>
  #   - ./ci.sh sbom --format cyclonedx
  #
  # See: https://docs.veracode.com/r/Agent_Based_Scans
  # ==========================================================================
  # CUSTOM API OPERATIONS
  # ==========================================================================

  - stage: CustomAPI
    displayName: 'Custom API Operations'
    jobs:
      - job: APIExamples
        displayName: 'Raw API Calls'
        steps:
          - task: Bash@3
            displayName: 'Custom API Operations'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh
                export PATH="$HOME/.veracode-cli:$PATH"

                # Get application GUID
                echo "Getting application GUID..."
                veracode static app info \
                  --app "$(APP_NAME)" \
                  --format json | jq -r '.guid'

                # Get team information
                echo -e "\nGetting team information..."
                veracode configure api \
                  --endpoint "/api/authn/v2/teams" \
                  --method GET

                # Get user information
                echo -e "\nGetting current user info..."
                veracode whoami --format json | jq .
            env:
              VERACODE_API_KEY_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY_SECRET: $(VERACODE_API_KEY)

# ============================================================================
# VERACODE CLI COMMAND REFERENCE
# ============================================================================
#
# Installation:
# curl -fsS https://tools.veracode.com/veracode-cli/install | sh
#
# Authentication:
# Environment variables (recommended for CI/CD):
#   VERACODE_API_KEY_ID
#   VERACODE_API_KEY_SECRET
#
# Static Analysis Commands:
# - veracode static scan info --app <name>
# - veracode static scan results --app <name> --format <xml|json|csv>
# - veracode static findings --app <name>
# - veracode static policy --app <name>
# - veracode static app list
# - veracode static app create --name <name>
# - veracode static app info --app <name>
# - veracode static app delete --app <name>
#
# Sandbox Commands:
# - veracode static sandbox list --app <name>
# - veracode static sandbox create --app <name> --name <sandbox>
# - veracode static sandbox results --app <name> --sandbox <name>
# - veracode static sandbox promote --app <name> --sandbox <name>
# - veracode static sandbox delete --app <name> --sandbox <name>
#
# Flaw Commands:
# - veracode static findings --app <name>
# - veracode static flaw annotate --app <name> --flaw-id <id>
#
# ⚠️ SCA Commands - NOT PART OF VERACODE CLI:
# SCA uses the SCA Agent (ci.sh), NOT the Veracode CLI
# See sca-scan.yml template for proper SCA integration
# - curl -sSL https://download.sourceclear.com/ci.sh -o ci.sh
# - ./ci.sh scan --app <name>
# - ./ci.sh sbom --format cyclonedx
#
# Pipeline Scan:
# - veracode pipeline scan --file <path>
#
# Utility Commands:
# - veracode whoami
# - veracode configure
# - veracode --version
# - veracode --help
#
# Output Formats:
# - table (default, human-readable)
# - json (machine-readable)
# - xml (detailed reports)
# - csv (spreadsheet-friendly)
#
# ============================================================================

# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# Common Issues:
#
# 1. CLI Not Found:
#    - Ensure installation script ran successfully
#    - Add to PATH: export PATH="$HOME/.veracode-cli:$PATH"
#    - Verify with: veracode --version
#
# 2. Authentication Errors:
#    - Check VERACODE_API_KEY_ID is set
#    - Check VERACODE_API_KEY_SECRET is set
#    - Verify credentials with: veracode whoami
#    - Ensure API credentials haven't expired
#
# 3. Application Not Found:
#    - Verify exact application name (case-sensitive)
#    - List all apps: veracode static app list
#    - Use GUID instead: --app-guid <guid>
#
# 4. No Results Available:
#    - Ensure scan has completed
#    - Check scan status first
#    - Verify you have permission to access results
#
# 5. Command Failures:
#    - Check CLI version: veracode --version
#    - Update CLI if needed
#    - Review error messages in output
#    - Add --verbose for detailed logging
#
# For more help: https://docs.veracode.com/r/Veracode_CLI
# ============================================================================
</script>

<script type="text/yaml" id="card17">
# URL: https://github.com/enzo-appsec/veracode-ci-cd-templates/blob/main/azure-pipelines/packaging-examples.yml
# ============================================================================
# Veracode Packaging Examples - Azure Pipelines Template
# ============================================================================
# This template demonstrates the Veracode CLI package command for automating
# application packaging before Static Analysis scans.
#
# The veracode package command:
# - Auto-detects build tools and dependencies
# - Compiles code into scannable artifacts
# - Packages into proper archive format
# - Validates artifact completeness
#
# Use Cases:
# - Upload and Scan (Policy Scan)
# - Pipeline Scan
# - NOT for SCA Agent-based Scan (use SCA Agent directly)
#
# Prerequisites:
# - Veracode API credentials (for upload)
# - Source code with build configuration
# - Build tools installed (Maven, MSBuild, etc.)
#
# Documentation:
# - Package Command: https://docs.veracode.com/r/veracode_package
# - Autopackaging: https://docs.veracode.com/r/About_auto_packaging
# ============================================================================

trigger: none  # Manual trigger for examples

pool:
  vmImage: 'ubuntu-latest'

# ============================================================================
# VARIABLES
# ============================================================================

variables:
  VERACODE_API_ID: $(veracode-api-id)
  VERACODE_API_KEY: $(veracode-api-key)
  APP_NAME: 'my-application'
  ARTIFACTS_DIR: '$(Build.ArtifactStagingDirectory)/veracode-artifacts'

# ============================================================================
# STAGES
# ============================================================================

stages:
  # ==========================================================================
  # STAGE 1: PACKAGE DISCOVERY
  # ==========================================================================

  - stage: Discovery
    displayName: 'Detect Build Configuration'
    jobs:
      - job: PackageDiscover
        displayName: 'Run veracode package discover'
        steps:
          - task: Bash@3
            displayName: 'Install Veracode CLI'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh
                export PATH="$HOME/.veracode-cli:$PATH"
                veracode --version

          - task: Bash@3
            displayName: 'Discover Toolchains'
            inputs:
              targetType: 'inline'
              script: |
                export PATH="$HOME/.veracode-cli:$PATH"

                echo "Discovering build configuration..."

                # Run package discover (supports MSBuild and Maven)
                veracode package discover \
                  --source "$(Build.SourcesDirectory)" \
                  --verbose

                # Show generated veracode.yml
                if [ -f veracode.yml ]; then
                  echo "Generated veracode.yml:"
                  cat veracode.yml
                else
                  echo "No veracode.yml generated (not MSBuild or Maven project)"
                fi

          - task: PublishPipelineArtifact@1
            condition: eq(variables['Agent.JobStatus'], 'Succeeded')
            displayName: 'Publish veracode.yml'
            inputs:
              targetPath: 'veracode.yml'
              artifact: 'veracode-config'

  # ==========================================================================
  # STAGE 2: JAVA (MAVEN) PACKAGING
  # ==========================================================================

  - stage: PackageJavaMaven
    displayName: 'Package Java (Maven) Application'
    jobs:
      - job: MavenPackage
        displayName: 'Maven Auto-Packaging'
        steps:
          - task: Bash@3
            displayName: 'Install Dependencies'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh
                export PATH="$HOME/.veracode-cli:$PATH"

          - task: Bash@3
            displayName: 'Package with Default Maven Goals'
            inputs:
              targetType: 'inline'
              script: |
                export PATH="$HOME/.veracode-cli:$PATH"
                mkdir -p "$(ARTIFACTS_DIR)"

                echo "Packaging Maven project..."

                veracode package \
                  --source "$(Build.SourcesDirectory)" \
                  --output "$(ARTIFACTS_DIR)" \
                  --trust \
                  --verbose

                echo "✓ Packaging complete"
                ls -lh "$(ARTIFACTS_DIR)"

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Artifacts'
            inputs:
              targetPath: '$(ARTIFACTS_DIR)'
              artifact: 'veracode-maven-package'

      - job: MavenCustom
        displayName: 'Maven Custom Build Configuration'
        steps:
          - task: Bash@3
            displayName: 'Install CLI'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh

          - task: Bash@3
            displayName: 'Package with Custom Maven Arguments'
            inputs:
              targetType: 'inline'
              script: |
                export PATH="$HOME/.veracode-cli:$PATH"
                mkdir -p "$(ARTIFACTS_DIR)"

                # Set custom Maven command
                export SRCCLR_CUSTOM_MAVEN_COMMAND="clean install -DskipTests -P production"

                echo "Using custom Maven command: $SRCCLR_CUSTOM_MAVEN_COMMAND"

                veracode package \
                  --source "$(Build.SourcesDirectory)" \
                  --output "$(ARTIFACTS_DIR)" \
                  --trust \
                  --verbose

                ls -lh "$(ARTIFACTS_DIR)"

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(ARTIFACTS_DIR)'
              artifact: 'veracode-maven-custom-package'

  # ==========================================================================
  # STAGE 3: .NET PACKAGING
  # ==========================================================================

  - stage: PackageDotNet
    displayName: 'Package .NET Application'
    jobs:
      - job: DotNetPackage
        displayName: '.NET MSBuild Packaging'
        pool:
          vmImage: 'windows-latest'  # Use Windows for MSBuild
        steps:
          - task: PowerShell@2
            displayName: 'Install Veracode CLI'
            inputs:
              targetType: 'inline'
              script: |
                # Download CLI installer
                Invoke-WebRequest -Uri "https://tools.veracode.com/veracode-cli/install" -OutFile install.ps1

                # Run installer
                .\install.ps1

                # Add to PATH
                $env:PATH += ";$env:USERPROFILE\.veracode-cli"

                # Verify
                veracode --version

          - task: PowerShell@2
            displayName: 'Discover .NET Projects'
            inputs:
              targetType: 'inline'
              script: |
                $env:PATH += ";$env:USERPROFILE\.veracode-cli"

                Write-Host "Discovering .NET build configuration..."

                veracode package discover `
                  --source "$(Build.SourcesDirectory)" `
                  --verbose

          - task: PowerShell@2
            displayName: 'Package .NET Application'
            inputs:
              targetType: 'inline'
              script: |
                $env:PATH += ";$env:USERPROFILE\.veracode-cli"

                # Create output directory
                New-Item -ItemType Directory -Force -Path "$(ARTIFACTS_DIR)"

                # Set .NET build configuration
                $env:SRCCLR_MSVC_CONFIGURATION = "Release"
                $env:SRCCLR_MSVC_PLATFORM = "x64"

                Write-Host "Packaging .NET application..."
                Write-Host "Configuration: $env:SRCCLR_MSVC_CONFIGURATION"
                Write-Host "Platform: $env:SRCCLR_MSVC_PLATFORM"

                veracode package `
                  --source "$(Build.SourcesDirectory)" `
                  --output "$(ARTIFACTS_DIR)" `
                  --trust `
                  --verbose

                Get-ChildItem -Path "$(ARTIFACTS_DIR)"

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(ARTIFACTS_DIR)'
              artifact: 'veracode-dotnet-package'

  # ==========================================================================
  # STAGE 4: JAVASCRIPT/NODE.JS PACKAGING
  # ==========================================================================

  - stage: PackageNodeJS
    displayName: 'Package Node.js Application'
    jobs:
      - job: NodePackage
        displayName: 'Node.js Packaging'
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: '18.x'

          - task: Bash@3
            displayName: 'Install CLI'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh

          - task: Bash@3
            displayName: 'Package Node.js Application'
            inputs:
              targetType: 'inline'
              script: |
                export PATH="$HOME/.veracode-cli:$PATH"
                mkdir -p "$(ARTIFACTS_DIR)"

                echo "Packaging Node.js application..."

                veracode package \
                  --source "$(Build.SourcesDirectory)" \
                  --output "$(ARTIFACTS_DIR)" \
                  --trust \
                  --verbose

                ls -lh "$(ARTIFACTS_DIR)"

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(ARTIFACTS_DIR)'
              artifact: 'veracode-nodejs-package'

  # ==========================================================================
  # STAGE 5: PYTHON PACKAGING
  # ==========================================================================

  - stage: PackagePython
    displayName: 'Package Python Application'
    jobs:
      - job: PythonPackage
        displayName: 'Python Packaging'
        steps:
          - task: UsePythonVersion@0
            displayName: 'Setup Python'
            inputs:
              versionSpec: '3.11'

          - task: Bash@3
            displayName: 'Install CLI'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh

          - task: Bash@3
            displayName: 'Package Python Application'
            inputs:
              targetType: 'inline'
              script: |
                export PATH="$HOME/.veracode-cli:$PATH"
                mkdir -p "$(ARTIFACTS_DIR)"

                echo "Packaging Python application..."

                # Note: Projects without package manager will generate "no-pm" artifact
                veracode package \
                  --source "$(Build.SourcesDirectory)" \
                  --output "$(ARTIFACTS_DIR)" \
                  --trust \
                  --verbose

                echo "✓ Package created (may be 'no-pm' if no package manager)"
                ls -lh "$(ARTIFACTS_DIR)"

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(ARTIFACTS_DIR)'
              artifact: 'veracode-python-package'

  # ==========================================================================
  # STAGE 6: GO PACKAGING
  # ==========================================================================

  - stage: PackageGo
    displayName: 'Package Go Application'
    jobs:
      - job: GoPackage
        displayName: 'Go Packaging'
        steps:
          - task: GoTool@0
            displayName: 'Setup Go'
            inputs:
              version: '1.21'

          - task: Bash@3
            displayName: 'Install CLI'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh

          - task: Bash@3
            displayName: 'Package Go Application'
            inputs:
              targetType: 'inline'
              script: |
                export PATH="$HOME/.veracode-cli:$PATH"
                mkdir -p "$(ARTIFACTS_DIR)"

                # Enable CGO code generation if needed
                export VERACODE_PACKAGE_GOLANG_GENERATE=true

                echo "Packaging Go application..."
                echo "CGO generation: $VERACODE_PACKAGE_GOLANG_GENERATE"

                # Note: Nested Go modules are excluded
                veracode package \
                  --source "$(Build.SourcesDirectory)" \
                  --output "$(ARTIFACTS_DIR)" \
                  --trust \
                  --verbose

                ls -lh "$(ARTIFACTS_DIR)"

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(ARTIFACTS_DIR)'
              artifact: 'veracode-go-package'

  # ==========================================================================
  # STAGE 7: GIT REPOSITORY PACKAGING
  # ==========================================================================

  - stage: PackageRepository
    displayName: 'Package from Git Repository'
    jobs:
      - job: RepoPackage
        displayName: 'Repository Packaging'
        steps:
          - task: Bash@3
            displayName: 'Install CLI'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh

          - task: Bash@3
            displayName: 'Package from GitHub Repository'
            inputs:
              targetType: 'inline'
              script: |
                export PATH="$HOME/.veracode-cli:$PATH"
                mkdir -p "$(ARTIFACTS_DIR)"

                echo "Packaging from GitHub repository..."

                # Package from public repository
                veracode package \
                  --source https://github.com/veracode/verademo \
                  --type repo \
                  --output "$(ARTIFACTS_DIR)" \
                  --trust \
                  --verbose

                echo "✓ Repository cloned, built, and packaged"
                ls -lh "$(ARTIFACTS_DIR)"

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(ARTIFACTS_DIR)'
              artifact: 'veracode-repo-package'

  # ==========================================================================
  # STAGE 8: PACKAGE + UPLOAD WORKFLOW
  # ==========================================================================

  - stage: PackageAndUpload
    displayName: 'Complete Package + Upload Workflow'
    jobs:
      - job: CompleteWorkflow
        displayName: 'Package and Upload to Veracode'
        steps:
          - task: Bash@3
            displayName: 'Install CLI'
            inputs:
              targetType: 'inline'
              script: |
                curl -fsS https://tools.veracode.com/veracode-cli/install | sh
                export PATH="$HOME/.veracode-cli:$PATH"
                veracode --version

          - task: Bash@3
            displayName: 'Package Application'
            inputs:
              targetType: 'inline'
              script: |
                export PATH="$HOME/.veracode-cli:$PATH"
                mkdir -p "$(ARTIFACTS_DIR)"

                echo "Step 1: Packaging application..."

                veracode package \
                  --source "$(Build.SourcesDirectory)" \
                  --output "$(ARTIFACTS_DIR)" \
                  --trust \
                  --verbose \
                  --strict  # Exit code 4 on build failures

                echo "✓ Packaging complete"
                ls -lh "$(ARTIFACTS_DIR)"

          - task: Bash@3
            displayName: 'Upload for Policy Scan'
            inputs:
              targetType: 'inline'
              script: |
                export PATH="$HOME/.veracode-cli:$PATH"

                echo "Step 2: Uploading to Veracode for Policy Scan..."

                # Find the packaged artifact
                ARTIFACT=$(find "$(ARTIFACTS_DIR)" -name "*.zip" -o -name "*.jar" | head -1)

                if [ -z "$ARTIFACT" ]; then
                  echo "❌ No artifact found in $(ARTIFACTS_DIR)"
                  exit 1
                fi

                echo "Found artifact: $ARTIFACT"

                # Upload using veracode static scan
                veracode static scan \
                  --source "$ARTIFACT" \
                  --app "$(APP_NAME)" \
                  --create-app \
                  --sandbox-name "Azure-Pipeline-$(Build.BuildNumber)" \
                  --results-file results.json
            env:
              VERACODE_API_KEY_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY_SECRET: $(VERACODE_API_KEY)

          - task: Bash@3
            displayName: 'Alternative: Pipeline Scan'
            inputs:
              targetType: 'inline'
              script: |
                export PATH="$HOME/.veracode-cli:$PATH"

                echo "Alternative: Running Pipeline Scan instead..."

                ARTIFACT=$(find "$(ARTIFACTS_DIR)" -name "*.zip" -o -name "*.jar" | head -1)

                # Run Pipeline Scan for fast feedback
                veracode static pipeline-scan \
                  --file "$ARTIFACT" \
                  --fail-on-severity "Very High,High" \
                  --json-output-file pipeline-results.json
            env:
              VERACODE_API_KEY_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY_SECRET: $(VERACODE_API_KEY)

          - task: PublishPipelineArtifact@1
            condition: always()
            displayName: 'Publish All Results'
            inputs:
              targetPath: '$(ARTIFACTS_DIR)'
              artifact: 'veracode-complete-workflow'

# ============================================================================
# TROUBLESHOOTING EXAMPLES
# ============================================================================

  - stage: Troubleshooting
    displayName: 'Troubleshooting Examples'
    condition: false  # Disabled by default
    jobs:
      - job: DebugPackaging
        displayName: 'Debug Packaging Issues'
        steps:
          - task: Bash@3
            displayName: 'Verbose Packaging with Error Handling'
            inputs:
              targetType: 'inline'
              script: |
                export PATH="$HOME/.veracode-cli:$PATH"
                mkdir -p "$(ARTIFACTS_DIR)"

                echo "Running package with verbose output and error handling..."

                # Use strict mode for better error detection
                set -e

                veracode package \
                  --source "$(Build.SourcesDirectory)" \
                  --output "$(ARTIFACTS_DIR)" \
                  --trust \
                  --verbose \
                  --strict || {
                    EXIT_CODE=$?
                    echo "❌ Packaging failed with exit code: $EXIT_CODE"

                    if [ $EXIT_CODE -eq 4 ]; then
                      echo "Build failure detected (exit code 4)"
                    fi

                    exit $EXIT_CODE
                  }

                echo "✓ Packaging succeeded"

# ============================================================================
# USAGE NOTES
# ============================================================================
#
# Package Command Flags:
# --source (-s)     : Source location (required)
# --trust (-a)      : Acknowledge source is trustworthy (required first use)
# --output (-o)     : Output directory (default: current directory)
# --type (-t)       : Source type: directory or repo (default: directory)
# --verbose (-v)    : Show detailed output
# --strict          : Return exit code 4 on build failures
# --help (-h)       : Show help
#
# Environment Variables:
# SRCCLR_CUSTOM_MAVEN_COMMAND    : Custom Maven arguments
# VERACODE_PACKAGE_GOLANG_GENERATE : Enable Go CGO generation
# SRCCLR_MSVC_CONFIGURATION      : .NET build configuration
# SRCCLR_MSVC_PLATFORM           : .NET platform (x64, x86, ARM64)
# SRCCLR_IOS_SCHEME              : iOS build scheme
# SRCCLR_IOS_DESTINATION         : iOS platform
# SRCCLR_MAKE_TARGETS            : Make targets
# SRCCLR_MAKE_JOBS               : Make parallel jobs
#
# Supported Languages (25+):
# - Java (Maven, Gradle)
# - .NET (C#, VB.NET, F#)
# - JavaScript/TypeScript (Node.js)
# - Python
# - Go
# - iOS/Swift
# - Android
# - C/C++
# - Ruby, PHP, Perl, and more
#
# Limitations:
# - SCA Agent-based Scan NOT supported (use SCA Agent instead)
# - Discover only supports MSBuild and Maven currently
# - Repository packaging uses temporary clone
# - Archives must not be password-protected
# - UTF-8 encoding required
#
# Best Practices:
# 1. Run "veracode package discover" first (for .NET/Maven)
# 2. Use --verbose during initial setup
# 3. Specify --output directory for organization
# 4. Use --strict to catch build failures
# 5. Test packaging locally before CI/CD integration
#
# Documentation:
# - Package Command: https://docs.veracode.com/r/veracode_package
# - CLI Reference: https://docs.veracode.com/r/CLI_Reference
# - Autopackaging: https://docs.veracode.com/r/About_auto_packaging
# - Compilation & Packaging: https://docs.veracode.com/r/compilation_packaging
# ============================================================================
</script>

<script type="text/yaml" id="card18">
# URL: https://github.com/enzo-appsec/veracode-ci-cd-templates/blob/main/azure-pipelines/pipeline-scan.yml
# ============================================================================
# Veracode Pipeline Scan (SAST) - Azure Pipelines Template
# ============================================================================
# This template demonstrates how to integrate Veracode Pipeline Scan into
# your Azure DevOps pipeline for fast Static Application Security Testing.
#
# Pipeline Scan provides results in minutes (vs hours for Policy Scan) and is
# ideal for shift-left security in CI/CD workflows.
#
# Prerequisites:
# - Veracode API credentials stored in Azure Pipeline variables or variable group
# - Application compiled/packaged (JAR, WAR, ZIP, etc.)
# - Veracode Pipeline Scanner (downloaded during pipeline execution)
#
# Documentation: https://docs.veracode.com/r/Pipeline_Scan
# ============================================================================

trigger:
  branches:
    include:
      - main
      - develop
      - feature/*
  paths:
    exclude:
      - '*.md'
      - 'docs/**'

# Optionally run on pull requests
pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

# ============================================================================
# VARIABLES CONFIGURATION
# ============================================================================
# Store VERACODE_API_ID and VERACODE_API_KEY in Azure Pipeline variables
# or link a variable group containing these credentials
# ============================================================================

variables:
  # Option 1: Use a variable group (recommended for credential management)
  # - group: 'veracode-credentials'

  # Option 2: Reference pipeline variables directly
  VERACODE_API_ID: $(veracode-api-id)
  VERACODE_API_KEY: $(veracode-api-key)

  # Application-specific settings
  APP_NAME: 'my-application'
  SCAN_RESULTS_DIR: '$(Build.ArtifactStagingDirectory)/veracode-results'

stages:
  - stage: Build
    displayName: 'Build Application'
    jobs:
      - job: BuildJob
        displayName: 'Build and Package'
        steps:
          # ====================================================================
          # BUILD BLOCK - Customize for your application
          # ====================================================================
          # Replace this section with your actual build process
          # Common examples below:
          # ====================================================================

          # Example: Maven build
          - task: Maven@3
            displayName: 'Build with Maven'
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'clean package'
              options: '-DskipTests'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.11'

          # Example: Gradle build
          # - task: Gradle@2
          #   displayName: 'Build with Gradle'
          #   inputs:
          #     gradleWrapperFile: 'gradlew'
          #     tasks: 'build'
          #     options: '-x test'

          # Example: .NET build
          # - task: DotNetCoreCLI@2
          #   displayName: 'Build with .NET'
          #   inputs:
          #     command: 'publish'
          #     publishWebProjects: true
          #     arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'

          # ====================================================================
          # PUBLISH BUILD ARTIFACT
          # ====================================================================
          # Publish the compiled artifact for the security scan stage
          # ====================================================================

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Build Artifact'
            inputs:
              targetPath: 'target'  # Adjust path to your build output
              artifact: 'build-artifact'
              publishLocation: 'pipeline'

  - stage: SecurityScan
    displayName: 'Veracode Pipeline Scan'
    dependsOn: Build
    jobs:
      - job: PipelineScanJob
        displayName: 'Run Veracode Pipeline Scan'
        steps:
          # ====================================================================
          # DOWNLOAD BUILD ARTIFACT
          # ====================================================================

          - task: DownloadPipelineArtifact@2
            displayName: 'Download Build Artifact'
            inputs:
              artifact: 'build-artifact'
              path: '$(System.DefaultWorkingDirectory)/build-output'

          # ====================================================================
          # SETUP BLOCK - Download Veracode Pipeline Scanner
          # ====================================================================
          # The Pipeline Scanner is a Java-based tool that runs locally
          # ====================================================================

          - task: Bash@3
            displayName: 'Download Veracode Pipeline Scanner'
            inputs:
              targetType: 'inline'
              script: |
                echo "Downloading Veracode Pipeline Scanner..."
                curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
                unzip -o pipeline-scan-LATEST.zip
                echo "Pipeline Scanner downloaded successfully"
                ls -la pipeline-scan.jar

          # ====================================================================
          # SCAN BLOCK - Execute Veracode Pipeline Scan
          # ====================================================================
          # This runs the actual security scan on your application
          #
          # Key Parameters:
          # - veracode_api_id: Your Veracode API ID (from variables)
          # - veracode_api_key: Your Veracode API Key (from variables)
          # - file: Path to the file to scan (JAR, WAR, ZIP, etc.)
          # - fail_on_severity: Fail build on specified severities
          # - fail_on_cwe: Fail build on specific CWE IDs
          # - baseline_file: Compare against previous scan results
          # ====================================================================

          - task: Bash@3
            displayName: 'Run Pipeline Scan'
            inputs:
              targetType: 'inline'
              script: |
                echo "Starting Veracode Pipeline Scan for $(APP_NAME)..."

                # Create results directory
                mkdir -p $(SCAN_RESULTS_DIR)

                # Run the Pipeline Scanner
                java -jar pipeline-scan.jar \
                  --veracode_api_id "$(VERACODE_API_ID)" \
                  --veracode_api_key "$(VERACODE_API_KEY)" \
                  --file "$(System.DefaultWorkingDirectory)/build-output/*.jar" \
                  --project_name "$(APP_NAME)" \
                  --project_url "$(Build.Repository.Uri)" \
                  --project_ref "$(Build.SourceBranchName)" \
                  --fail_on_severity="Very High, High" \
                  --json_output_file "$(SCAN_RESULTS_DIR)/results.json" \
                  --summary_output \
                  --summary_output_file "$(SCAN_RESULTS_DIR)/summary.json"

                echo "Scan completed. Results saved to $(SCAN_RESULTS_DIR)"
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)
            # Remove 'continueOnError: true' to fail the build on scan failures
            continueOnError: false

          # ====================================================================
          # OPTIONAL: Baseline Comparison Block
          # ====================================================================
          # Compare current scan results against a baseline to only fail on
          # NEW vulnerabilities introduced in this build
          # ====================================================================

          # - task: Bash@3
          #   displayName: 'Run Pipeline Scan with Baseline'
          #   inputs:
          #     targetType: 'inline'
          #     script: |
          #       java -jar pipeline-scan.jar \
          #         --veracode_api_id "$(VERACODE_API_ID)" \
          #         --veracode_api_key "$(VERACODE_API_KEY)" \
          #         --file "$(System.DefaultWorkingDirectory)/build-output/*.jar" \
          #         --baseline_file "baseline.json" \
          #         --fail_on_severity="Very High, High" \
          #         --json_output_file "$(SCAN_RESULTS_DIR)/results.json"

          # ====================================================================
          # RESULTS BLOCK - Publish Scan Results
          # ====================================================================
          # Save scan results as build artifacts for review and audit
          # ====================================================================

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Scan Results'
            condition: always()  # Always publish results, even if scan fails
            inputs:
              targetPath: '$(SCAN_RESULTS_DIR)'
              artifact: 'veracode-pipeline-scan-results'
              publishLocation: 'pipeline'

          # ====================================================================
          # OPTIONAL: Convert Results to SARIF for Azure DevOps Integration
          # ====================================================================
          # SARIF format enables native integration with Azure DevOps
          # security dashboard
          # ====================================================================

          # - task: Bash@3
          #   displayName: 'Convert to SARIF Format'
          #   condition: always()
          #   inputs:
          #     targetType: 'inline'
          #     script: |
          #       # Install veracode-pipeline-scan-results-to-sarif converter
          #       npm install -g @veracode/pipeline-scan-results-to-sarif
          #
          #       # Convert JSON results to SARIF
          #       veracode-pipeline-scan-results-to-sarif \
          #         --input $(SCAN_RESULTS_DIR)/results.json \
          #         --output $(SCAN_RESULTS_DIR)/results.sarif

          # - task: PublishBuildArtifacts@1
          #   displayName: 'Publish SARIF Results'
          #   condition: always()
          #   inputs:
          #     PathtoPublish: '$(SCAN_RESULTS_DIR)/results.sarif'
          #     ArtifactName: 'CodeAnalysisLogs'

# ============================================================================
# CONFIGURATION OPTIONS
# ============================================================================
#
# Severity Levels (for --fail_on_severity):
# - "Very High"
# - "High"
# - "Medium"
# - "Low"
# - "Very Low"
# - "Informational"
#
# Common CWE IDs (for --fail_on_cwe):
# - 79: Cross-Site Scripting (XSS)
# - 89: SQL Injection
# - 78: OS Command Injection
# - 22: Path Traversal
# - 352: Cross-Site Request Forgery (CSRF)
# - 798: Use of Hard-coded Credentials
#
# Usage Examples:
# --fail_on_severity="Very High, High"
# --fail_on_cwe="79,89,78"
#
# Additional Options:
# --timeout: Maximum scan time in minutes (default: 60)
# --include: Additional files to include in scan
# --exclude: Files to exclude from scan
# --development_stage: Development stage (Development/Testing/Release)
#
# ============================================================================

# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# Common Issues:
#
# 1. Authentication Errors:
#    - Verify VERACODE_API_ID and VERACODE_API_KEY are set correctly
#    - Ensure credentials are marked as "secret" in pipeline variables
#    - Check API credentials haven't expired in Veracode Platform
#
# 2. File Not Found:
#    - Verify build artifact path is correct
#    - Ensure build completed successfully before scan
#    - Check file permissions
#
# 3. Scan Failures:
#    - Review results.json for detailed findings
#    - Check if --fail_on_severity threshold is too strict
#    - Verify uploaded file is a valid application package
#
# 4. Performance Issues:
#    - Use --timeout to extend scan time for large applications
#    - Consider scanning only changed files for faster feedback
#
# For more help: https://docs.veracode.com/r/c_pipeline_scan_commands
# ============================================================================

</script>

<script type="text/yaml" id="card19">
# URL: https://github.com/enzo-appsec/veracode-ci-cd-templates/blob/main/azure-pipelines/policy-scan.yml
# ============================================================================
# Veracode Policy Scan (Comprehensive SAST) - Azure Pipelines Template
# ============================================================================
# This template demonstrates how to integrate Veracode Policy Scan into your
# Azure DevOps pipeline for comprehensive Static Application Security Testing
# and policy compliance verification.
#
# Policy Scan provides thorough security analysis and is used for:
# - Release candidate validation
# - Policy compliance reporting
# - Detailed flaw remediation guidance
# - Security gate checks before production
#
# Note: Policy Scan takes longer than Pipeline Scan (hours vs minutes)
# but provides comprehensive results and policy enforcement.
#
# Prerequisites:
# - Veracode API credentials stored in Azure Pipeline variables
# - Application compiled/packaged (JAR, WAR, ZIP, etc.)
# - Veracode application profile created (or auto-created)
#
# Documentation: https://docs.veracode.com/r/Veracode_Upload_and_Scan
# ============================================================================

trigger:
  branches:
    include:
      - main
      - release/*
  paths:
    exclude:
      - '*.md'
      - 'docs/**'

# Only run on release branches and main
pr: none

pool:
  vmImage: 'ubuntu-latest'

# ============================================================================
# VARIABLES CONFIGURATION
# ============================================================================

variables:
  # Option 1: Use a variable group (recommended)
  # - group: 'veracode-credentials'

  # Option 2: Reference pipeline variables
  VERACODE_API_ID: $(veracode-api-id)
  VERACODE_API_KEY: $(veracode-api-key)

  # Application configuration
  APP_NAME: 'my-application'
  APP_VERSION: '$(Build.BuildNumber)'

  # Scan configuration
  SCAN_TIMEOUT: '60'  # Minutes to wait for scan completion
  FAIL_BUILD_ON_POLICY: 'true'  # Fail if policy compliance fails

stages:
  - stage: Build
    displayName: 'Build Application'
    jobs:
      - job: BuildJob
        displayName: 'Build and Package'
        steps:
          # ====================================================================
          # BUILD BLOCK
          # ====================================================================

          - task: Maven@3
            displayName: 'Build with Maven'
            inputs:
              mavenPomFile: 'pom.xml'
              goals: 'clean package'
              options: '-DskipTests'
              javaHomeOption: 'JDKVersion'
              jdkVersionOption: '1.11'

          # ====================================================================
          # PUBLISH BUILD ARTIFACT
          # ====================================================================

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Build Artifact'
            inputs:
              targetPath: 'target'
              artifact: 'build-artifact'
              publishLocation: 'pipeline'

  - stage: SecurityScan
    displayName: 'Veracode Policy Scan'
    dependsOn: Build
    jobs:
      - job: UploadAndScan
        displayName: 'Upload to Veracode Platform'
        steps:
          # ====================================================================
          # DOWNLOAD BUILD ARTIFACT
          # ====================================================================

          - task: DownloadPipelineArtifact@2
            displayName: 'Download Build Artifact'
            inputs:
              artifact: 'build-artifact'
              path: '$(System.DefaultWorkingDirectory)/build-output'

          # ====================================================================
          # METHOD 1: Using Veracode API Wrapper (Recommended)
          # ====================================================================
          # The API wrapper handles upload chunking and retry logic
          # ====================================================================

          - task: Bash@3
            displayName: 'Download Veracode API Wrapper'
            inputs:
              targetType: 'inline'
              script: |
                echo "Downloading Veracode API Wrapper..."
                curl -sSO https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/23.8.12.0/vosp-api-wrappers-java-23.8.12.0.jar
                mv vosp-api-wrappers-java-23.8.12.0.jar VeracodeJavaAPI.jar
                echo "API Wrapper downloaded successfully"

          # ====================================================================
          # UPLOAD BLOCK - Upload Application for Scanning
          # ====================================================================
          # This uploads your application to Veracode Platform
          #
          # Key Parameters:
          # - appname: Application name in Veracode Platform
          # - createprofile: Auto-create app profile if it doesn't exist
          # - version: Build version identifier
          # - filepath: Path to file(s) to upload
          # - sandboxname: Optional sandbox for testing
          # ====================================================================

          - task: Bash@3
            displayName: 'Upload to Veracode'
            inputs:
              targetType: 'inline'
              script: |
                echo "Uploading $(APP_NAME) version $(APP_VERSION) to Veracode..."

                java -jar VeracodeJavaAPI.jar \
                  -vid "$(VERACODE_API_ID)" \
                  -vkey "$(VERACODE_API_KEY)" \
                  -action UploadAndScan \
                  -appname "$(APP_NAME)" \
                  -createprofile true \
                  -version "$(APP_VERSION)" \
                  -filepath "$(System.DefaultWorkingDirectory)/build-output/*.jar" \
                  -autoscan true

                echo "Upload completed. Scan initiated."
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

          # ====================================================================
          # WAIT BLOCK - Wait for Scan Completion
          # ====================================================================
          # Poll Veracode Platform until scan completes
          # ====================================================================

          - task: Bash@3
            displayName: 'Wait for Scan Completion'
            inputs:
              targetType: 'inline'
              script: |
                echo "Waiting for scan to complete (timeout: $(SCAN_TIMEOUT) minutes)..."

                START_TIME=$(date +%s)
                TIMEOUT_SECONDS=$(($(SCAN_TIMEOUT) * 60))

                while true; do
                  # Get scan status
                  STATUS=$(java -jar VeracodeJavaAPI.jar \
                    -vid "$(VERACODE_API_ID)" \
                    -vkey "$(VERACODE_API_KEY)" \
                    -action GetBuildInfo \
                    -appname "$(APP_NAME)" \
                    -version "$(APP_VERSION)" | grep "status=" | cut -d'"' -f2)

                  echo "Current scan status: $STATUS"

                  # Check if scan is complete
                  if [[ "$STATUS" == "Results Ready" ]]; then
                    echo "✓ Scan completed successfully"
                    break
                  elif [[ "$STATUS" == "Scan Failed" ]] || [[ "$STATUS" == "Incomplete" ]]; then
                    echo "✗ Scan failed or incomplete"
                    exit 1
                  fi

                  # Check timeout
                  CURRENT_TIME=$(date +%s)
                  ELAPSED=$((CURRENT_TIME - START_TIME))
                  if [ $ELAPSED -gt $TIMEOUT_SECONDS ]; then
                    echo "✗ Scan timeout after $(SCAN_TIMEOUT) minutes"
                    exit 1
                  fi

                  # Wait before next check
                  echo "Waiting 60 seconds before next check..."
                  sleep 60
                done
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

      - job: CheckPolicyCompliance
        displayName: 'Check Policy Compliance'
        dependsOn: UploadAndScan
        steps:
          # ====================================================================
          # DOWNLOAD API WRAPPER
          # ====================================================================

          - task: Bash@3
            displayName: 'Download Veracode API Wrapper'
            inputs:
              targetType: 'inline'
              script: |
                curl -sSO https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/23.8.12.0/vosp-api-wrappers-java-23.8.12.0.jar
                mv vosp-api-wrappers-java-23.8.12.0.jar VeracodeJavaAPI.jar

          # ====================================================================
          # POLICY COMPLIANCE BLOCK
          # ====================================================================
          # Check if the scan passed policy compliance
          # ====================================================================

          - task: Bash@3
            displayName: 'Check Policy Compliance'
            inputs:
              targetType: 'inline'
              script: |
                echo "Checking policy compliance for $(APP_NAME)..."

                # Get detailed results
                java -jar VeracodeJavaAPI.jar \
                  -vid "$(VERACODE_API_ID)" \
                  -vkey "$(VERACODE_API_KEY)" \
                  -action DetailedReport \
                  -appname "$(APP_NAME)" \
                  -version "$(APP_VERSION)" \
                  -outputfilepath "detailed-report.xml"

                # Get summary report
                java -jar VeracodeJavaAPI.jar \
                  -vid "$(VERACODE_API_ID)" \
                  -vkey "$(VERACODE_API_KEY)" \
                  -action SummaryReport \
                  -appname "$(APP_NAME)" \
                  -version "$(APP_VERSION)" \
                  -outputfilepath "summary-report.pdf"

                # Check policy compliance status
                POLICY_COMPLIANCE=$(grep -oP 'policy_compliance_status="\K[^"]+' detailed-report.xml || echo "Unknown")

                echo "Policy Compliance Status: $POLICY_COMPLIANCE"

                if [[ "$POLICY_COMPLIANCE" == "Pass" ]]; then
                  echo "✓ Build passed policy compliance"
                  exit 0
                elif [[ "$POLICY_COMPLIANCE" == "Not Assessed" ]]; then
                  echo "⚠ Policy compliance not assessed"
                  if [[ "$(FAIL_BUILD_ON_POLICY)" == "true" ]]; then
                    exit 1
                  fi
                else
                  echo "✗ Build failed policy compliance"
                  if [[ "$(FAIL_BUILD_ON_POLICY)" == "true" ]]; then
                    exit 1
                  fi
                fi
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

          # ====================================================================
          # RESULTS BLOCK - Publish Reports
          # ====================================================================

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Scan Reports'
            condition: always()
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)'
              artifact: 'veracode-policy-scan-results'
              publishLocation: 'pipeline'
            # Publish XML and PDF reports

# ============================================================================
# ALTERNATIVE: Using Veracode Upload API (REST)
# ============================================================================
# This section shows how to use the REST API instead of Java wrapper

<script type="text/yaml" id="card20">
# URL: https://github.com/enzo-appsec/veracode-ci-cd-templates/blob/main/azure-pipelines/sca-scan.yml
# ============================================================================
# Veracode SCA Scan (Software Composition Analysis) - Azure Pipelines Template
# ============================================================================
# This template demonstrates how to integrate Veracode SCA scanning into your
# Azure DevOps pipeline to identify vulnerabilities in third-party dependencies
# and open-source components.
#
# SCA Scan analyzes:
# - Third-party libraries and dependencies
# - Known vulnerabilities (CVEs)
# - License compliance and risks
# - Outdated components
# - Transitive dependencies
#
# SCA runs quickly (minutes) and can run in parallel with other scans.
#
# Prerequisites:
# - Veracode SCA Agent credentials (SRCCLR_API_TOKEN)
# - Dependency manifest files (pom.xml, package.json, requirements.txt, etc.)
# - Source code with dependency declarations
#
# Documentation: https://docs.veracode.com/r/Agent_Based_Scans
# ============================================================================

trigger:
  branches:
    include:
      - main
      - develop
      - feature/*
  paths:
    exclude:
      - '*.md'
      - 'docs/**'

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

# ============================================================================
# VARIABLES CONFIGURATION
# ============================================================================
# SRCCLR_API_TOKEN Setup Instructions:
#
# 1. Obtain Your SCA Agent Token:
#    - Log into Veracode Platform (https://analysiscenter.veracode.com/)
#    - Navigate to: Scans & Analysis → Software Composition Analysis
#    - Select: Agent-Based Scan
#    - Select a Workspace (or create one)
#    - Select: Agents → Actions → Create
#    - Select any Integration Option
#    - Click: Create Agent & Generate Token
#    - COPY THE TOKEN IMMEDIATELY - it only displays once!
#
# 2. Store Token in Azure DevOps:
#    - Option 1 (Recommended): Variable Groups
#      * Pipelines → Library → Variable groups
#      * Create group: 'veracode-sca-credentials'
#      * Add variable: SRCCLR_API_TOKEN (value from step 1)
#      * Lock variable (mark as secret)
#
#    - Option 2: Pipeline Variables
#      * Edit Pipeline → Variables
#      * Add: srcclr-api-token (value from step 1)
#      * Lock variable with lock icon
#
# 3. Required Permissions:
#    - Organization agent: Security Lead role
#    - Workspace agent: Security Lead, Workspace Admin, Workspace Editor, or Submitter
#
# 4. Regional Configuration (if applicable):
#    - European Region: Add SRCCLR_REGION=ER
#    - US Federal Region: Add SRCCLR_REGION=FED
#
# Documentation: https://docs.veracode.com/r/Manage_agents_and_scans
# ============================================================================

variables:
  # Option 1: Use variable group (Recommended)
  # - group: 'veracode-sca-credentials'

  # Option 2: Reference pipeline variable
  SRCCLR_API_TOKEN: $(srcclr-api-token)

  # Application settings
  APP_NAME: 'my-application'

  # SCA configuration
  FAIL_ON_VULNERABILITY: 'true'  # Fail build on vulnerabilities
  VULNERABILITY_SEVERITY: 'high'  # Minimum severity to fail: low, medium, high, critical

  # Regional configuration (uncomment if needed)
  # SRCCLR_REGION: 'ER'  # For European region (or 'FED' for US Federal)

stages:
  - stage: Dependencies
    displayName: 'Build and SCA Scan'
    jobs:
      - job: SCAScan
        displayName: 'Veracode SCA Scan'
        steps:
          # ====================================================================
          # CHECKOUT BLOCK
          # ====================================================================

          - checkout: self

          # ====================================================================
          # METHOD 1: Using Veracode SCA Agent (Recommended)
          # ====================================================================
          # The SCA Agent automatically detects package managers and scans
          # ====================================================================

          - task: Bash@3
            displayName: 'Download Veracode SCA Agent'
            inputs:
              targetType: 'inline'
              script: |
                echo "Downloading Veracode SCA Agent..."
                curl -sSL https://download.sourceclear.com/ci.sh -o ci.sh
                chmod +x ci.sh
                echo "SCA Agent downloaded successfully"

          # ====================================================================
          # SCAN BLOCK - Run SCA Scan
          # ====================================================================
          # The agent will:
          # 1. Detect package managers (Maven, npm, pip, etc.)
          # 2. Analyze dependency manifests
          # 3. Identify vulnerable components
          # 4. Report to Veracode Platform
          # ====================================================================

          - task: Bash@3
            displayName: 'Run SCA Scan'
            inputs:
              targetType: 'inline'
              script: |
                echo "Starting Veracode SCA scan for $(APP_NAME)..."

                # Run the SCA agent
                ./ci.sh scan \
                  --app $(APP_NAME) \
                  --allow-dirty

                echo "SCA scan completed"
            env:
              SRCCLR_API_TOKEN: $(SRCCLR_API_TOKEN)
            # Set continueOnError based on policy
            continueOnError: false

          # ====================================================================
          # OPTIONAL: Scan Specific Package Manager
          # ====================================================================
          # If you need to target a specific package manager or directory
          # ====================================================================

          # Java/Maven example
          # - task: Bash@3
          #   displayName: 'SCA Scan - Maven'
          #   inputs:
          #     targetType: 'inline'
          #     script: |
          #       ./ci.sh scan \
          #         --app $(APP_NAME) \
          #         --maven
          #   env:
          #     SRCCLR_API_TOKEN: $(SRCCLR_API_TOKEN)

          # Node.js/npm example
          # - task: Bash@3
          #   displayName: 'SCA Scan - npm'
          #   inputs:
          #     targetType: 'inline'
          #     script: |
          #       ./ci.sh scan \
          #         --app $(APP_NAME) \
          #         --npm
          #   env:
          #     SRCCLR_API_TOKEN: $(SRCCLR_API_TOKEN)

          # Python/pip example
          # - task: Bash@3
          #   displayName: 'SCA Scan - Python'
          #   inputs:
          #     targetType: 'inline'
          #     script: |
          #       ./ci.sh scan \
          #         --app $(APP_NAME) \
          #         --python
          #   env:
          #     SRCCLR_API_TOKEN: $(SRCCLR_API_TOKEN)

          # ====================================================================
          # METHOD 2: Using Veracode CLI (Alternative)
          # ====================================================================
          # Use the Veracode CLI for more control
          # Uncomment to use this approach
          # ====================================================================

          # - task: Bash@3
          #   displayName: 'Download Veracode CLI'
          #   inputs:
          #     targetType: 'inline'
          #     script: |
          #       curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          #       export PATH="$PATH:$HOME/.veracode-cli"
          #
          # - task: Bash@3
          #   displayName: 'SCA Scan with CLI'
          #   inputs:
          #     targetType: 'inline'
          #     script: |
          #       veracode sca scan \
          #         --source . \
          #         --project $(APP_NAME)
          #   env:
          #     VERACODE_API_KEY_ID: $(VERACODE_API_ID)
          #     VERACODE_API_KEY_SECRET: $(VERACODE_API_KEY)

  # ==========================================================================
  # PARALLEL BUILD STAGE (Optional)
  # ==========================================================================
  # Run SCA in parallel with application build for faster pipelines
  # ==========================================================================

  # - stage: BuildAndScan
  #   displayName: 'Build and Scan in Parallel'
  #   jobs:
  #     - job: Build
  #       displayName: 'Build Application'
  #       steps:
  #         - task: Maven@3
  #           displayName: 'Build with Maven'
  #           inputs:
  #             mavenPomFile: 'pom.xml'
  #             goals: 'clean package'
  #
  #     - job: SCAScan
  #       displayName: 'SCA Scan'
  #       steps:
  #         - task: Bash@3
  #           displayName: 'Run SCA'
  #           inputs:
  #             targetType: 'inline'
  #             script: |
  #               curl -sSL https://download.sourceclear.com/ci.sh -o ci.sh
  #               chmod +x ci.sh
  #               ./ci.sh scan --app $(APP_NAME)
  #           env:
  #             SRCCLR_API_TOKEN: $(SRCCLR_API_TOKEN)

# ============================================================================
# ADVANCED CONFIGURATIONS
# ============================================================================

# ============================================================================
# EXAMPLE: SCA with Vulnerability Threshold
# ============================================================================
# Fail build only on specific severity levels
# ============================================================================

# - task: Bash@3

#       ./ci.sh scan \

# ============================================================================
# EXAMPLE: SCA with SBOM Generation
# ============================================================================
# Generate Software Bill of Materials
# ============================================================================

# - task: Bash@3
#   displayName: 'Generate SBOM'

#       ./ci.sh scan \

# ============================================================================

# Scan multiple package managers in a monorepo
# ============================================================================

# - task: Bash@3
#   displayName: 'SCA Scan - Frontend (npm)'
#   inputs:
#     targetType: 'inline'
#     workingDirectory: 'frontend'

#       curl -sSL https://download.sourceclear.com/ci.sh -o ci.sh
#       chmod +x ci.sh

#       chmod +x ci.sh
#       ./ci.sh scan --app $(APP_NAME)-backend --maven
#   env:
