<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--
  Security notes
  ──────────────
  CWE-80  (XSS): All runtime data written via textContent / createElement.
          innerHTML never called with variable content.
  CWE-601 (Open Redirect): Zero fetch(), XHR, or dynamic URL construction.
  CSP:    connect-src 'none'. No external scripts — zero CDN dependencies.
-->
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self';
           style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
           font-src https://fonts.gstatic.com;
           script-src 'self' 'unsafe-inline';
           img-src 'none';
           connect-src 'none';
           object-src 'none';
           base-uri 'self';">
<title>Pipeline Template Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:            #0a0c10;
    --surface:       #111318;
    --surface2:      #181c24;
    --border:        rgba(255,255,255,0.07);
    --border-active: rgba(99,202,183,0.4);
    --accent:        #63cab7;
    --accent3:       #a78bfa;
    --text:          #e8eaf0;
    --text-muted:    #6b7280;
    --text-dim:      #9ca3af;
    --danger:        #f87171;
    --success:       #4ade80;
    --card-h:        220px;
    --radius:        16px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(99,202,183,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,202,183,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }

  /* ─── HEADER ────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,12,16,0.88); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(16px,4vw,48px); height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
    letter-spacing: -0.02em; color: var(--text);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .header-actions { display: flex; align-items: center; gap: 12px; }
  .btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 500;
    padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-dim); cursor: pointer; transition: all 0.2s;
  }
  .btn:hover         { border-color: var(--accent); color: var(--accent); background: rgba(99,202,183,0.05); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .readonly-badge {
    font-size: 0.65rem; padding: 4px 10px; border-radius: 20px;
    background: rgba(167,139,250,0.12); color: var(--accent3);
    border: 1px solid rgba(167,139,250,0.25); letter-spacing: 0.06em; text-transform: uppercase;
  }

  /* ─── MAIN ──────────────────────────────────────── */
  main {
    position: relative; z-index: 1;
    padding: clamp(24px,4vw,48px) clamp(16px,4vw,48px);
    max-width: 1600px; margin: 0 auto;
  }

  /* ─── TOOLBAR ───────────────────────────────────── */
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 380px; }
  .search-wrap input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 16px 10px 40px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
    outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-muted); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; padding: 5px 12px;
    border-radius: 20px; border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); cursor: pointer; transition: all 0.2s;
  }
  .chip:hover, .chip.active { border-color: var(--accent); color: var(--accent); background: rgba(99,202,183,0.08); }
  .chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .stats-text { margin-left: auto; font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; }

  /* ─── SECTION HEADING ───────────────────────────── */
  .section-heading {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
    color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
  }
  .section-heading::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .card-count-badge {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 2px 8px; font-size: 0.65rem; color: var(--text-muted);
  }

  /* ─── GRID ──────────────────────────────────────── */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 20px; }

  /* ─── CARD ──────────────────────────────────────── */
  .card {
    border-radius: var(--radius); background: var(--surface); border: 1px solid var(--border);
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
    cursor: pointer; overflow: hidden; animation: fadeIn 0.4s ease both;
  }
  .card:hover {
    border-color: var(--border-active);
    box-shadow: 0 0 30px rgba(99,202,183,0.08), 0 8px 32px rgba(0,0,0,0.4);
    transform: translateY(-2px);
  }
  .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .card-face   { padding: 24px; min-height: var(--card-h); display: flex; flex-direction: column; }
  .card-header-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
  .card-icon   { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
  .card-badge  { font-size: 0.65rem; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase; border: 1px solid transparent; }
  .card-title  { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 6px; line-height: 1.2; }
  .card-desc   { font-size: 0.75rem; color: var(--text-muted); line-height: 1.6; flex: 1; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .card-meta   { font-size: 0.68rem; color: var(--text-muted); }
  .card-arrow  { font-size: 0.8rem; color: var(--accent); transition: transform 0.2s; }
  .card:hover .card-arrow { transform: translateX(3px); }

  /* ─── EMPTY STATE ───────────────────────────────── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); grid-column: 1 / -1; }
  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.8rem; }

  /* ─── MODAL ─────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    width: 100%; max-width: 900px; max-height: 90vh; overflow-y: auto;
    transform: scale(0.94) translateY(20px);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal-header {
    padding: 24px 28px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; background: var(--surface); z-index: 1; border-radius: 20px 20px 0 0;
  }
  .modal-icon     { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; flex-shrink: 0; }
  .modal-title    { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; }
  .modal-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }
  .modal-close {
    margin-left: auto; background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); width: 34px; height: 34px; border-radius: 8px;
    cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .modal-close:hover         { border-color: var(--danger); color: var(--danger); background: rgba(248,113,113,0.1); }
  .modal-close:focus-visible { outline: 2px solid var(--danger); outline-offset: 2px; }
  .modal-body { padding: 24px 28px; }

  /* ─── YAML VIEWER ───────────────────────────────── */
  .yaml-block {
    background: #0d0f13; border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .yaml-block-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  .yaml-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .copy-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; padding: 4px 10px;
    border-radius: 5px; border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); cursor: pointer; transition: all 0.2s;
  }
  .copy-btn:hover  { color: var(--accent); border-color: var(--accent); }
  .copy-btn.copied { color: var(--success); border-color: var(--success); }
  pre {
    padding: 20px; overflow-x: auto;
    font-size: 0.75rem; line-height: 1.7; color: #c9d1d9;
    white-space: pre; font-family: 'JetBrains Mono', monospace;
    max-height: 60vh;
  }

  /* ─── TOAST ─────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 18px; font-size: 0.78rem; color: var(--text);
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none; display: flex; align-items: center; gap: 10px;
    max-width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .icon-success { color: var(--success); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr; }
    .modal { max-height: 95vh; border-radius: 16px; }
    .modal-body { padding: 16px 18px; }
    .modal-header { padding: 18px 18px 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>Pipeline Hub</div>
  <div class="header-actions">
    <span class="readonly-badge">Read-only</span>
  </div>
</header>

<main>
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">⌕</span>
      <input type="text" id="searchInput" placeholder="Search integrations…"
             autocomplete="off" spellcheck="false" aria-label="Search integrations">
    </div>
    <div class="filter-chips" id="filterChips" role="group" aria-label="Filter by category"></div>
    <span class="stats-text" id="statsText" aria-live="polite"></span>
  </div>

  <div class="section-heading">
    Integration Templates
    <span class="card-count-badge" id="cardCountBadge">–</span>
  </div>

  <div class="cards-grid" id="cardsGrid" role="list"></div>
</main>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="viewModal" role="dialog" aria-modal="true" aria-labelledby="vmTitleEl">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon" id="vmIcon" aria-hidden="true"></div>
      <div>
        <div class="modal-title"    id="vmTitleEl"></div>
        <div class="modal-subtitle" id="vmSubtitle"></div>
      </div>
      <button class="modal-close" id="vmClose" aria-label="Close dialog">✕</button>
    </div>
    <div class="modal-body" id="vmBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast" role="status" aria-live="polite">
  <span id="toastIcon" aria-hidden="true"></span>
  <span id="toastMsg"></span>
</div>

  YAML BLOCKS
  ─────────────────────────────────────────────────────────────────
  Paste your .yaml / .yml file content verbatim between the tags.
  The `id` attribute MUST match the `id` in the CARDS array above.

  Browsers treat type="text/yaml" as inert (unknown MIME) — these
  blocks are never executed. The app reads .textContent directly.

  To add a new integration:
    1. Add an entry to CARDS above.
    2. Add a matching <script type="text/yaml" id="..."> block here.
  To remove one:
    Delete (or comment out) both the CARDS entry and this block.

<!-- ── azure-devops-dotnet.yaml ─────────────────────────────────────────── -->
<script type="text/yaml" id="card1">
# ASP.NET
# Build and test ASP.NET projects.
# Add steps that publish symbols, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/apps/aspnet/build-aspnet-4
# This is an example of using VeraDemoDotNet test application with the Veracode Static Pipeline scanner.  A Veracode subscription is required.

##  Main Branch

trigger:
- none

pool:
  vmImage: 'windows-latest'

variables:
  solution: '**/*.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'

steps:
- task: NuGetToolInstaller@1
  

- task: NuGetCommand@2
  inputs:
    restoreSolution: '$(solution)'

# # https://docs.veracode.com/r/c_precomp_MS
## Builds Project with MSBUILD and prepublished the views
# - task: MSBuild@1
#   inputs:
#     solution: '**/*.sln'

<script type="text/yaml" id="card3">
name: Verademo Default Workflow - Maven Build and Scan MultiJob

on:
  workflow_dispatch: 
      inputs:
          VeracodeCLI:
            description: 'Package Using Veracode CLI'
            required: true
            type: 'boolean'
            default: true
          UseActions:
            description: 'Use the Veracode Actions'
            required: true
            type: 'boolean'
            default: true
          Run-Pipeline-Scan:
            description: 'Run the Pipeline scan'
            required: true
            type: 'boolean'
            default: true
          Run-Upload-and-Scan:
            description: 'Run the Upload and Scan'
            required: true
            type: 'boolean'
            default: true
          Run-SCA-Agent-Based-Scan:
            description: 'Run the SCA Agent Based Scan'
            required: true
            type: 'boolean'
            default: true
          Run-DAST-Scan:
            description: 'Run the DAST Scan'
            required: true
            type: 'boolean'
            default: true
          UsePM:
            description: 'Install the CLI using the package managers'
            required: true
            type: 'boolean'
            default: 'true'
          Runner-Image:
            description: 'Select the Runner Image'
            required: true
            type: 'choice'
            default: 'ubuntu-latest'
            options:
                - 'ubuntu-latest'
                - 'macOs-latest'
                - 'windows-latest'
          Veracode-App-Name:
            description: "Veracode App Profile Name"
            required: false
            type: 'string'
            default: 'Verademo'
          RepoUrl:
            description: "Repo to Clone for the pipeline"
            required: false
            type: 'string'
            default: 'bnreplah/verademo'
       #   ScanDir:
       #     description: "The directory where the build is located"
       #     required: false
       #     type: 'string'
       #     default: '.'
env:
  SRCCLR_API_TOKEN: ${{ secrets.SRCCLR_API_TOKEN }}
  SRCCLR_REGION: ${{ vars.SRCCLR_REGION }}
  VERACODE_API_KEY_ID: ${{secrets.VERACODE_API_ID}}
  VERACODE_API_KEY_SECRET: ${{secrets.VERACODE_API_KEY}}
  OVER_LIMIT_DEFAULT: true
permissions:
          security-events: write
  
jobs:
  build:
    runs-on: ${{ github.event.inputs.Runner-Image }}
    # grants permissions for the artifact to be uploaded
    permissions:
      contents: write
      packages: write
    
    
    steps:

      - name: check inputs
        run: |
          echo ${{ github.repository.name }}
          echo "Veracode CLI" ${{ inputs.VeracodeCLI }}
          echo "UseActions" ${{ inputs.UseActions }}
          echo "Run-Pipeline-Scan:" ${{inputs.Run-Pipeline-Scan }}
          echo "Run-Upload-and-Scan:" ${{inputs.Run-Upload-and-Scan }}
          echo ${{inputs.Run-SCA-Agent-Based-Scan }}
          echo ${{inputs.Run-DAST-Scan }}
          echo ${{inputs.UsePM}}
          echo ${{ inputs.Runner-Image }}
          echo ${{ inputs.Veracode-App-Name}}
          echo ${{ inputs.RepoUrl}}
          
       
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can acces it and clones the repo
      - uses: actions/checkout@v4.2.2
        with:
          repository: ${{ github.event.inputs.RepoUrl }}


      # Need to run a step here that checks for the package managers needed in the file system and then installs them appropirately
      # Later itteration need to do this with an image


        
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Install the Veracode CLI ( Ubuntu ) and package
        if: ${{ ( github.event.inputs.VeracodeCLI == 'true' ) && ( github.event.inputs.Runner-Image == 'ubuntu-latest' ) }}
        run: |
            curl -fsS https://tools.veracode.com/veracode-cli/install | sh
            ./veracode --help
            ls
            mkdir .veracode 
            mkdir .veracode/build/ 
            ./veracode package -a -d -s . -o .veracode/build/
            ls
            ls .veracode/build/

      - name: Install the Veracode CLI ( windows ) 
        if: ${{ ( github.event.inputs.VeracodeCLI == 'true' ) && ( github.event.inputs.Runner-Image == 'windows-latest' ) && ! ( github.event.inputs.UsePM == 'true' ) }}
        run: |
          Set-ExecutionPolicy AllSigned -Scope Process -Force
          $ProgressPreference = "silentlyContinue"; iex ((New-Object System.Net.WebClient).DownloadString('https://tools.veracode.com/veracode-cli/install.ps1'))
          veracode version
          veracode help
          veracode package -a -d -s . -o .veracode/build/
          ls
          ls .veracode/build/

      - name: Install the Veracode CLI ( windows ) and package
        if: ${{ ( github.event.inputs.VeracodeCLI == 'true' ) && ( github.event.inputs.Runner-Image == 'windows-latest' ) && ( github.event.inputs.UsePM == 'true' )  }}
        run: |
          choco install veracode-cli
          veracode version
          veracode help
          veracode package -a -d -s . -o .veracode/build/
          ls
          ls .veracode/build/
          
      - name: Install the Veracode CLI ( macOs ) and package
        if: ${{ ( github.event.inputs.VeracodeCLI == 'true' ) && ( github.event.inputs.Runner-Image == 'macOs-latest' ) && ( github.event.inputs.UsePM == 'true' )  }}
        run: |
          brew install veracode/tap/veracode-cli
          mkdir .veracode 
          mkdir .veracode/build/ 
          veracode version
          veracode help
          veracode package -a -d -s . -o .veracode/build/
          ls
          ls .veracode/build/

      - name: Install the Veracode CLI ( linux - no PM ) 
        if: ${{ ( github.event.inputs.VeracodeCLI == 'true' ) && ( !  github.event.inputs.Runner-Image == 'windows-latest' ) && ! ( github.event.inputs.UsePM == 'true' ) }}
        run: |
          curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          mkdir .veracode 
          mkdir .veracode/build/ 
          ./veracode version
          ./veracode --help
          ./veracode package -a -d -s . -o .veracode/build/
          ls
          ls .veracode/build/
          
        
      - name: Build with Maven ( Default for Verademo ) # Change this per language
        if: ${{ !  ( github.event.inputs.VeracodeCLI == 'true' ) }}
        run: |
          mkdir .veracode 
          mkdir .veracode/build/ 
          cd app/
          mvn -B clean package --file pom.xml
          ls target/
          mv target/*.war -t ../.veracode/build/
          ls ../.veracode/build/
      
      - name: Veracode Dependency Scanning
        continue-on-error: true
        if: ${{ inputs.Run-SCA-Agent-Based-Scan == 'true' }}
        env:
          SRCCLR_API_TOKEN: ${{secrets.SRCCLR_API_TOKEN}}
        # You may pin to the exact commit or the version.
        # uses: veracode/veracode-sca@6f565b462af9b5e74d2dbbdddcb5cacd7bc7fe4f
        uses: veracode/veracode-sca@v2.1.11
        with:
          # Authorization token to query and create issues
          github_token: ${{ github.token }}
          # Run the SRCCLR with the `--quick` options
          quick: false # optional, default is false
          # Show update advisor
          update_advisor: true # optional, default is false
          # A git URL to work with in case the scan is not for the current repository
          #url: # optional, default is 
          # An attribute to instruct the action to create an issue from found vulnerability or just simple text output
          create-issues: true # optional, default is false
          # A path within the repository where the build definition starts
          path: . # optional, default is .
          # Run the SRCCLR in debug mode
          debug: true # optional, default is false
          # Run the SRCCLR with the `--skip-collectors` options
          #skip-collectors: # optional, default is false
          # Run the SRCCLR with the `--allow-dirty` option
          allow-dirty: true # optional, default is false
          # Run the SRCCLR with the `--recursive` option
          recursive: true # optional, default is false
          # Run the SRCCLR with the `--skip-vms` option
          #skip-vms: # optional, default is false
          # Run the SRCCLR with the `--no-graphs` option
          #no-graphs: # optional, default is false
                

          
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4.4.3
        with:
            # Artifact name
            name: veracode-build-artifact
            # optional, default is artifact
            # A file, directory or wildcard pattern that describes what to upload
            path: .veracode/build/
            # The desired behavior if no files are found using the provided path.
            if-no-files-found: warn
        
  veracode-sast-analysis:
    # Requires the previous step to be completed prior to moving onto this step, otherwise can be set to run in parallel
    needs: build
    runs-on: '${{ github.event.inputs.Runner-Image }}'
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          repository: ${{ inputs.RepoUrl }}
           
      - uses: actions/download-artifact@v4.1.8
        continue-on-error: true
        with: 
            name: veracode-build-artifact
            path: .veracode/build/
            merge-multiple: true
            repository: ${{inputs.RepoUrl}}
            
            
      - run: pwd && ls
      - run: |
          ls -la
          ls -la .veracode/build/
          fileLocation=".veracode/build/" # places the built artifacts in the veracode build folder 
          file_array=($(ls $fileLocation ))
          for file in "${file_array[@]}"; do
              echo "Processing file: $file"
                  
             
              if [[ -z "$fileLocation/$file" ]]; then
                  echo "No File has been passed/unsupported file"
              fi
              
              if [[ "$file" =~ \.(war|ear|jar|zip)$ ]]; then
                      allowed_files+=("$file")  
              else
                      excluded_files+=("$file")  
              fi
              echo $(stat --format=%s $fileLocation/$file)
              
          done
          if [[ $(stat --format=%s $fileLocation) -le 20000 ]]; then
              echo "OVER_LIMIT=false" >> $GITHUB_ENV
          else
              echo "OVER_LIMIT=${{env.OVER_LIMIT_DEFAULT}}" >> $GITHUB_ENV
          fi
      # Downloads the pipeline scanner jar directly for each of the operating systems and settings defined

      - name: Veracode Pipeline Scan ( Java Wrapper ) [Windows no PM]
        continue-on-error: true
        if: ${{ ( ! env.OVER_LIMIT ) && ( ! github.event.inputs.UseActions ) &&  ( github.event.inputs.Runner-Image == 'windows-latest' ) && github.event.inputs.Run-Pipeline-Scan  && ( ! github.event.inputs.UsePM ) }}
        run: |
          wget https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          Expand-Archive -Path pipeline-scan-LATEST.zip -DestinationPath ./ -Force
          ls
          java -jar pipeline-scan.jar
          java -jar pipeline-scan.jar --file app/target/verademo.war

      # Installs the Veracode CLI fro the one that uses a package manager
      - name: Veracode Pipeline Scan ( Java Wrapper ) [Windows PM]
        continue-on-error: true
        if: ${{ ( ! env.OVER_LIMIT ) && ( ! github.event.inputs.UseActions ) &&  ( github.event.inputs.Runner-Image == 'windows-latest' ) && github.event.inputs.Run-Pipeline-Scan  &&  github.event.inputs.UsePM  }}
        run: |
          choco install veracode-cli

    needs: veracode-sast-analysis

             export VERACODE_API_KEY_SECRET=${{ secrets.VERACODE_API_KEY }}
             guid=$(http --auth-type veracode_hmac GET "https://api.veracode.com/appsec/v1/applications?name=${{github.event.inputs.Veracode-App-Name}}" | jq -r '._embedded.applications[0].guid')

             echo TOTAL_FLAWS: ${total_flaws}
             http --auth-type veracode_hmac GET "https://api.veracode.com/appsec/v2/applications/${guid}/findings?scan_type=STATIC&violates_policy=True&size=${total_flaws}" > policy_flaws.json
  
         - name: save results file
           uses: actions/upload-artifact@v3
           with:
             name: policy-flaws
             path: /tmp/policy_flaws.json

      - name: Convert pipeline scan output to SARIF format

            repo_owner: ${{ github.repository.owner }}
            repo_name: ${{ github.repository.name }}
            commitSHA: ${{ github.sha }}
            ref: ${{ github.ref }}
            githubToken: ${ github.token }
  

   
  run-dast-scans:
    runs-on: ${{ github.event.inputs.Runner-Image }}
    steps:
      - name: Build JSON file
        run: |
          touch input.json
          echo '{"name": "${{ vars.DAST_NAME}}", "scans": [{"scan_config_request": { "target_url": { "url": "${{vars.SCAN_URL}}" }}}],"schedule": {"duration": {"length": 1,"unit": "DAY"},"scheduled": true,"now": true }}' >> input.json
           
        #echo '{"name": "${{ vars.DAST_NAME}}", "schedule": {"duration": {"length": 1,"unit": "DAY"},"scheduled": true,"now": true }}' >> input.json
      - name: Create DAST Scan
        continue-on-error: true
        if: ${{ github.event.inputs.Run-DAST-Scan }}
        run: |
          python --version
          python -m pip install --upgrade pip wheel
          python -m pip install httpie
          pip install veracode-api-signing
          cat input.json | http --auth-type=veracode_hmac POST "https://api.veracode.com/was/configservice/v1/analyses?run_verification=true" 
        env:
          VERACODE_API_KEY_ID: ${{ secrets.VERACODE_API_ID }}
          VERACODE_API_KEY_SECRET: ${{ secrets.VERACODE_API_KEY }}
</script>

#########################################################################################################

##########################################################################################################


java-build:
  image: maven:3.8.3-openjdk-17
  stage: build
  # Cache downloaded dependencies and plugins between builds. The key here seperates one cache per branch/tag
  # ($CI_COMMIT_REF_SLUG)
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository
  script:
    - mvn clean package -f app/pom.xml
    - pwd && ls -la app/target/
  artifacts:
    paths:
    - app/target/verademo.war
  allow_failure: false

pipeline-scan:
  image: ubuntu:latest
  stage: scan
  dependencies:
    - java-build
  artifacts:
    name: ${CI_PROJECT_NAME}_${CI_COMMIT_REF_NAME}_${CI_COMMIT_SHA}_pipeline-results
    paths:
      - results.json
    expire_in: 1 week
    when: always
  script:
    - apt update
    - apt install -y curl unzip
    - apt install -y openjdk-11-jre
    - curl -O https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
    - unzip pipeline-scan-LATEST.zip pipeline-scan.jar
    - java -jar pipeline-scan.jar
      --veracode_api_id "${VERACODE_API_ID}"
      --veracode_api_key "${VERACODE_API_SECRET}"
      --file "app/target/verademo.war"
      --gl_issue_generation true
      --fail_on_severity="Very High, High"
      --fail_on_cwe="80"
      --timeout "${CI_TIMEOUT}"
      --project_name "${CI_PROJECT_PATH}"
      --project_url "${CI_REPOSITORY_URL}"
      --project_ref "${CI_COMMIT_REF_NAME}"
  allow_failure: true

  stage: scan
  image: maven:3.8.3-openjdk-17
  script:
    # - apt update

    # - apt install -y openjdk-11-jre
    - export SRCCLR_SCM_NAME=$CI_PROJECT_PATH
    - export SRCCLR_SCM_URI=$CI_PROJECT_URL
    - export SRCCLR_SCM_REF=$(if [ "$CI_COMMIT_TAG" == "" ]; then echo $CI_COMMIT_REF_NAME; else echo $CI_COMMIT_TAG; fi);
    - export SRCCLR_SCM_REF_TYPE=$(if [ "$CI_COMMIT_TAG" == "" ]; then echo "branch"; else echo "tag"; fi);
    - export SRCCLR_SCM_REV=$CI_COMMIT_SHA
    - export SRCCLR_PR_ON=methods
    - export SRCCLR_NO_BREAKING_UPDATES=true
    - export SRCCLR_IGNORE_CLOSED_PRS=false
    - export SRCCLR_SCM_TOKEN="$PRIVATE_TOKEN"
    - export SRCCLR_SCM_TYPE=GITLAB
    - curl -sSL https://download.sourceclear.com/ci.sh | sh -s -- scan ./app/ --update-advisor 
  allow_failure: true


#########################################################################################################
# Upload-and-Scan Scan
##########################################################################################################


upload-and-scan:
  stage: scan
  image: veracode/api-wrapper-java:latest
  dependencies:
    - java-build
  script:
    - ls
    - java -jar /opt/veracode/api-wrapper.jar 
        -vid ${VERACODE_API_ID}
        -vkey ${VERACODE_API_SECRET} 
        -action UploadAndScan
        -createprofile false
        -appname ${CI_PROJECT_NAME}
        -version $CI_JOB_ID
        -filepath app/target/verademo.war
  allow_failure: true
</script>

              PROJECT_NAME="$(System.TeamProject)"
              REPO_NAME="$(Build.Repository.Name)"

                APP_NAME="$(VERACODE_APP_NAME)"

                APP_NAME="${ORG_NAME}/${PROJECT_NAME}/${REPO_NAME}"

              echo "Veracode Application Profile: $APP_NAME"
              echo "##vso[task.setvariable variable=APP_NAME]$APP_NAME"
            displayName: 'Set Veracode app name'

              mkdir -p verascan
              ./veracode package --source "$(Build.SourcesDirectory)" --output verascan --trust

            displayName: 'Veracode autopackager'

          # --- List and validate all artifacts found ---
          - script: |
              echo "Listing all packaged artifacts..."
              find verascan -type f \( -name "*.war" -o -name "*.jar" -o -name "*.zip" \) > artifact_list.txt

                echo "##vso[task.logissue type=error]No packaged artifacts found"

              echo "Artifacts found:"

            displayName: 'List and validate artifacts'

  # =============================================================================

    dependsOn: Package

              echo "Running Veracode Agent-Based SCA..."

        succeeded(),
        ne(variables['Build.Reason'], 'PullRequest'),

              curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip

              while IFS= read -r artifact; do

                  continue

                ARTIFACT_NAME=$(basename "$artifact")
                echo ""

                echo "Scanning [$SCAN_COUNT]: $ARTIFACT_NAME"

                  -f "$artifact" \
                  -vid $VERACODE_API_ID \
                  -vkey $VERACODE_API_KEY \
                  --fail_on_severity "" \
                  --issue_details true \
                  -jo true \
                  || echo "Pipeline scan completed with findings for $ARTIFACT_NAME"

                if [ -f "results.json" ]; then
                  mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
                  echo "Results saved: scan_results/${ARTIFACT_NAME}_results.json"
                else

              echo "=========================================="
              echo "Pipeline Scan completed for $SCAN_COUNT artifacts"
              echo "=========================================="

            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/scan_results'
              artifactName: 'veracode-pipeline-results'
            condition: and(succeededOrFailed(), ne(variables['Agent.JobStatus'], 'Canceled'))
            displayName: 'Publish Pipeline Scan results'
            continueOnError: true

  # =============================================================================
  # Stage 3b: Pipeline Scan - Pull Requests (gate enabled, each artifact)
  # =============================================================================
  - stage: PipelineScanGate
    displayName: 'Pipeline Scan (PR gate)'
    dependsOn: Package
    condition: |
      and(
        succeeded(),
        eq(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - job: PipelineScanGateJob
        displayName: 'Veracode Pipeline Scan with gate (all artifacts)'
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifactName: 'verascan'
              targetPath: '$(System.DefaultWorkingDirectory)/verascan'

          - script: |
              echo "Downloading Veracode Pipeline Scanner..."
              curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip

              if [ ! -f "pipeline-scan.jar" ]; then
                echo "##vso[task.logissue type=error]Failed to download pipeline-scan.jar"
                exit 1
              fi

          - script: |
              echo "Running Pipeline Scan with Policy Gate on each artifact..."
              mkdir -p scan_results

              FAILED_ARTIFACTS=""

              while IFS= read -r artifact; do

                if [[ "$artifact" == *"veracode_upload_bundle.zip" ]]; then
                  continue
                fi
                SCAN_COUNT=$((SCAN_COUNT + 1))
                ARTIFACT_NAME=$(basename "$artifact")
                echo ""
                echo "=========================================="
                echo "Scanning [$SCAN_COUNT]: $ARTIFACT_NAME"
                echo "=========================================="
                
                if ! java -jar pipeline-scan.jar \
                  -f "$artifact" \
                  -vid $VERACODE_API_ID \
                  -vkey $VERACODE_API_KEY \
                  --issue_details true \
                  --policy_name "Veracode Recommended Very High" \
                  -jo true; then
                  FAILED=1
                  FAILED_ARTIFACTS="$FAILED_ARTIFACTS $ARTIFACT_NAME"
                  echo "##vso[task.logissue type=warning]Policy gate failed for: $ARTIFACT_NAME"
                fi
                
                # Rename results file with artifact name prefix
                if [ -f "results.json" ]; then
                  mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
                  echo "Results saved: scan_results/${ARTIFACT_NAME}_results.json"
                else
                  echo "WARNING: No results.json produced for $ARTIFACT_NAME (artifact may not be scannable)"
                fi
              done < verascan/artifact_list.txt
              
              echo ""
              echo "=========================================="
              echo "Pipeline Scan completed for $SCAN_COUNT artifacts"
              if [ $FAILED -eq 1 ]; then
                echo "##vso[task.logissue type=error]Policy gate failed for:$FAILED_ARTIFACTS"
                echo "Artifacts with policy violations:$FAILED_ARTIFACTS"
              fi
              echo "=========================================="
              
              exit $FAILED
            displayName: 'Pipeline Scan (gate enabled, all artifacts)'
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/scan_results'
              artifactName: 'veracode-pipeline-gate-results'
            condition: and(succeededOrFailed(), ne(variables['Agent.JobStatus'], 'Canceled'))
            displayName: 'Publish Pipeline Scan results'
            continueOnError: true

  # =============================================================================
  # Stage 4: Sandbox Scan - Release Branches 
  # =============================================================================
  - stage: SandboxScan
    displayName: 'Sandbox Scan (release)'
    dependsOn: Package
    condition: |
      and(
        succeeded(),
        startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')
      )
    jobs:
      - job: SandboxScanJob
        displayName: 'Veracode Sandbox Scan'
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifactName: 'verascan'
              targetPath: '$(System.DefaultWorkingDirectory)/verascan'

          - script: |
              ORG_NAME=$(echo "$(System.TeamFoundationCollectionUri)" | sed -E 's|https://dev.azure.com/([^/]+)/?|\1|' | sed -E 's|https://([^.]+).visualstudio.com/?|\1|')

                APP_NAME="$(VERACODE_APP_NAME)"
              else
                APP_NAME="${ORG_NAME}/${PROJECT_NAME}/${REPO_NAME}"
              fi
              echo "Veracode Application Profile: $APP_NAME"
              echo "##vso[task.setvariable variable=APP_NAME]$APP_NAME"
            displayName: 'Set Veracode app name'

          - script: |
              echo "Artifacts to upload:"
              ls -lh verascan/
            displayName: 'List artifacts for upload'

          - script: |
              echo "Downloading Veracode Java API Wrapper..."
              mkdir -p .veracode
              VERSION=$(curl -sS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
              if [ -z "$VERSION" ]; then
                echo "##vso[task.logissue type=error]Failed to get API Wrapper version"
                exit 1
              fi
              echo "Downloading version: $VERSION"
              curl -sSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
              cd .veracode && unzip -o dist.zip && cd ..
              JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
              if [ -z "$JAR_PATH" ]; then
                echo "##vso[task.logissue type=error]VeracodeJavaAPI.jar not found"
                exit 1
              fi
              cp "$JAR_PATH" vosp-api-wrapper-java.jar
            displayName: 'Download Veracode API Wrapper'

          - script: |
              echo "Uploading artifacts to Veracode Sandbox..."
              java -jar vosp-api-wrapper-java.jar \
                -vid $VERACODE_API_ID \
                -vkey $VERACODE_API_KEY \
                -action UploadAndScan \
                -appname "$(APP_NAME)" \
                -createprofile true \
                -autoscan true \
                -sandboxname "$(SANDBOX_NAME)" \
                -createsandbox true \
                -filepath "verascan" \
                -version "Release $(Build.BuildNumber)"
            displayName: 'Veracode Sandbox Scan'
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

  # =============================================================================
  # Stage 5: Policy Scan - Main Branch 
  # =============================================================================
  - stage: PolicyScan
    displayName: 'Policy Scan (production)'
    dependsOn: Package
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - job: PolicyScanJob
        displayName: 'Veracode Policy Scan'
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifactName: 'verascan'
              targetPath: '$(System.DefaultWorkingDirectory)/verascan'

          - script: |
              ORG_NAME=$(echo "$(System.TeamFoundationCollectionUri)" | sed -E 's|https://dev.azure.com/([^/]+)/?|\1|' | sed -E 's|https://([^.]+).visualstudio.com/?|\1|')
              PROJECT_NAME="$(System.TeamProject)"
              REPO_NAME="$(Build.Repository.Name)"
              if [ -n "$(VERACODE_APP_NAME)" ]; then
                APP_NAME="$(VERACODE_APP_NAME)"
              else
                APP_NAME="${ORG_NAME}/${PROJECT_NAME}/${REPO_NAME}"
              fi
              echo "Veracode Application Profile: $APP_NAME"
              echo "##vso[task.setvariable variable=APP_NAME]$APP_NAME"
            displayName: 'Set Veracode app name'

          - script: |

              ls -lh verascan/
            displayName: 'List artifacts for upload'

          - script: |
              echo "Downloading Veracode Java API Wrapper..."
              mkdir -p .veracode
              VERSION=$(curl -sS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
              if [ -z "$VERSION" ]; then
                echo "##vso[task.logissue type=error]Failed to get API Wrapper version"
                exit 1
              fi
              echo "Downloading version: $VERSION"
              curl -sSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
              cd .veracode && unzip -o dist.zip && cd ..
              JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
              if [ -z "$JAR_PATH" ]; then
                echo "##vso[task.logissue type=error]VeracodeJavaAPI.jar not found"
                exit 1
              fi
              cp "$JAR_PATH" vosp-api-wrapper-java.jar
            displayName: 'Download Veracode API Wrapper'

              java -jar vosp-api-wrapper-java.jar \

                if [ -f "results.json" ]; then
                  mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
                  echo "Resultados guardados: scan_results/${ARTIFACT_NAME}_results.json"
                else
                  echo "ADVERTENCIA: No se produjo results.json para $ARTIFACT_NAME (el artefacto puede no ser escaneable)"
                fi
              done < verascan/artifact_list.txt
              
              echo ""
              echo "=========================================="
              echo "Pipeline Scan completado para $SCAN_COUNT artefactos"
              echo "=========================================="
            displayName: 'Pipeline Scan (sin gate, todos los artefactos)'
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/scan_results'
              artifactName: 'veracode-pipeline-results'
            condition: succeededOrFailed()
            displayName: 'Publicar resultados Pipeline Scan'

  # =============================================================================
  # Stage 3b: Pipeline Scan - Pull Requests (gate habilitado, cada artefacto)
  # =============================================================================
  - stage: PipelineScanGate
    displayName: 'Pipeline Scan (PR gate)'
    dependsOn: Package
    condition: |
      and(
        succeeded(),
        eq(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - job: PipelineScanGateJob
        displayName: 'Veracode Pipeline Scan con gate (todos los artefactos)'
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifactName: 'verascan'
              targetPath: '$(System.DefaultWorkingDirectory)/verascan'

          - script: |
              echo "Descargando Veracode Pipeline Scanner..."
              curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
              unzip -o pipeline-scan-LATEST.zip
              if [ ! -f "pipeline-scan.jar" ]; then
                echo "##vso[task.logissue type=error]No se pudo descargar pipeline-scan.jar"
                exit 1
              fi
            displayName: 'Descargar Pipeline Scanner'

          - script: |
              echo "Ejecutando Pipeline Scan con Policy Gate en cada artefacto..."
              mkdir -p scan_results
              FAILED=0
              SCAN_COUNT=0
              FAILED_ARTIFACTS=""
              
              # Usar artifact_list.txt creado durante empaquetado (excluye bundle)
              while IFS= read -r artifact; do
                # Saltar el bundle zip
                if [[ "$artifact" == *"veracode_upload_bundle.zip" ]]; then
                  continue
                fi
                SCAN_COUNT=$((SCAN_COUNT + 1))
                ARTIFACT_NAME=$(basename "$artifact")
                echo ""
                echo "=========================================="
                echo "Escaneando [$SCAN_COUNT]: $ARTIFACT_NAME"
                echo "=========================================="
                
                if ! java -jar pipeline-scan.jar \
                  -f "$artifact" \
                  -vid $VERACODE_API_ID \
                  -vkey $VERACODE_API_KEY \
                  --issue_details true \
                  --policy_name "Veracode Recommended Very High" \
                  -jo true; then
                  FAILED=1
                  FAILED_ARTIFACTS="$FAILED_ARTIFACTS $ARTIFACT_NAME"
                  echo "##vso[task.logissue type=warning]Policy gate fallido para: $ARTIFACT_NAME"
                fi
                
                # Renombrar archivo de resultados con prefijo del nombre del artefacto
                if [ -f "results.json" ]; then
                  mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
                  echo "Resultados guardados: scan_results/${ARTIFACT_NAME}_results.json"
                else
                  echo "ADVERTENCIA: No se produjo results.json para $ARTIFACT_NAME (el artefacto puede no ser escaneable)"
                fi
              done < verascan/artifact_list.txt
              
              echo ""
              echo "=========================================="
              echo "Pipeline Scan completado para $SCAN_COUNT artefactos"
              if [ $FAILED -eq 1 ]; then
                echo "##vso[task.logissue type=error]Policy gate fallido para:$FAILED_ARTIFACTS"
                echo "Artefactos con violaciones de politica:$FAILED_ARTIFACTS"
              fi
              echo "=========================================="
              
              exit $FAILED
            displayName: 'Pipeline Scan (gate habilitado, todos los artefactos)'
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/scan_results'
              artifactName: 'veracode-pipeline-gate-results'
            condition: succeededOrFailed()
            displayName: 'Publicar resultados Pipeline Scan'

  # =============================================================================
  # Stage 4: Sandbox Scan - Release Branches
  # =============================================================================
  - stage: SandboxScan
    displayName: 'Sandbox Scan (release)'
    dependsOn: Package
    condition: |
      and(
        succeeded(),
        startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')
      )
    jobs:
      - job: SandboxScanJob
        displayName: 'Veracode Sandbox Scan'
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifactName: 'verascan'
              targetPath: '$(System.DefaultWorkingDirectory)/verascan'

          - script: |
              ORG_NAME=$(echo "$(System.TeamFoundationCollectionUri)" | sed -E 's|https://dev.azure.com/([^/]+)/?|\1|' | sed -E 's|https://([^.]+).visualstudio.com/?|\1|')
              PROJECT_NAME="$(System.TeamProject)"
              REPO_NAME="$(Build.Repository.Name)"
              if [ -n "$(VERACODE_APP_NAME)" ]; then
                APP_NAME="$(VERACODE_APP_NAME)"
              else
                APP_NAME="${ORG_NAME}/${PROJECT_NAME}/${REPO_NAME}"
              fi
              echo "Perfil de Aplicacion Veracode: $APP_NAME"
              echo "##vso[task.setvariable variable=APP_NAME]$APP_NAME"
            displayName: 'Configurar nombre de app Veracode'

          - script: |
              echo "Artefactos para upload:"
              ls -lh verascan/
            displayName: 'Listar artefactos para upload'

          - script: |
              echo "Descargando Veracode Java API Wrapper..."
              mkdir -p .veracode
              VERSION=$(curl -sS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
              if [ -z "$VERSION" ]; then
                echo "##vso[task.logissue type=error]No se pudo obtener la version del API Wrapper"
                exit 1
              fi
              echo "Descargando version: $VERSION"
              curl -sSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
              cd .veracode && unzip -o dist.zip && cd ..
              JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
              if [ -z "$JAR_PATH" ]; then
                echo "##vso[task.logissue type=error]No se encontro VeracodeJavaAPI.jar"
                exit 1
              fi
              cp "$JAR_PATH" vosp-api-wrapper-java.jar
            displayName: 'Descargar Veracode API Wrapper'

          - script: |
              echo "Subiendo artefactos a Veracode Sandbox..."
              java -jar vosp-api-wrapper-java.jar \
                -vid $VERACODE_API_ID \
                -vkey $VERACODE_API_KEY \
                -action UploadAndScan \
                -appname "$(APP_NAME)" \
                -createprofile true \
                -autoscan true \
                -sandboxname "$(SANDBOX_NAME)" \
                -createsandbox true \
                -filepath "verascan" \
                -version "Release $(Build.BuildNumber)"
            displayName: 'Veracode Sandbox Scan'
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

  # =============================================================================
  # Stage 5: Policy Scan - Branch Main
  # =============================================================================
  - stage: PolicyScan
    displayName: 'Policy Scan (produccion)'
    dependsOn: Package
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),

      )
    jobs:
      - job: PolicyScanJob
        displayName: 'Veracode Policy Scan'
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifactName: 'verascan'

          - script: |
              ORG_NAME=$(echo "$(System.TeamFoundationCollectionUri)" | sed -E 's|https://dev.azure.com/([^/]+)/?|\1|' | sed -E 's|https://([^.]+).visualstudio.com/?|\1|')
              PROJECT_NAME="$(System.TeamProject)"
              REPO_NAME="$(Build.Repository.Name)"
              if [ -n "$(VERACODE_APP_NAME)" ]; then
                APP_NAME="$(VERACODE_APP_NAME)"
              else
                APP_NAME="${ORG_NAME}/${PROJECT_NAME}/${REPO_NAME}"
              fi
              echo "Perfil de Aplicacion Veracode: $APP_NAME"
              echo "##vso[task.setvariable variable=APP_NAME]$APP_NAME"
            displayName: 'Configurar nombre de app Veracode'

          - script: |
              echo "Artefactos para upload:"
              ls -lh verascan/
            displayName: 'Listar artefactos para upload'

          - script: |
              echo "Descargando Veracode Java API Wrapper..."
              mkdir -p .veracode
              VERSION=$(curl -sS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
              if [ -z "$VERSION" ]; then

              cd .veracode && unzip -o dist.zip && cd ..
              JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
              if [ -z "$JAR_PATH" ]; then

# Variables de entorno necesarias:

# - SRCCLR_API_TOKEN (opcional, para SCA)
# - SCAN_TYPE: "pipeline", "pipeline-gate", "policy", o "sandbox" (opcional, se detecta por branch)
# - BRANCH_NAME: inyectado por CodePipeline o definido manualmente (opcional, default: main)

env:

  variables:
    APP_NAME: "AWS_Application"
    SANDBOX_NAME: "aws-release"

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "Instalando prerrequisitos..."
      - apt-get update && apt-get install -y curl unzip grep
      
      - echo "Instalando Veracode CLI..."
      - curl -fsS -O https://tools.veracode.com/veracode-cli/install

            SCAN_COUNT=$((SCAN_COUNT + 1))

<script type="text/yaml" id="card9">
# https://github.com/ancient-cthulhu/pipeline-examples/blob/main/bitbucket/english/veracode-scans.yml
# =============================================================================

# =============================================================================
#

#   - VERACODE_API_KEY        (required, mark as secured)

        script:
          - set -e

          - |
            if [ -n "$VERACODE_APP_NAME" ]; then

          - curl -fsS -O https://tools.veracode.com/veracode-cli/install
          - chmod +x ./install
          - ./install
          - chmod +x veracode
          - ./veracode version
          # Run autopackager
          - echo "Running Veracode autopackager..."
          - mkdir -p verascan
          - ./veracode package --source . --output verascan --trust
          - echo "Packaged artifacts:"
          - ls -lhR verascan
          # List and validate artifacts
          - find verascan -type f \( -name "*.war" -o -name "*.jar" -o -name "*.zip" \) > artifact_list.txt
          - |
            if [ ! -s artifact_list.txt ]; then

              ls -lR verascan
              exit 1
            fi
          - echo "Artifacts found:"
          - cat artifact_list.txt
          - ARTIFACT_COUNT=$(wc -l < artifact_list.txt)
          - echo "Total artifacts - $ARTIFACT_COUNT"
        artifacts:

          - verascan/**
