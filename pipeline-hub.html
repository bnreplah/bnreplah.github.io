<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--
  Security notes
  ──────────────
  CWE-80  (XSS): All runtime data written via textContent / createElement.
          innerHTML never called with variable content.
  CWE-601 (Open Redirect): Zero fetch(), XHR, or dynamic URL construction.
  CSP:    connect-src 'none'. No external scripts — zero CDN dependencies.
-->
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self';
           style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
           font-src https://fonts.gstatic.com;
           script-src 'self' 'unsafe-inline';
           img-src 'none';
           connect-src 'none';
           object-src 'none';
           base-uri 'self';">
<title>Pipeline Template Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:            #0a0c10;
    --surface:       #111318;
    --surface2:      #181c24;
    --border:        rgba(255,255,255,0.07);
    --border-active: rgba(99,202,183,0.4);
    --accent:        #63cab7;
    --accent3:       #a78bfa;
    --text:          #e8eaf0;
    --text-muted:    #6b7280;
    --text-dim:      #9ca3af;
    --danger:        #f87171;
    --success:       #4ade80;
    --card-h:        220px;
    --radius:        16px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(99,202,183,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,202,183,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }

  /* ─── HEADER ────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,12,16,0.88); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(16px,4vw,48px); height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
    letter-spacing: -0.02em; color: var(--text);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .header-actions { display: flex; align-items: center; gap: 12px; }
  .btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 500;
    padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-dim); cursor: pointer; transition: all 0.2s;
  }
  .btn:hover         { border-color: var(--accent); color: var(--accent); background: rgba(99,202,183,0.05); }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .readonly-badge {
    font-size: 0.65rem; padding: 4px 10px; border-radius: 20px;
    background: rgba(167,139,250,0.12); color: var(--accent3);
    border: 1px solid rgba(167,139,250,0.25); letter-spacing: 0.06em; text-transform: uppercase;
  }

  /* ─── MAIN ──────────────────────────────────────── */
  main {
    position: relative; z-index: 1;
    padding: clamp(24px,4vw,48px) clamp(16px,4vw,48px);
    max-width: 1600px; margin: 0 auto;
  }

  /* ─── TOOLBAR ───────────────────────────────────── */
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 380px; }
  .search-wrap input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 16px 10px 40px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
    outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-muted); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; padding: 5px 12px;
    border-radius: 20px; border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); cursor: pointer; transition: all 0.2s;
  }
  .chip:hover, .chip.active { border-color: var(--accent); color: var(--accent); background: rgba(99,202,183,0.08); }
  .chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .stats-text { margin-left: auto; font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; }

  /* ─── SECTION HEADING ───────────────────────────── */
  .section-heading {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
    color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
  }
  .section-heading::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .card-count-badge {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 2px 8px; font-size: 0.65rem; color: var(--text-muted);
  }

  /* ─── GRID ──────────────────────────────────────── */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 20px; }

  /* ─── CARD ──────────────────────────────────────── */
  .card {
    border-radius: var(--radius); background: var(--surface); border: 1px solid var(--border);
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
    cursor: pointer; overflow: hidden; animation: fadeIn 0.4s ease both;
  }
  .card:hover {
    border-color: var(--border-active);
    box-shadow: 0 0 30px rgba(99,202,183,0.08), 0 8px 32px rgba(0,0,0,0.4);
    transform: translateY(-2px);
  }
  .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .card-face   { padding: 24px; min-height: var(--card-h); display: flex; flex-direction: column; }
  .card-header-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
  .card-icon   { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
  .card-badge  { font-size: 0.65rem; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase; border: 1px solid transparent; }
  .card-title  { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 6px; line-height: 1.2; }
  .card-desc   { font-size: 0.75rem; color: var(--text-muted); line-height: 1.6; flex: 1; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .card-meta   { font-size: 0.68rem; color: var(--text-muted); }
  .card-arrow  { font-size: 0.8rem; color: var(--accent); transition: transform 0.2s; }
  .card:hover .card-arrow { transform: translateX(3px); }

  /* ─── EMPTY STATE ───────────────────────────────── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); grid-column: 1 / -1; }
  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.8rem; }

  /* ─── MODAL ─────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    width: 100%; max-width: 900px; max-height: 90vh; overflow-y: auto;
    transform: scale(0.94) translateY(20px);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal-header {
    padding: 24px 28px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; background: var(--surface); z-index: 1; border-radius: 20px 20px 0 0;
  }
  .modal-icon     { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; flex-shrink: 0; }
  .modal-title    { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; }
  .modal-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }
  .modal-close {
    margin-left: auto; background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); width: 34px; height: 34px; border-radius: 8px;
    cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .modal-close:hover         { border-color: var(--danger); color: var(--danger); background: rgba(248,113,113,0.1); }
  .modal-close:focus-visible { outline: 2px solid var(--danger); outline-offset: 2px; }
  .modal-body { padding: 24px 28px; }

  /* ─── YAML VIEWER ───────────────────────────────── */
  .yaml-block {
    background: #0d0f13; border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .yaml-block-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  .yaml-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .copy-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; padding: 4px 10px;
    border-radius: 5px; border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); cursor: pointer; transition: all 0.2s;
  }
  .copy-btn:hover  { color: var(--accent); border-color: var(--accent); }
  .copy-btn.copied { color: var(--success); border-color: var(--success); }
  pre {
    padding: 20px; overflow-x: auto;
    font-size: 0.75rem; line-height: 1.7; color: #c9d1d9;
    white-space: pre; font-family: 'JetBrains Mono', monospace;
    max-height: 60vh;
  }

  /* ─── TOAST ─────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 18px; font-size: 0.78rem; color: var(--text);
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none; display: flex; align-items: center; gap: 10px;
    max-width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .icon-success { color: var(--success); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr; }
    .modal { max-height: 95vh; border-radius: 16px; }
    .modal-body { padding: 16px 18px; }
    .modal-header { padding: 18px 18px 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>Pipeline Hub</div>
  <div class="header-actions">
    <span class="readonly-badge">Read-only</span>
  </div>
</header>

<main>
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">⌕</span>
      <input type="text" id="searchInput" placeholder="Search integrations…"
             autocomplete="off" spellcheck="false" aria-label="Search integrations">
    </div>
    <div class="filter-chips" id="filterChips" role="group" aria-label="Filter by category"></div>
    <span class="stats-text" id="statsText" aria-live="polite"></span>
  </div>

  <div class="section-heading">
    Integration Templates
    <span class="card-count-badge" id="cardCountBadge">–</span>
  </div>

  <div class="cards-grid" id="cardsGrid" role="list"></div>
</main>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="viewModal" role="dialog" aria-modal="true" aria-labelledby="vmTitleEl">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon" id="vmIcon" aria-hidden="true"></div>
      <div>
        <div class="modal-title"    id="vmTitleEl"></div>
        <div class="modal-subtitle" id="vmSubtitle"></div>
      </div>
      <button class="modal-close" id="vmClose" aria-label="Close dialog">✕</button>
    </div>
    <div class="modal-body" id="vmBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast" role="status" aria-live="polite">
  <span id="toastIcon" aria-hidden="true"></span>
  <span id="toastMsg"></span>
</div>


<!-- ═══════════════════════════════════════════════════════════════
  CARD DEFINITIONS
  ─────────────────────────────────────────────────────────────────
  Each entry in CARDS controls what appears on the grid card AND
  which <script type="text/yaml"> block is shown in the modal.

  Fields:
    id          — must match the `id` attribute on the YAML block below
    name        — card title
    category    — filter chip label
    icon        — emoji shown in the card icon
    colorIdx    — 0-7 (see COLORS array in the script)
    description — card subtitle text
    yamlLabel   — filename label shown above the raw YAML viewer
                  (purely cosmetic — can be anything)
════════════════════════════════════════════════════════════════ -->
<script>
const CARDS = [
  {
    id:          'card1',
    name:        'Azure Dev Ops - Dotnet Build Pipeline',
    category:    'CI/CD',
    icon:        '🔗',
    colorIdx:    0,
    description: 'Azure Dev Ops Pipeline example for DotNet Builds, built of the verademo-net project',
    yamlLabel:   'azure-devops-dotnet.yaml',
  },
  {
    id:          'card2',
    name:        'BitBucket - Parallel manual stage triggered pipeline',
    category:    'CI/CD',
    icon:        '⚡',
    colorIdx:    1,
    description: 'A Maven Java Build that after the run allows for you to select which scan you would like to run on manual trigger in parallel',
    yamlLabel:   'bitbucket.yaml',
  },
  {
    id:          'card3',
    name:        'GitHub Actions - Veracode Scan',
    category:    'SCM',
    icon:        '☁️',
    colorIdx:    5,
    description: 'A Java General GitHub Actions Workflow Template',
    yamlLabel:   'github-actions-veracode.yaml',
  },
  {
    id:          'card4',
    name:        'GitLab - Java Pipeline with Veracode Scan',
    category:    'SCM',
    icon:        '🛢',
    colorIdx:    3,
    description: 'A GitLab Pipelines that builds a Java Maven Application, and then runs Veracode Scans',
    yamlLabel:   'gitlab-java-veracode.yml',
  },
   {
    id:          'card5',
    name:        'BitBucket - JavaScript Simple Pipeline scan for Veracode Scan',
    category:    'SCM',
    icon:        '🛢',
    colorIdx:    3,
    description: 'A BitBucket pipeline that packages the javascript according to the Veracode guidelines and then runs a upload and scan using the packaged artifact.',
    yamlLabel:   'bitbucket-javascript-reactvulna.yml',
  },
  
];
</script>


<!-- ═══════════════════════════════════════════════════════════════
  YAML BLOCKS
  ─────────────────────────────────────────────────────────────────
  Paste your .yaml / .yml file content verbatim between the tags.
  The `id` attribute MUST match the `id` in the CARDS array above.

  Browsers treat type="text/yaml" as inert (unknown MIME) — these
  blocks are never executed. The app reads .textContent directly.

  To add a new integration:
    1. Add an entry to CARDS above.
    2. Add a matching <script type="text/yaml" id="..."> block here.
  To remove one:
    Delete (or comment out) both the CARDS entry and this block.
════════════════════════════════════════════════════════════════ -->

<script type="text/yaml" id="card1">
# ASP.NET
# Build and test ASP.NET projects.
# Add steps that publish symbols, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/apps/aspnet/build-aspnet-4
# This is an example of using VeraDemoDotNet test application with the Veracode Static Pipeline scanner.  A Veracode subscription is required.

##  Main Branch

trigger:
- none

pool:
  vmImage: 'windows-latest'

variables:
  solution: '**/*.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'

steps:
- task: NuGetToolInstaller@1
  

- task: NuGetCommand@2
  inputs:
    restoreSolution: '$(solution)'

# # https://docs.veracode.com/r/c_precomp_MS
## Builds Project with MSBUILD and prepublished the views
# - task: MSBuild@1

#     solution: '**/*.sln'

#     restoreNugetPackages: true

- task: VSBuild@1
  inputs:
    solution: '$(solution)'
    msbuildArgs: '/p:PublishProvider=FileSystem /p:DeployOnBuild=true /p:WebPublishMethod=FileSystem /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:PackageLocation="$(build.artifactStagingDirectory)"'
    platform: '$(buildPlatform)'
    configuration: 'Debug'

############################################################################################################
# Installing build tools 
#############################################################################################################
- task: PowerShell@2
  inputs:
    targetType: 'inline'
    script: |
      wget https://aka.ms/vs/17/release/vs_BuildTools.exe
      choco --version
      choco install visualstudio2022buildtools
      msbuild --version

############################################################################################################

    script: |
      echo "Installing Veracode CLI Tools via Choclatey"
      choco install srcclr
      choco install veracode-cli
      srcclr test

############################################################################################################
# Running Veracode Packager
#############################################################################################################
#  The veracode cli auto runs the procedure to precompile the webviews depending on the env
- task: PowerShell@2

    VERACODE_API_KEY_ID: $(VERACODE_API_ID)
    VERACODE_API_KEY_SECRET: $(VERACODE_API_KEY)
  inputs:
    targetType: 'inline'
    script: |
      veracode package -s  $(build.artifactStagingDirectory) -d -a -o veracode/

# a dotnet artifact matching the following naming conventions found here: https://docs.veracode.com/r/About_auto_packaging#how-auto-packaging-works

  inputs:
    targetType: 'inline'
    script: |
      ls
      ls veracode/

- task: DownloadPipelineArtifact@2
  inputs:
    patterns: '**/*.exe,**/*.dll,**/*.pdb' # ensures Veracode gets the PDB files for Static Analysis

# Add a task here to remove additional runtime files that are not needed for the upload such as the roslyn directory if it is present. Reupload the new artifact and use that artifact for scanning

# This task makes the pipeline build artifacts available in a known location for upload to Veracode
- task: PublishPipelineArtifact@1
  inputs:
    targetPath: 'veracode/'
    artifactName: Static-Artifact

<script type="text/yaml" id="card3">
name: Verademo Default Workflow - Maven Build and Scan MultiJob

on:
  workflow_dispatch: 
      inputs:
          VeracodeCLI:
            description: 'Package Using Veracode CLI'
            required: true
            type: 'boolean'
            default: true
          UseActions:
            description: 'Use the Veracode Actions'
            required: true
            type: 'boolean'
            default: true
          Run-Pipeline-Scan:
            description: 'Run the Pipeline scan'
            required: true
            type: 'boolean'
            default: true
          Run-Upload-and-Scan:
            description: 'Run the Upload and Scan'
            required: true
            type: 'boolean'
            default: true
          Run-SCA-Agent-Based-Scan:
            description: 'Run the SCA Agent Based Scan'
            required: true
            type: 'boolean'
            default: true
          Run-DAST-Scan:
            description: 'Run the DAST Scan'
            required: true
            type: 'boolean'
            default: true
          UsePM:
            description: 'Install the CLI using the package managers'
            required: true
            type: 'boolean'
            default: 'true'
          Runner-Image:
            description: 'Select the Runner Image'
            required: true
            type: 'choice'
            default: 'ubuntu-latest'
            options:
                - 'ubuntu-latest'
                - 'macOs-latest'
                - 'windows-latest'
          Veracode-App-Name:
            description: "Veracode App Profile Name"
            required: false
            type: 'string'
            default: 'Verademo'
          RepoUrl:
            description: "Repo to Clone for the pipeline"
            required: false
            type: 'string'
            default: 'bnreplah/verademo'
       #   ScanDir:
       #     description: "The directory where the build is located"
       #     required: false
       #     type: 'string'
       #     default: '.'
env:
  SRCCLR_API_TOKEN: ${{ secrets.SRCCLR_API_TOKEN }}
  SRCCLR_REGION: ${{ vars.SRCCLR_REGION }}
  VERACODE_API_KEY_ID: ${{secrets.VERACODE_API_ID}}
  VERACODE_API_KEY_SECRET: ${{secrets.VERACODE_API_KEY}}
  OVER_LIMIT_DEFAULT: true
permissions:
          security-events: write
  
jobs:
  build:
    runs-on: ${{ github.event.inputs.Runner-Image }}
    # grants permissions for the artifact to be uploaded
    permissions:
      contents: write
      packages: write
    
    
    steps:

      - name: check inputs
        run: |
          echo ${{ github.repository.name }}
          echo "Veracode CLI" ${{ inputs.VeracodeCLI }}
          echo "UseActions" ${{ inputs.UseActions }}
          echo "Run-Pipeline-Scan:" ${{inputs.Run-Pipeline-Scan }}
          echo "Run-Upload-and-Scan:" ${{inputs.Run-Upload-and-Scan }}
          echo ${{inputs.Run-SCA-Agent-Based-Scan }}
          echo ${{inputs.Run-DAST-Scan }}
          echo ${{inputs.UsePM}}
          echo ${{ inputs.Runner-Image }}
          echo ${{ inputs.Veracode-App-Name}}
          echo ${{ inputs.RepoUrl}}
          
       
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can acces it and clones the repo
      - uses: actions/checkout@v4.2.2
        with:
          repository: ${{ github.event.inputs.RepoUrl }}


      # Need to run a step here that checks for the package managers needed in the file system and then installs them appropirately
      # Later itteration need to do this with an image


        
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Install the Veracode CLI ( Ubuntu ) and package
        if: ${{ ( github.event.inputs.VeracodeCLI == 'true' ) && ( github.event.inputs.Runner-Image == 'ubuntu-latest' ) }}
        run: |
            curl -fsS https://tools.veracode.com/veracode-cli/install | sh
            ./veracode --help
            ls
            mkdir .veracode 
            mkdir .veracode/build/ 
            ./veracode package -a -d -s . -o .veracode/build/
            ls
            ls .veracode/build/

      - name: Install the Veracode CLI ( windows ) 
        if: ${{ ( github.event.inputs.VeracodeCLI == 'true' ) && ( github.event.inputs.Runner-Image == 'windows-latest' ) && ! ( github.event.inputs.UsePM == 'true' ) }}
        run: |
          Set-ExecutionPolicy AllSigned -Scope Process -Force
          $ProgressPreference = "silentlyContinue"; iex ((New-Object System.Net.WebClient).DownloadString('https://tools.veracode.com/veracode-cli/install.ps1'))
          veracode version
          veracode help
          veracode package -a -d -s . -o .veracode/build/
          ls
          ls .veracode/build/

      - name: Install the Veracode CLI ( windows ) and package
        if: ${{ ( github.event.inputs.VeracodeCLI == 'true' ) && ( github.event.inputs.Runner-Image == 'windows-latest' ) && ( github.event.inputs.UsePM == 'true' )  }}
        run: |
          choco install veracode-cli
          veracode version
          veracode help
          veracode package -a -d -s . -o .veracode/build/
          ls
          ls .veracode/build/
          
      - name: Install the Veracode CLI ( macOs ) and package
        if: ${{ ( github.event.inputs.VeracodeCLI == 'true' ) && ( github.event.inputs.Runner-Image == 'macOs-latest' ) && ( github.event.inputs.UsePM == 'true' )  }}
        run: |
          brew install veracode/tap/veracode-cli
          mkdir .veracode 
          mkdir .veracode/build/ 
          veracode version
          veracode help
          veracode package -a -d -s . -o .veracode/build/
          ls
          ls .veracode/build/

      - name: Install the Veracode CLI ( linux - no PM ) 
        if: ${{ ( github.event.inputs.VeracodeCLI == 'true' ) && ( !  github.event.inputs.Runner-Image == 'windows-latest' ) && ! ( github.event.inputs.UsePM == 'true' ) }}
        run: |
          curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          mkdir .veracode 
          mkdir .veracode/build/ 
          ./veracode version
          ./veracode --help
          ./veracode package -a -d -s . -o .veracode/build/
          ls
          ls .veracode/build/
          
        
      - name: Build with Maven ( Default for Verademo ) # Change this per language
        if: ${{ !  ( github.event.inputs.VeracodeCLI == 'true' ) }}
        run: |
          mkdir .veracode 
          mkdir .veracode/build/ 
          cd app/
          mvn -B clean package --file pom.xml
          ls target/
          mv target/*.war -t ../.veracode/build/
          ls ../.veracode/build/
      
      - name: Veracode Dependency Scanning
        continue-on-error: true
        if: ${{ inputs.Run-SCA-Agent-Based-Scan == 'true' }}
        env:
          SRCCLR_API_TOKEN: ${{secrets.SRCCLR_API_TOKEN}}
        # You may pin to the exact commit or the version.
        # uses: veracode/veracode-sca@6f565b462af9b5e74d2dbbdddcb5cacd7bc7fe4f
        uses: veracode/veracode-sca@v2.1.11
        with:
          # Authorization token to query and create issues
          github_token: ${{ github.token }}
          # Run the SRCCLR with the `--quick` options
          quick: false # optional, default is false
          # Show update advisor
          update_advisor: true # optional, default is false
          # A git URL to work with in case the scan is not for the current repository
          #url: # optional, default is 
          # An attribute to instruct the action to create an issue from found vulnerability or just simple text output
          create-issues: true # optional, default is false
          # A path within the repository where the build definition starts
          path: . # optional, default is .
          # Run the SRCCLR in debug mode
          debug: true # optional, default is false
          # Run the SRCCLR with the `--skip-collectors` options
          #skip-collectors: # optional, default is false
          # Run the SRCCLR with the `--allow-dirty` option
          allow-dirty: true # optional, default is false
          # Run the SRCCLR with the `--recursive` option
          recursive: true # optional, default is false
          # Run the SRCCLR with the `--skip-vms` option
          #skip-vms: # optional, default is false
          # Run the SRCCLR with the `--no-graphs` option
          #no-graphs: # optional, default is false
                

          
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4.4.3
        with:
            # Artifact name
            name: veracode-build-artifact
            # optional, default is artifact
            # A file, directory or wildcard pattern that describes what to upload
            path: .veracode/build/
            # The desired behavior if no files are found using the provided path.
            if-no-files-found: warn
        
  veracode-sast-analysis:
    # Requires the previous step to be completed prior to moving onto this step, otherwise can be set to run in parallel
    needs: build
    runs-on: '${{ github.event.inputs.Runner-Image }}'
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          repository: ${{ inputs.RepoUrl }}
           
      - uses: actions/download-artifact@v4.1.8
        continue-on-error: true
        with: 
            name: veracode-build-artifact
            path: .veracode/build/
            merge-multiple: true
            repository: ${{inputs.RepoUrl}}
            
            
      - run: pwd && ls
      - run: |
          ls -la
          ls -la .veracode/build/
          fileLocation=".veracode/build/" # places the built artifacts in the veracode build folder 
          file_array=($(ls $fileLocation ))
          for file in "${file_array[@]}"; do
              echo "Processing file: $file"
                  
             
              if [[ -z "$fileLocation/$file" ]]; then
                  echo "No File has been passed/unsupported file"
              fi
              
              if [[ "$file" =~ \.(war|ear|jar|zip)$ ]]; then
                      allowed_files+=("$file")  
              else
                      excluded_files+=("$file")  
              fi
              echo $(stat --format=%s $fileLocation/$file)
              
          done
          if [[ $(stat --format=%s $fileLocation) -le 20000 ]]; then
              echo "OVER_LIMIT=false" >> $GITHUB_ENV
          else
              echo "OVER_LIMIT=${{env.OVER_LIMIT_DEFAULT}}" >> $GITHUB_ENV
          fi
      # Downloads the pipeline scanner jar directly for each of the operating systems and settings defined

      - name: Veracode Pipeline Scan ( Java Wrapper ) [Windows no PM]
        continue-on-error: true
        if: ${{ ( ! env.OVER_LIMIT ) && ( ! github.event.inputs.UseActions ) &&  ( github.event.inputs.Runner-Image == 'windows-latest' ) && github.event.inputs.Run-Pipeline-Scan  && ( ! github.event.inputs.UsePM ) }}
        run: |
          wget https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          Expand-Archive -Path pipeline-scan-LATEST.zip -DestinationPath ./ -Force
          ls
          java -jar pipeline-scan.jar
          java -jar pipeline-scan.jar --file app/target/verademo.war

      # Installs the Veracode CLI fro the one that uses a package manager
      - name: Veracode Pipeline Scan ( Java Wrapper ) [Windows PM]
        continue-on-error: true
        if: ${{ ( ! env.OVER_LIMIT ) && ( ! github.event.inputs.UseActions ) &&  ( github.event.inputs.Runner-Image == 'windows-latest' ) && github.event.inputs.Run-Pipeline-Scan  &&  github.event.inputs.UsePM  }}
        run: |
          choco install veracode-cli
          veracode version
          veracode static scan --help
          veracode static scan app/target/verademo.war
          
      
      - name: Veracode Pipeline Scan ( Java Wrapper ) [Ubuntu no PM]
        continue-on-error: true
        if: ${{ ( ! env.OVER_LIMIT ) && ( ! github.event.inputs.UseActions ) &&  ( github.event.inputs.Runner-Image == 'ubuntu-latest' ) && ( github.event.inputs.Run-Pipeline-Scan )  }}
        run: |
          curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          unzip -o pipeline-scan-LATEST.zip
          ls -la
          java -jar pipeline-scan.jar
          java -jar pipeline-scan.jar --file app/target/verademo.war

          
      - name: Veracode Pipeline Scan ( Java Wrapper ) [MacOs PM]
        continue-on-error: true
        if: ${{ ( ! env.OVER_LIMIT ) && ( ! github.event.inputs.UseActions ) &&  ( github.event.inputs.Runner-Image == 'macOs-latest' ) && ( github.event.inputs.Run-Pipeline-Scan ) && ( github.event.inputs.UsePM ) }}
        run: |
          brew install veracode/tap/veracode-cli
          veracode version
          veracode static scan --help
          veracode static scan app/target/verademo.war


      - name: Veracode Pipeline Scan ( Java Wrapper ) [MacOs no PM]
        continue-on-error: true
        if: ${{ ( ! env.OVER_LIMIT ) && ( ! github.event.inputs.UseActions ) &&  ( github.event.inputs.Runner-Image == 'macOs-latest' ) && github.event.inputs.Run-Pipeline-Scan  && ( ! github.event.inputs.UsePM ) }}
        run: |
          curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          unzip -o pipeline-scan-LATEST.zip
          ls -la
          java -jar pipeline-scan.jar
          java -jar pipeline-scan.jar --file app/target/verademo.war
      
    
          
          
      - name: Veracode Pipeline-Scan
        continue-on-error: true
        if: ${{ ( ! env.OVER_LIMIT ) && ( github.event.inputs.UseActions ) && ( github.event.inputs.Run-Pipeline-Scan ) }}
      # You may pin to the exact commit or the version.
      # uses: veracode/Veracode-pipeline-scan-action@7bbcef3efc8720d36302fc912a7d63f7aba34f76
        uses: veracode/Veracode-pipeline-scan-action@v1.0.14
        with:

            # Name of the security policy to download as a file. Required only if you want to download the configuration for a custom policy defined by your organization. After downloading the policy, you can provide this file in a subsequent command using the policy_file parameter.
            #request_policy: # optional

            #fail_on_severity: # optional
            # Fail the pipeline job if the scan finds flaws of the specified CWEs. Enter a comma-separated list of CWE IDs.
            #fail_on_cwe: # optional
            # Filter the flaws that exist in the specified baseline file and show only the additional flaws in the current scan.
            #baseline_file: # optional
            # Name of the Veracode default policy rule to apply to the scan results. You can only use this parameter with a Veracode default policy.
            #policy_name: # optional

            #policy_file: # optional

            #verbose: # optional

            #summary_output: # optional
            # Enter the filename of the scan results summary file. The file is stored in the current directory. Default is results.txt.
            #summary_output_file: # optional
            # Enter true to save the scan results in JSON format. Default is true.
            #json_output: # optional
            # Rename the JSON file that contains the scan results. The file is stored in the current directory. Default filename is results.json.
            #json_output_file: # optional
            # Enter the filename in the current directory to save results that violate pass-fail criteria. Default is filtered_results.json.
            #filtered_json_output_file: # optional
            # Enter the name of the CI/CD code repository that runs a Pipeline Scan. This parameter adds the repository name to the scan results, which can help you track scans across repositories.
            #project_name: # optional
            # Enter the source control URL for the CI/CD code repository that runs a Pipeline Scan.
            #project_url: # optional
            # Enter the source control reference, revision, or branch for the CI/CD code repository that runs a Pipeline Scan.
            #project_ref: # optional
            # Enter the [application profile](https://docs.veracode.com/r/request_profile) ID for the application you want to upload and scan.
            #app_id: # optional
            # Enter one these values, which are case-sensitive, for the type of development stage: Development, Testing, Release.
            #development_stage: # optional
            # Enable debug mode. 1 for on

  run-dast-scans:

<!-- ═══════════════════════════════════════════════════════════════
  APPLICATION  (no external dependencies)
════════════════════════════════════════════════════════════════ -->
<script>
/* ================================================================
  COLOR PALETTE  (colorIdx in CARDS maps into this array)
================================================================ */
const COLORS = [
  { bg:'rgba(99,202,183,0.15)',  border:'rgba(99,202,183,0.4)',  text:'#63cab7' }, // 0 teal
  { bg:'rgba(240,160,90,0.15)',  border:'rgba(240,160,90,0.4)',  text:'#f0a05a' }, // 1 orange
  { bg:'rgba(167,139,250,0.15)', border:'rgba(167,139,250,0.4)', text:'#a78bfa' }, // 2 purple
  { bg:'rgba(248,113,113,0.15)', border:'rgba(248,113,113,0.4)', text:'#f87171' }, // 3 red
  { bg:'rgba(74,222,128,0.15)',  border:'rgba(74,222,128,0.4)',  text:'#4ade80' }, // 4 green
  { bg:'rgba(96,165,250,0.15)',  border:'rgba(96,165,250,0.4)',  text:'#60a5fa' }, // 5 blue
  { bg:'rgba(251,191,36,0.15)',  border:'rgba(251,191,36,0.4)',  text:'#fbbf24' }, // 6 yellow
  { bg:'rgba(244,114,182,0.15)', border:'rgba(244,114,182,0.4)', text:'#f472b6' }, // 7 pink
];

/* ================================================================
  SAFE DOM HELPER  —  innerHTML never called with variable content
================================================================ */
function el(tag, attrs, ...children) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (v == null) continue;
      if (k === 'className')       node.className = String(v);
      else if (k === 'style')      Object.assign(node.style, v);
      else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
      else                         node.setAttribute(k, String(v));
    }
  }
  for (const child of children) {
    if (child == null) continue;
    node.appendChild(
      (typeof child === 'string' || typeof child === 'number')
        ? document.createTextNode(String(child))
        : child
    );
  }
  return node;
}

/* ================================================================
  STATE
================================================================ */
let activeFilter = 'all';

/* ================================================================
  FILTER CHIPS
================================================================ */
function renderChips() {
  const cats = [...new Set(CARDS.map(c => c.category))].sort();
  const fc   = document.getElementById('filterChips');
  fc.innerHTML = '';
  const chip = (label, val) => el('button', {
    className: 'chip' + (activeFilter === val ? ' active' : ''),
    role: 'radio', 'aria-checked': String(activeFilter === val),
    onClick: () => { activeFilter = val; renderGrid(); },
  }, label);
  fc.appendChild(chip('All', 'all'));
  cats.forEach(c => fc.appendChild(chip(c, c)));
}

/* ================================================================
  CARD GRID
================================================================ */
function renderGrid() {
  renderChips();
  const q       = document.getElementById('searchInput').value.trim().toLowerCase();
  const visible = CARDS.filter(c => {
    const matchCat = activeFilter === 'all' || c.category === activeFilter;
    const matchQ   = !q
      || c.name.toLowerCase().includes(q)
      || c.description.toLowerCase().includes(q)
      || c.category.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('statsText').textContent =
    `${visible.length} of ${CARDS.length} integrations`;
  document.getElementById('cardCountBadge').textContent = visible.length;

  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  if (!visible.length) {
    grid.appendChild(el('div', { className: 'empty-state' },
      el('div', { className: 'empty-icon' }, '🔍'),
      el('p', null, 'No integrations match your search.'),
    ));
    return;
  }

  visible.forEach((card, idx) => {
    const col  = COLORS[card.colorIdx] ?? COLORS[0];

    // Check whether a matching YAML block exists for this card
    const hasYaml = !!document.getElementById(card.id);

    const node = el('div', {
      className: 'card', role: 'listitem', tabindex: '0',
      'aria-label': `${card.name}, ${card.category}`,
      style: { animationDelay: `${idx * 0.05}s` },
      onClick:   () => openModal(card.id),
      onKeydown: e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(card.id); } },
    },
      el('div', { className: 'card-face' },
        el('div', { className: 'card-header-row' },
          el('div', { className: 'card-icon', 'aria-hidden': 'true',
            style: { background: col.bg, border: `1px solid ${col.border}` } }, card.icon),
          el('span', { className: 'card-badge',
            style: { background: col.bg, color: col.text, borderColor: col.border } }, card.category),
        ),
        el('div', { className: 'card-title' }, card.name),
        el('div', { className: 'card-desc'  }, card.description),
        el('div', { className: 'card-footer' },
          el('span', { className: 'card-meta' }, hasYaml ? 'View YAML →' : 'No YAML attached'),
          el('span', { className: 'card-arrow' }, '→'),
        ),
      )
    );
    grid.appendChild(node);
  });
}

/* ================================================================
  VIEW MODAL  —  reads raw textContent from the YAML block, displays
  it verbatim in a <pre>. Zero parsing involved.
================================================================ */
function openModal(id) {
  const card = CARDS.find(c => c.id === id);
  if (!card) return;
  const col = COLORS[card.colorIdx] ?? COLORS[0];

  // Header
  const vmIcon = document.getElementById('vmIcon');
  vmIcon.textContent = card.icon;
  Object.assign(vmIcon.style, { background: col.bg, border: `1px solid ${col.border}` });
  document.getElementById('vmTitleEl').textContent  = card.name;
  document.getElementById('vmSubtitle').textContent = card.category;

  // Body
  const body = document.getElementById('vmBody');
  body.innerHTML = '';

  const yamlNode = document.getElementById(id);

  if (!yamlNode) {
    body.appendChild(el('div', { className: 'empty-state' },
      el('div', { className: 'empty-icon' }, '📋'),
      el('p', null, `No YAML block found with id="${id}".`),
      el('p', { style: { marginTop:'8px', fontSize:'0.72rem' } },
        'Add a <script type="text/yaml" id="' + id + '"> block to this file.'),
    ));
  } else {
    // Get the raw text — trim the leading newline the browser adds
    const rawYaml = yamlNode.textContent.replace(/^\n/, '');

    const pre     = el('pre');
    pre.textContent = rawYaml;   // textContent only — never innerHTML

    const copyBtn = el('button', { className: 'copy-btn' }, 'Copy');
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(rawYaml).then(() => {
        copyBtn.textContent = 'Copied!'; copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 2000);
      });
    });

    body.appendChild(
      el('div', { className: 'yaml-block' },
        el('div', { className: 'yaml-block-header' },
          el('span', { className: 'yaml-label' }, card.yamlLabel || `${id}.yaml`),
          copyBtn,
        ),
        pre,
      )
    );
  }

  document.getElementById('viewModal').classList.add('open');
  document.getElementById('vmClose').focus();
}

function closeModal() { document.getElementById('viewModal').classList.remove('open'); }
document.getElementById('vmClose').addEventListener('click', closeModal);
document.getElementById('viewModal').addEventListener('click', e => {
  if (e.target === document.getElementById('viewModal')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ================================================================
  SEARCH + TOAST
================================================================ */
document.getElementById('searchInput').addEventListener('input', renderGrid);

let _toastTimer;
function showToast(type, icon, msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent  = icon;
  document.getElementById('toastIcon').className    = `icon-${type}`;
  document.getElementById('toastMsg').textContent   = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

/* ================================================================
  BOOT
================================================================ */
renderGrid();
</script>
</body>
</html>
