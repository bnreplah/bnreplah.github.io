# - Critical: CVSS 9.0-10.0
# - High: CVSS 7.0-8.9
# - Medium: CVSS 4.0-6.9
# - Low: CVSS 0.1-3.9
#
# Supported Package Managers:
# - Maven, Gradle, npm, Yarn, pnpm
# - pip, Pipenv, Poetry
# - Go Modules, Ruby Bundler
# - NuGet, Composer, CocoaPods
#
# ============================================================================

# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# Common Issues:
#
# 1. Token Authentication:
#    - Get token from Veracode Platform → Agent-Based Scan
#    - Store as SRCCLR_API_TOKEN in repository variables
#    - Mark as "Secured"
#    - Verify token hasn't expired
#
# 2. No Dependencies Found:
#    - Ensure manifest files exist
#    - Check correct directory
#    - Use specific scan flag (--maven, --npm, etc.)
#    - Run dependency install before scan
#
# 3. Build Failures:
#    - Adjust CVSS or severity thresholds
#    - Review vulnerabilities in Veracode Platform
#    - Use different scan modes
#
# 4. Image Issues:
#    - Some images need additional packages
#    - Install curl and bash if missing
#    - Use language-specific images when possible
#
# 5. Private Dependencies:
#    - Configure package manager auth
#    - Set up .npmrc, settings.xml, etc.
#    - Store credentials in Bitbucket variables
#
# 6. Artifact Size:
#    - Bitbucket limits artifact storage
#    - Use shorter retention periods
#    - Store large files externally
#
# 7. Pipeline Timeout:
#    - SCA is typically fast
#    - Check network connectivity
#    - Review scan logs for delays
#
# 8. Parallel Step Limits:
#    - Free plans have parallel step limits
#    - Combine steps if needed
#    - Upgrade plan for more parallelism
#
# For more help:
# - Veracode: https://docs.veracode.com/r/Agent_Based_Scans
# - Bitbucket: https://support.atlassian.com/bitbucket-cloud/docs/
# ============================================================================

</script>

<script type="text/yaml" id="card26">
# URL:  https://github.com/enzo-appsec/veracode-ci-cd-templates/blob/main/gitlab/cli-examples.yml
# ============================================================================
# Veracode CLI Examples - GitLab CI Template
# ============================================================================
# Various Veracode CLI operations for advanced scanning workflows.
#
# Documentation: https://docs.veracode.com/r/Veracode_CLI
# ============================================================================

stages:
  - setup
  - operations
  - reporting

variables:
  APP_NAME: "my-application"

# ==========================================================================
# SETUP
# ==========================================================================

veracode:cli-setup:
  stage: setup
  image: alpine:latest
  script:
    - apk add --no-cache curl bash
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"
    - veracode --version
    - veracode whoami
  only:
    - web  # Manual trigger

# ==========================================================================
# SCAN OPERATIONS
# ==========================================================================

veracode:scan-status:
  stage: operations
  image: alpine:latest
  script:
    - apk add --no-cache curl bash
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"
    - veracode static scan info --app "$APP_NAME"
  only:
    - web

veracode:download-results:
  stage: operations
  image: alpine:latest
  script:
    - apk add --no-cache curl bash
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"
    - mkdir -p reports
    - veracode static scan results --app "$APP_NAME" --format xml --output reports/detailed.xml
    - veracode static scan results --app "$APP_NAME" --format json --output reports/summary.json
  artifacts:
    paths:
      - reports/
    expire_in: 90 days
  only:
    - web

# ==========================================================================
# REPORTING
# ==========================================================================

veracode:generate-reports:
  stage: reporting
  image: alpine:latest
  script:
    - apk add --no-cache curl bash
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"
    - mkdir -p reports
    - veracode static findings --app "$APP_NAME" --format csv --output reports/findings.csv
    - veracode static policy --app "$APP_NAME" --format json --output reports/policy.json
  artifacts:
    paths:
      - reports/
    expire_in: 30 days
  only:
    - web

# ==========================================================================
# APPLICATION MANAGEMENT
# ==========================================================================

veracode:list-apps:
  stage: operations
  image: alpine:latest
  script:
    - apk add --no-cache curl bash
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"
    - veracode static app list --format table
    - veracode static app info --app "$APP_NAME"
  only:
    - web

# ==========================================================================
# SANDBOX OPERATIONS
# ==========================================================================

veracode:sandbox-ops:
  stage: operations
  image: alpine:latest
  script:
    - apk add --no-cache curl bash
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"
    - veracode static sandbox list --app "$APP_NAME"
  only:
    - web

# ==========================================================================
# POLICY COMPLIANCE
# ==========================================================================

veracode:check-policy:
  stage: operations
  image: alpine:latest
  script:
    - apk add --no-cache curl bash jq
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"
    - veracode static policy --app "$APP_NAME" --format json --output policy.json
    - COMPLIANCE=$(jq -r '.policy_compliance_status' policy.json)
    - echo "Policy Compliance - $COMPLIANCE"
    - test "$COMPLIANCE" = "Pass"
  only:
    - web

# ============================================================================
# CLI COMMAND REFERENCE - See Azure Pipelines template for full reference
# ============================================================================

  
</script>

<script type="text/yaml" id="card27">
# URL: https://github.com/enzo-appsec/veracode-ci-cd-templates/blob/main/gitlab/packaging-examples.yml
# ============================================================================
# Veracode Packaging Examples - GitLab CI Template
# ============================================================================
# This template demonstrates the Veracode CLI package command for automating
# application packaging before Static Analysis scans.
#
# The veracode package command:
# - Auto-detects build tools and dependencies
# - Compiles code into scannable artifacts
# - Packages into proper archive format
# - Validates artifact completeness
#
# Use Cases:
# - Upload and Scan (Policy Scan)
# - Pipeline Scan
# - NOT for SCA Agent-based Scan (use SCA Agent directly)
#
# Prerequisites:
# - Veracode API credentials in GitLab CI/CD Variables
# - Source code with build configuration
# - Build tools available in job images
#
# Documentation:
# - Package Command: https://docs.veracode.com/r/veracode_package
# - Autopackaging: https://docs.veracode.com/r/About_auto_packaging
# ============================================================================

stages:
  - discover
  - package
  - upload

variables:
  APP_NAME: "my-application"
  ARTIFACTS_DIR: "./veracode-artifacts"

# ==========================================================================
# PACKAGE DISCOVERY
# ==========================================================================

veracode:discover:
  stage: discover
  image: alpine:latest
  script:
    - apk add --no-cache curl bash
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"

    - echo "Discovering build configuration..."

    # Run package discover (supports MSBuild and Maven)
    - |
      veracode package discover \
        --source . \
        --verbose

    # Show generated veracode.yml
    - |
      if [ -f veracode.yml ]; then
        echo "Generated veracode.yml:"
        cat veracode.yml
      else
        echo "No veracode.yml generated (not MSBuild or Maven project)"
      fi

  artifacts:
    paths:
      - veracode.yml
    expire_in: 1 day
    when: on_success

  only:
    - web  # Manual trigger

# ==========================================================================
# JAVA (MAVEN) PACKAGING
# ==========================================================================

veracode:package-maven:
  stage: package
  image: maven:3.9-eclipse-temurin-17
  script:
    - echo "Installing Veracode CLI..."
    - apt-get update && apt-get install -y curl
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"

    - echo "Packaging Maven project..."
    - mkdir -p "$ARTIFACTS_DIR"

    - |
      veracode package \
        --source . \
        --output "$ARTIFACTS_DIR" \
        --trust \
        --verbose

    - echo "✓ Packaging complete"
    - ls -lh "$ARTIFACTS_DIR"

  artifacts:
    paths:
      - $ARTIFACTS_DIR/
    expire_in: 30 days

  only:
    - web

veracode:package-maven-custom:
  stage: package
  image: maven:3.9-eclipse-temurin-17
  script:
    - apt-get update && apt-get install -y curl
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"

    - echo "Packaging with custom Maven command..."
    - mkdir -p "$ARTIFACTS_DIR"

    # Set custom Maven arguments
    - export SRCCLR_CUSTOM_MAVEN_COMMAND="clean install -DskipTests -P production"

    - echo "Using custom Maven command: $SRCCLR_CUSTOM_MAVEN_COMMAND"

    - |
      veracode package \
        --source . \
        --output "$ARTIFACTS_DIR" \
        --trust \
        --verbose

    - ls -lh "$ARTIFACTS_DIR"

  artifacts:
    paths:
      - $ARTIFACTS_DIR/
    expire_in: 30 days

  only:
    - web

# ==========================================================================
# .NET PACKAGING
# ==========================================================================

veracode:package-dotnet:
  stage: package
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - echo "Installing Veracode CLI..."
    - apt-get update && apt-get install -y curl bash
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"

    - echo "Discovering .NET projects..."
    - veracode package discover --source . --verbose

    - echo "Packaging .NET application..."
    - mkdir -p "$ARTIFACTS_DIR"

    # Set build configuration
    - export SRCCLR_MSVC_CONFIGURATION=Release
    - export SRCCLR_MSVC_PLATFORM=x64

    - echo "Configuration: $SRCCLR_MSVC_CONFIGURATION"
    - echo "Platform: $SRCCLR_MSVC_PLATFORM"

    - |
      veracode package \
        --source . \
        --output "$ARTIFACTS_DIR" \
        --trust \
        --verbose

    - ls -lh "$ARTIFACTS_DIR"

  artifacts:
    paths:
      - $ARTIFACTS_DIR/
    expire_in: 30 days

  only:
    - web

# ==========================================================================
# NODE.JS PACKAGING
# ==========================================================================

veracode:package-nodejs:
  stage: package
  image: node:18-alpine
  script:
    - echo "Installing Veracode CLI..."
    - apk add --no-cache curl bash
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"

    - echo "Packaging Node.js application..."
    - mkdir -p "$ARTIFACTS_DIR"

    - |
      veracode package \
        --source . \
        --output "$ARTIFACTS_DIR" \
        --trust \
        --verbose

    - ls -lh "$ARTIFACTS_DIR"

  artifacts:
    paths:
      - $ARTIFACTS_DIR/
    expire_in: 30 days

  only:
    - web

# ==========================================================================
# PYTHON PACKAGING
# ==========================================================================

veracode:package-python:
  stage: package
  image: python:3.11-alpine
  script:
    - echo "Installing Veracode CLI..."
    - apk add --no-cache curl bash
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"

    - echo "Packaging Python application..."
    - echo "Note: Projects without package manager will generate 'no-pm' artifact"
    - mkdir -p "$ARTIFACTS_DIR"

    - |
      veracode package \
        --source . \
        --output "$ARTIFACTS_DIR" \
        --trust \
        --verbose

    - ls -lh "$ARTIFACTS_DIR"

  artifacts:
    paths:
      - $ARTIFACTS_DIR/
    expire_in: 30 days

  only:
    - web

# ==========================================================================
# GO PACKAGING
# ==========================================================================

veracode:package-go:
  stage: package
  image: golang:1.21-alpine
  script:
    - echo "Installing Veracode CLI..."
    - apk add --no-cache curl bash
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"

    - echo "Packaging Go application..."
    - mkdir -p "$ARTIFACTS_DIR"

    # Enable CGO code generation if needed
    - export VERACODE_PACKAGE_GOLANG_GENERATE=true

    - echo "CGO generation: $VERACODE_PACKAGE_GOLANG_GENERATE"
    - echo "Note: Nested Go modules are excluded from packaging"

    - |
      veracode package \
        --source . \
        --output "$ARTIFACTS_DIR" \
        --trust \
        --verbose

    - ls -lh "$ARTIFACTS_DIR"

  artifacts:
    paths:
      - $ARTIFACTS_DIR/
    expire_in: 30 days

  only:
    - web

# ==========================================================================
# GIT REPOSITORY PACKAGING
# ==========================================================================

veracode:package-repository:
  stage: package
  image: alpine:latest
  script:
    - echo "Installing Veracode CLI..."
    - apk add --no-cache curl bash git
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"

    - echo "Packaging from GitHub repository..."
    - mkdir -p "$ARTIFACTS_DIR"

    # Package from public repository
    - |
      veracode package \
        --source https://github.com/veracode/verademo \
        --type repo \
        --output "$ARTIFACTS_DIR" \
        --trust \
        --verbose

    - echo "✓ Repository packaged successfully"
    - ls -lh "$ARTIFACTS_DIR"

  artifacts:
    paths:
      - $ARTIFACTS_DIR/
    expire_in: 30 days

  only:
    - web

# ==========================================================================
# COMPLETE WORKFLOW: PACKAGE + UPLOAD
# ==========================================================================

veracode:package-and-upload:
  stage: upload
  image: maven:3.9-eclipse-temurin-17
  dependencies:
    - veracode:package-maven
  script:
    - echo "Installing Veracode CLI..."
    - apt-get update && apt-get install -y curl
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"
    - veracode --version

    - echo "Step 1: Packaging application..."
    - mkdir -p "$ARTIFACTS_DIR"

    - |
      veracode package \
        --source . \
        --output "$ARTIFACTS_DIR" \
        --trust \
        --verbose \
        --strict

    - echo "✓ Packaging complete"
    - ls -lh "$ARTIFACTS_DIR"

    - echo "Step 2: Uploading to Veracode for Policy Scan..."

    # Find the packaged artifact
    - ARTIFACT=$(find "$ARTIFACTS_DIR" -name "*.zip" -o -name "*.jar" | head -1)

    - |
      if [ -z "$ARTIFACT" ]; then
        echo "❌ No artifact found in $ARTIFACTS_DIR"
        exit 1
      fi

    - echo "Found artifact: $ARTIFACT"

    # Upload using veracode static scan
    - |
      veracode static scan \
        --source "$ARTIFACT" \
        --app "$APP_NAME" \
        --create-app \
        --sandbox-name "GitLab-Pipeline-$CI_PIPELINE_ID" \
        --results-file results.json

  artifacts:
    paths:
      - $ARTIFACTS_DIR/
      - results.json
    expire_in: 90 days

  only:
    - web

veracode:package-and-pipeline-scan:
  stage: upload
  image: maven:3.9-eclipse-temurin-17
  script:
    - apt-get update && apt-get install -y curl
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"

    - echo "Packaging application..."
    - mkdir -p "$ARTIFACTS_DIR"

    - |
      veracode package \
        --source . \
        --output "$ARTIFACTS_DIR" \
        --trust \
        --verbose

    - echo "Running Pipeline Scan..."

    - ARTIFACT=$(find "$ARTIFACTS_DIR" -name "*.zip" -o -name "*.jar" | head -1)

    # Run Pipeline Scan for fast feedback
    - |
      veracode static pipeline-scan \
        --file "$ARTIFACT" \
        --fail-on-severity "Very High,High" \
        --json-output-file pipeline-results.json

  artifacts:
    paths:
      - $ARTIFACTS_DIR/
      - pipeline-results.json
    expire_in: 30 days

  only:
    - web

# ==========================================================================
# TROUBLESHOOTING
# ==========================================================================

veracode:debug-packaging:
  stage: package
  image: alpine:latest
  when: manual
  script:
    - apk add --no-cache curl bash
    - curl -fsS https://tools.veracode.com/veracode-cli/install | sh
    - export PATH="$HOME/.veracode-cli:$PATH"

    - echo "Running package with verbose output and error handling..."
    - mkdir -p "$ARTIFACTS_DIR"

    - set -e  # Exit on error

    - |
      veracode package \
        --source . \
        --output "$ARTIFACTS_DIR" \
        --trust \
        --verbose \
        --strict || {
          EXIT_CODE=$?
          echo "❌ Packaging failed with exit code: $EXIT_CODE"

          if [ $EXIT_CODE -eq 4 ]; then
            echo "Build failure detected (exit code 4)"
          fi

          exit $EXIT_CODE
        }

    - echo "✓ Packaging succeeded"

# ============================================================================
# USAGE NOTES
# ============================================================================
#
# Package Command Flags:
# --source (-s)     : Source location (required)
# --trust (-a)      : Acknowledge source is trustworthy (required first use)
# --output (-o)     : Output directory (default: current directory)
# --type (-t)       : Source type: directory or repo (default: directory)
# --verbose (-v)    : Show detailed output
# --strict          : Return exit code 4 on build failures
# --help (-h)       : Show help
#
# Environment Variables:
# SRCCLR_CUSTOM_MAVEN_COMMAND    : Custom Maven arguments
# VERACODE_PACKAGE_GOLANG_GENERATE : Enable Go CGO generation
# SRCCLR_MSVC_CONFIGURATION      : .NET build configuration
# SRCCLR_MSVC_PLATFORM           : .NET platform (x64, x86, ARM64)
#
# CI/CD Variables Required:
# - VERACODE_API_ID (for upload jobs)
# - VERACODE_API_KEY (for upload jobs)
#
# Limitations:
# - SCA Agent-based Scan NOT supported
# - Discover only supports MSBuild and Maven
# - Repository packaging uses temporary clone
#
# Documentation:
# - https://docs.veracode.com/r/veracode_package
# - https://docs.veracode.com/r/About_auto_packaging
# ============================================================================

</script>


<script type="text/yaml" id="card28">
# URL: https://github.com/enzo-appsec/veracode-ci-cd-templates/blob/main/gitlab/pipeline-scan.yml
  # ============================================================================
# Veracode Pipeline Scan (SAST) - GitLab CI Template
# ============================================================================
# This template demonstrates how to integrate Veracode Pipeline Scan into
# your GitLab CI/CD pipeline for fast Static Application Security Testing.
#
# Pipeline Scan provides results in minutes (vs hours for Policy Scan) and is
# ideal for shift-left security in CI/CD workflows.
#
# Prerequisites:
# - Veracode API credentials stored in GitLab CI/CD variables:
#   - VERACODE_API_ID (masked, protected)
#   - VERACODE_API_KEY (masked, protected)
# - Application compiled/packaged (JAR, WAR, ZIP, etc.)
# - Veracode Pipeline Scanner (downloaded during pipeline execution)
#
# Usage:
# Copy the relevant stages/jobs into your .gitlab-ci.yml file
#
# Documentation: https://docs.veracode.com/r/Pipeline_Scan
# ============================================================================

# ============================================================================
# PIPELINE CONFIGURATION
# ============================================================================

stages:
  - build
  - security-scan
  - results

# ============================================================================
# VARIABLES
# ============================================================================
# Configure these variables in GitLab: Settings → CI/CD → Variables
# Mark VERACODE_API_KEY as "masked" and both as "protected"
# ============================================================================

variables:
  # Application-specific settings
  APP_NAME: "my-application"

  # Build output path (customize for your application)
  BUILD_ARTIFACT: "target/*.jar"

  # Java version for Pipeline Scanner
  JAVA_VERSION: "11"

  # Scan configuration
  FAIL_ON_SEVERITY: "Very High, High"

  # Results directory
  RESULTS_DIR: "veracode-results"

# ============================================================================
# BUILD STAGE
# ============================================================================
# Build and package your application
# ============================================================================

build:application:
  stage: build
  image: maven:3.9-eclipse-temurin-11  # Customize for your build tool

  # ====================================================================
  # BUILD BLOCK - Customize for your application
  # ====================================================================
  # Replace with your actual build process
  # Common examples below:
  # ====================================================================

  script:
    - echo "Building $APP_NAME..."

    # Example: Maven build
    - mvn clean package -DskipTests

    # Example: Gradle build
    # - ./gradlew build -x test

    # Example: npm build
    # - npm ci
    # - npm run build

    # Example: .NET build
    # - dotnet restore
    # - dotnet publish -c Release -o ./publish

    - echo "Build completed successfully"
    - ls -la target/  # Verify build artifacts

  # ====================================================================
  # ARTIFACT CONFIGURATION
  # ====================================================================
  # Preserve build artifacts for the security scan stage
  # ====================================================================

  artifacts:
    name: "build-artifacts-$CI_COMMIT_SHORT_SHA"
    paths:
      - target/*.jar  # Customize path to your build output
      # Additional paths as needed:
      # - build/libs/*.jar
      # - dist/**/*
      # - publish/**/*
    expire_in: 1 hour

  # ====================================================================
  # CACHE CONFIGURATION (Optional)
  # ====================================================================
  # Cache dependencies for faster builds
  # ====================================================================

  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository  # Maven cache
      # - .gradle/        # Gradle cache
      # - node_modules/   # npm cache

  # Run only on specific branches
  only:
    - main
    - develop
    - merge_requests
    - tags

# ============================================================================
# SECURITY SCAN STAGE
# ============================================================================
# Run Veracode Pipeline Scan on the built artifact
# ============================================================================

veracode:pipeline-scan:
  stage: security-scan
  image: openjdk:11-jdk-slim  # Need Java runtime for Pipeline Scanner

  needs:
    - build:application

  # ====================================================================
  # SETUP BLOCK - Install required tools
  # ====================================================================

  before_script:
    - echo "Setting up Veracode Pipeline Scanner..."
    - apt-get update && apt-get install -y curl unzip

    # Download Veracode Pipeline Scanner
    - curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
    - unzip -o pipeline-scan-LATEST.zip
    - ls -la pipeline-scan.jar

    # Create results directory
    - mkdir -p $RESULTS_DIR

  # ====================================================================
  # SCAN BLOCK - Execute Veracode Pipeline Scan
  # ====================================================================
  # This runs the actual security scan on your application
  #
  # Key Parameters:
  # - veracode_api_id: Your Veracode API ID (from CI/CD variables)
  # - veracode_api_key: Your Veracode API Key (from CI/CD variables)
  # - file: Path to the file to scan (JAR, WAR, ZIP, etc.)
  # - fail_on_severity: Fail build on specified severities
  # - fail_on_cwe: Fail build on specific CWE IDs
  # - baseline_file: Compare against previous scan results
  # ====================================================================

  script:
    - echo "Starting Veracode Pipeline Scan for $APP_NAME..."
    - echo "Scanning artifacts in $BUILD_ARTIFACT"

    # Run the Pipeline Scanner
    - |
      java -jar pipeline-scan.jar \
        --veracode_api_id "$VERACODE_API_ID" \
        --veracode_api_key "$VERACODE_API_KEY" \
        --file "$BUILD_ARTIFACT" \
        --project_name "$APP_NAME" \
        --project_url "$CI_PROJECT_URL" \
        --project_ref "$CI_COMMIT_REF_NAME" \
        --fail_on_severity="$FAIL_ON_SEVERITY" \
        --json_output_file "$RESULTS_DIR/results.json" \
        --summary_output \
        --summary_output_file "$RESULTS_DIR/summary.json" \
        || SCAN_FAILED=$?

    # Display scan summary
    - echo "Scan completed. Results:"
    - cat $RESULTS_DIR/summary.json || true

    # Exit with scan status
    - exit ${SCAN_FAILED:-0}

  # ====================================================================
  # RESULTS BLOCK - Preserve scan results
  # ====================================================================
  # Save scan results as job artifacts for review and audit
  # ====================================================================

  artifacts:
    name: "veracode-pipeline-scan-$CI_COMMIT_SHORT_SHA"
    when: always  # Always save results, even if scan fails
    paths:
      - $RESULTS_DIR/
    reports:
      # GitLab can parse SAST reports in specific format
      # Add conversion to GitLab SAST format if needed
      sast: $RESULTS_DIR/gl-sast-report.json
    expire_in: 30 days

  # Allow manual retry if scan fails
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

  # Run only on specific branches
  only:
    - main
    - develop
    - merge_requests
    - tags

# ============================================================================

#
# Common CWE IDs (for --fail_on_cwe):
# - 79: Cross-Site Scripting (XSS)
# - 89: SQL Injection
# - 78: OS Command Injection
# - 22: Path Traversal
# - 352: Cross-Site Request Forgery (CSRF)
# - 798: Use of Hard-coded Credentials
#
# Usage Examples:
# --fail_on_severity="Very High, High"
# --fail_on_cwe="79,89,78"
#
# Additional Options:
# --timeout: Maximum scan time in minutes (default: 60)
# --include: Additional files to include in scan
# --exclude: Files to exclude from scan
# --development_stage: Development stage (Development/Testing/Release)
#
# ============================================================================

# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# Common Issues:
#
# 1. Authentication Errors:
#    - Verify VERACODE_API_ID and VERACODE_API_KEY are set in CI/CD variables
#    - Navigate to: Settings → CI/CD → Variables
#    - Ensure both are marked as "masked" and "protected"
#    - Check API credentials haven't expired in Veracode Platform
#
# 2. File Not Found:
#    - Verify BUILD_ARTIFACT path matches your build output
#    - Check build job artifacts configuration
#    - Ensure artifacts are not expired
#    - Verify file permissions
#
# 3. Job Failures:
#    - Review job logs for detailed error messages
#    - Check if --fail_on_severity threshold is appropriate
#    - Verify uploaded file is a valid application package
#    - Ensure sufficient runner resources (memory, CPU)

# 4. Artifact Issues:
#    - Verify artifacts paths are correct
#    - Check expire_in duration
#    - Ensure dependencies between jobs are correct
#    - Review artifacts size limits
#
# 5. Permission Errors:
#    - Verify CI/CD variables are accessible (not limited to protected branches)
#    - Check runner has network access to Veracode
#    - Ensure container has required permissions
#
# For more help: https://docs.veracode.com/r/c_pipeline_scan_commands
# GitLab CI/CD docs: https://docs.gitlab.com/ee/ci/
# ============================================================================
  
</script>

<script type="text/yaml" id="card30">
# URL: https://github.com/enzo-appsec/veracode-ci-cd-templates/blob/main/gitlab/sca-scan.yml
# ============================================================================
# Veracode Policy Scan (Comprehensive SAST) - GitLab CI Template
# ============================================================================
# This template demonstrates how to integrate Veracode Policy Scan into your
# GitLab CI/CD pipeline for comprehensive Static Application Security Testing
# and policy compliance verification.
#
# Policy Scan provides thorough security analysis and is used for:
# - Release candidate validation
# - Policy compliance reporting
# - Detailed flaw remediation guidance
# - Security gate checks before production
#
# Note: Policy Scan takes longer than Pipeline Scan (hours vs minutes)
# but provides comprehensive results and policy enforcement.
#
# Prerequisites:
# - Veracode API credentials stored in GitLab CI/CD variables
# - Application compiled/packaged (JAR, WAR, ZIP, etc.)
# - Veracode application profile created (or auto-created)
#
# Usage: Copy relevant stages/jobs into your .gitlab-ci.yml file
#
# Documentation: https://docs.veracode.com/r/Veracode_Upload_and_Scan
# ============================================================================

# ============================================================================
# PIPELINE CONFIGURATION
# ============================================================================

stages:
  - build
  - upload
  - verify
  - report

# ============================================================================
# VARIABLES
# ============================================================================

variables:
  APP_NAME: "my-application"
  APP_VERSION: "$CI_PIPELINE_IID"
  BUILD_ARTIFACT: "target/*.jar"
  SCAN_TIMEOUT_MINUTES: "60"
  FAIL_ON_POLICY_VIOLATION: "true"

# ============================================================================
# BUILD STAGE
# ============================================================================

build:application:
  stage: build
  image: maven:3.9-eclipse-temurin-11

  script:
    - echo "Building $APP_NAME version $APP_VERSION..."
    - mvn clean package -DskipTests
    - ls -la target/

  artifacts:
    name: "build-artifacts-$CI_COMMIT_SHORT_SHA"
    paths:
      - target/*.jar
    expire_in: 1 hour

  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository

  only:
    - main
    - /^release\/.*$/
    - tags

# ============================================================================
# UPLOAD AND SCAN STAGE
# ============================================================================

veracode:upload:
  stage: upload
  image: openjdk:11-jdk-slim

  needs:
    - build:application

  # ========================================================================
  # SETUP BLOCK
  # ========================================================================

  before_script:
    - echo "Setting up Veracode API Wrapper..."
    - apt-get update && apt-get install -y curl

    # Download Veracode Java API Wrapper
    - curl -sSO https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/23.8.12.0/vosp-api-wrappers-java-23.8.12.0.jar
    - mv vosp-api-wrappers-java-23.8.12.0.jar VeracodeJavaAPI.jar
    - ls -la VeracodeJavaAPI.jar

  # ========================================================================
  # UPLOAD BLOCK
  # ========================================================================
  # Upload application to Veracode Platform and initiate scan
  # ========================================================================

  script:
    - echo "Uploading $APP_NAME version $APP_VERSION to Veracode Platform..."

    - |
      java -jar VeracodeJavaAPI.jar \
        -vid "$VERACODE_API_ID" \
        -vkey "$VERACODE_API_KEY" \
        -action UploadAndScan \
        -appname "$APP_NAME" \
        -createprofile true \
        -version "$APP_VERSION" \
        -filepath "$BUILD_ARTIFACT" \
        -autoscan true

    - echo "✓ Upload completed. Scan initiated on Veracode Platform."
    - echo "Application: $APP_NAME"
    - echo "Version: $APP_VERSION"
    - echo "Monitor progress at: https://analysiscenter.veracode.com"

  # Store API wrapper for later stages
  artifacts:
    paths:
      - VeracodeJavaAPI.jar
    expire_in: 2 hours

  only:
    - main
    - /^release\/.*$/
    - tags

# ============================================================================
# WAIT FOR SCAN COMPLETION STAGE
# ============================================================================

veracode:wait-for-scan:
  stage: verify
  image: openjdk:11-jdk-slim

  needs:
    - veracode:upload

  # ========================================================================
  # WAIT BLOCK
  # ========================================================================
  # Poll Veracode Platform until scan completes or times out
  # ========================================================================

  script:
    - echo "Waiting for scan to complete (timeout: $SCAN_TIMEOUT_MINUTES minutes)..."
    - apt-get update && apt-get install -y bc

    - START_TIME=$(date +%s)
    - TIMEOUT_SECONDS=$((SCAN_TIMEOUT_MINUTES * 60))

    - |
      while true; do
        # Get current scan status
        STATUS=$(java -jar VeracodeJavaAPI.jar \
          -vid "$VERACODE_API_ID" \
          -vkey "$VERACODE_API_KEY" \
          -action GetBuildInfo \
          -appname "$APP_NAME" \
          -version "$APP_VERSION" | \
          grep "status=" | cut -d'"' -f2 || echo "Unknown")

        echo "Current scan status: $STATUS"

        # Check if scan is complete
        if [[ "$STATUS" == "Results Ready" ]]; then
          echo "✓ Scan completed successfully"
          break
        elif [[ "$STATUS" == "Scan Failed" ]] || [[ "$STATUS" == "Incomplete" ]]; then
          echo "✗ Scan failed or incomplete"
          exit 1
        fi

        # Check timeout
        CURRENT_TIME=$(date +%s)
        ELAPSED=$((CURRENT_TIME - START_TIME))

        if [ $ELAPSED -gt $TIMEOUT_SECONDS ]; then
          echo "✗ Scan timeout after $SCAN_TIMEOUT_MINUTES minutes"
          echo "Check scan status in Veracode Platform"
          exit 1
        fi

        # Progress indicator
        MINUTES_ELAPSED=$((ELAPSED / 60))
        echo "Elapsed time: $MINUTES_ELAPSED minutes / $SCAN_TIMEOUT_MINUTES minutes"

        # Wait before next check
        echo "Waiting 60 seconds before next check..."
        sleep 60
      done

  # Pass API wrapper to next stage
  artifacts:
    paths:
      - VeracodeJavaAPI.jar
    expire_in: 1 hour

  only:
    - main
    - /^release\/.*$/
    - tags

  # Allow manual retry
  retry:
    max: 1
    when:
      - runner_system_failure

# ============================================================================
# POLICY COMPLIANCE CHECK STAGE
# ============================================================================

veracode:check-compliance:
  stage: report
  image: openjdk:11-jdk-slim

  needs:
    - veracode:wait-for-scan

  before_script:
    - apt-get update && apt-get install -y libxml2-utils curl
    - mkdir -p veracode-reports

  # ========================================================================
  # DOWNLOAD RESULTS BLOCK
  # ========================================================================

  script:
    - echo "Downloading scan results for $APP_NAME version $APP_VERSION..."

    # Download detailed XML report
    - |
      java -jar VeracodeJavaAPI.jar \
        -vid "$VERACODE_API_ID" \
        -vkey "$VERACODE_API_KEY" \
        -action DetailedReport \
        -appname "$APP_NAME" \
        -version "$APP_VERSION" \
        -outputfilepath "veracode-reports/detailed-report.xml"

    # Download summary PDF report
    - |
      java -jar VeracodeJavaAPI.jar \
        -vid "$VERACODE_API_ID" \
        -vkey "$VERACODE_API_KEY" \
        -action SummaryReport \
        -appname "$APP_NAME" \
        -version "$APP_VERSION" \
        -outputfilepath "veracode-reports/summary-report.pdf"

    - echo "✓ Reports downloaded successfully"

    # ======================================================================
    # PARSE RESULTS BLOCK
    # ======================================================================

    - echo "Analyzing scan results..."

    # Extract policy compliance status
    - POLICY_STATUS=$(grep -oP 'policy_compliance_status="\K[^"]+' veracode-reports/detailed-report.xml || echo "Unknown")
    - echo "Policy Compliance Status: $POLICY_STATUS"

    # Count flaws by severity
    - VERY_HIGH=$(grep -c 'severity="5"' veracode-reports/detailed-report.xml || echo "0")
    - HIGH=$(grep -c 'severity="4"' veracode-reports/detailed-report.xml || echo "0")
    - MEDIUM=$(grep -c 'severity="3"' veracode-reports/detailed-report.xml || echo "0")
    - LOW=$(grep -c 'severity="2"' veracode-reports/detailed-report.xml || echo "0")

    - echo "Flaw Summary:"
    - echo "  Very High: $VERY_HIGH"
    - echo "  High: $HIGH"
    - echo "  Medium: $MEDIUM"
    - echo "  Low: $LOW"

    # ======================================================================
    # COMPLIANCE CHECK BLOCK
    # ======================================================================

    - |
      if [[ "$POLICY_STATUS" == "Pass" ]]; then
        echo "✓ Build passed Veracode policy compliance"
        exit 0
      elif [[ "$POLICY_STATUS" == "Not Assessed" ]]; then
        echo "⚠ Policy compliance not assessed"
        if [[ "$FAIL_ON_POLICY_VIOLATION" == "true" ]]; then
          echo "Build failed: No policy assessment"
          exit 1
        fi
      else
        echo "✗ Build failed Veracode policy compliance"
        echo "Review detailed-report.xml for flaw information"
        if [[ "$FAIL_ON_POLICY_VIOLATION" == "true" ]]; then
          exit 1
        fi
      fi

  # ========================================================================
  # ARTIFACTS BLOCK
  # ========================================================================

  artifacts:
    name: "veracode-policy-scan-$CI_COMMIT_SHORT_SHA"
    when: always
    paths:
      - veracode-reports/
    reports:
      # Optional: Convert to GitLab SAST format
      # sast: veracode-reports/gl-sast-report.json
    expire_in: 90 days

  only:
    - main
    - /^release\/.*$/
    - tags

# URL: https://github.com/enzo-appsec/veracode-ci-cd-templates/blob/main/gitlab/sca-scan.yml
# ============================================================================
# Veracode SCA Scan (Software Composition Analysis) - GitLab CI Template
# ============================================================================
# This template demonstrates how to integrate Veracode SCA scanning into your
# GitLab CI/CD pipeline to identify vulnerabilities in third-party dependencies
# and open-source components.
#
# SCA Scan analyzes:
# - Third-party libraries and dependencies
# - Known vulnerabilities (CVEs)
# - License compliance and risks
# - Outdated components
# - Transitive dependencies
#
# SCA runs quickly (minutes) and can run in parallel with other scans.
#
# Prerequisites:
# - Veracode SCA Agent credentials in GitLab CI/CD variables (SRCCLR_API_TOKEN)
# - Dependency manifest files (pom.xml, package.json, requirements.txt, etc.)
# - Source code with dependency declarations
#
# Usage: Copy relevant jobs into your .gitlab-ci.yml file
#
# Documentation: https://docs.veracode.com/r/Agent_Based_Scans
# ============================================================================

# ============================================================================
# PIPELINE CONFIGURATION
# ============================================================================

stages:
  - security
  - report

# ============================================================================
# VARIABLES
# ============================================================================
# SRCCLR_API_TOKEN Setup Instructions:
#
# 1. Obtain Your SCA Agent Token:
#    - Log into Veracode Platform (https://analysiscenter.veracode.com/)
#    - Navigate to: Scans & Analysis → Software Composition Analysis
#    - Select: Agent-Based Scan
#    - Select a Workspace (or create one)
#    - Select: Agents → Actions → Create
#    - Select any Integration Option
#    - Click: Create Agent & Generate Token
#    - COPY THE TOKEN IMMEDIATELY - it only displays once!
#
# 2. Store Token in GitLab:
#    - Go to: Settings → CI/CD → Variables → Expand
#    - Click: Add variable
#    - Key: SRCCLR_API_TOKEN
#    - Value: (paste token from step 1)
#    - Type: Variable
#    - Flags: ✓ Protected, ✓ Masked
#    - Click: Add variable
#
# 3. Required Permissions:
#    - Organization agent: Security Lead role
#    - Workspace agent: Security Lead, Workspace Admin, Workspace Editor, or Submitter
#
# 4. Alternative - Group-Level Variables:
#    - For multiple projects: Group Settings → CI/CD → Variables
#    - All projects in group will inherit the variable
#
# 5. Regional Configuration (if applicable):
#    - European Region: Add SRCCLR_REGION variable with value: ER
#    - US Federal Region: Add SRCCLR_REGION variable with value: FED
#
# Documentation: https://docs.veracode.com/r/Manage_agents_and_scans
# ============================================================================

variables:
  APP_NAME: "my-application"

# ============================================================================
# SCA SCAN JOB
# ============================================================================

veracode:sca-scan:
  stage: security
  image: alpine:latest

  # ========================================================================
  # SETUP BLOCK
  # ========================================================================

  before_script:
    - apk add --no-cache curl bash

    # Download Veracode SCA Agent
    - echo "Downloading Veracode SCA Agent..."
    - curl -sSL https://download.sourceclear.com/ci.sh -o ci.sh
    - chmod +x ci.sh

  # ========================================================================
  # SCAN BLOCK
  # ========================================================================

  script:
    - echo "Starting Veracode SCA scan for $APP_NAME..."

    # Run SCA scan
    - |
      ./ci.sh scan \
        --app "$APP_NAME" \
        --allow-dirty \
        --json > sca-results.json

    - echo "✓ SCA scan completed"

  # ========================================================================
  # ARTIFACTS
  # ========================================================================

  artifacts:
    name: "sca-results-$CI_COMMIT_SHORT_SHA"
    when: always
    paths:
      - sca-results.json
    reports:
      # GitLab can display dependency_scanning reports
      dependency_scanning: sca-results.json
    expire_in: 30 days

  # Allow job to fail without failing pipeline (optional)
  allow_failure: false

  only:
    - main
    - develop
    - merge_requests

<script>
/* ================================================================
  COLOR PALETTE  (colorIdx in CARDS maps into this array)
================================================================ */
const COLORS = [
  { bg:'rgba(99,202,183,0.15)',  border:'rgba(99,202,183,0.4)',  text:'#63cab7' }, // 0 teal
  { bg:'rgba(240,160,90,0.15)',  border:'rgba(240,160,90,0.4)',  text:'#f0a05a' }, // 1 orange
  { bg:'rgba(167,139,250,0.15)', border:'rgba(167,139,250,0.4)', text:'#a78bfa' }, // 2 purple
  { bg:'rgba(248,113,113,0.15)', border:'rgba(248,113,113,0.4)', text:'#f87171' }, // 3 red
  { bg:'rgba(74,222,128,0.15)',  border:'rgba(74,222,128,0.4)',  text:'#4ade80' }, // 4 green
  { bg:'rgba(96,165,250,0.15)',  border:'rgba(96,165,250,0.4)',  text:'#60a5fa' }, // 5 blue
  { bg:'rgba(251,191,36,0.15)',  border:'rgba(251,191,36,0.4)',  text:'#fbbf24' }, // 6 yellow
  { bg:'rgba(244,114,182,0.15)', border:'rgba(244,114,182,0.4)', text:'#f472b6' }, // 7 pink
];

/* ================================================================
  SAFE DOM HELPER  —  innerHTML never called with variable content
================================================================ */
function el(tag, attrs, ...children) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (v == null) continue;
      if (k === 'className')       node.className = String(v);
      else if (k === 'style')      Object.assign(node.style, v);
      else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
      else                         node.setAttribute(k, String(v));
    }
  }
  for (const child of children) {
    if (child == null) continue;
    node.appendChild(
      (typeof child === 'string' || typeof child === 'number')
        ? document.createTextNode(String(child))
        : child
    );
  }
  return node;
}

/* ================================================================
  STATE
================================================================ */
let activeFilter = 'all';

/* ================================================================
  FILTER CHIPS
================================================================ */
function renderChips() {
  const cats = [...new Set(CARDS.map(c => c.category))].sort();
  const fc   = document.getElementById('filterChips');
  fc.innerHTML = '';
  const chip = (label, val) => el('button', {
    className: 'chip' + (activeFilter === val ? ' active' : ''),
    role: 'radio', 'aria-checked': String(activeFilter === val),
    onClick: () => { activeFilter = val; renderGrid(); },
  }, label);
  fc.appendChild(chip('All', 'all'));
  cats.forEach(c => fc.appendChild(chip(c, c)));
}

/* ================================================================
  CARD GRID
================================================================ */
function renderGrid() {
  renderChips();
  const q       = document.getElementById('searchInput').value.trim().toLowerCase();
  const visible = CARDS.filter(c => {
    const matchCat = activeFilter === 'all' || c.category === activeFilter;
    const matchQ   = !q
      || c.name.toLowerCase().includes(q)
      || c.description.toLowerCase().includes(q)
      || c.category.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('statsText').textContent =
    `${visible.length} of ${CARDS.length} integrations`;
  document.getElementById('cardCountBadge').textContent = visible.length;

  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  if (!visible.length) {
    grid.appendChild(el('div', { className: 'empty-state' },
      el('div', { className: 'empty-icon' }, '🔍'),
      el('p', null, 'No integrations match your search.'),
    ));
    return;
  }

  visible.forEach((card, idx) => {
    const col  = COLORS[card.colorIdx] ?? COLORS[0];

    // Check whether a matching YAML block exists for this card
    const hasYaml = !!document.getElementById(card.id);

    const node = el('div', {
      className: 'card', role: 'listitem', tabindex: '0',
      'aria-label': `${card.name}, ${card.category}`,
      style: { animationDelay: `${idx * 0.05}s` },
      onClick:   () => openModal(card.id),
      onKeydown: e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(card.id); } },
    },
      el('div', { className: 'card-face' },
        el('div', { className: 'card-header-row' },
          el('div', { className: 'card-icon', 'aria-hidden': 'true',
            style: { background: col.bg, border: `1px solid ${col.border}` } }, card.icon),
          el('span', { className: 'card-badge',
            style: { background: col.bg, color: col.text, borderColor: col.border } }, card.category),
        ),
        el('div', { className: 'card-title' }, card.name),
        el('div', { className: 'card-desc'  }, card.description),
        el('div', { className: 'card-footer' },
          el('span', { className: 'card-meta' }, hasYaml ? 'View YAML →' : 'No YAML attached'),
          el('span', { className: 'card-arrow' }, '→'),
        ),
      )
    );
    grid.appendChild(node);
  });
}

/* ================================================================
  VIEW MODAL  —  reads raw textContent from the YAML block, displays
  it verbatim in a <pre>. Zero parsing involved.
================================================================ */
function openModal(id) {
  const card = CARDS.find(c => c.id === id);
  if (!card) return;
  const col = COLORS[card.colorIdx] ?? COLORS[0];

  // Header
  const vmIcon = document.getElementById('vmIcon');
  vmIcon.textContent = card.icon;
  Object.assign(vmIcon.style, { background: col.bg, border: `1px solid ${col.border}` });
  document.getElementById('vmTitleEl').textContent  = card.name;
  document.getElementById('vmSubtitle').textContent = card.category;

  // Body
  const body = document.getElementById('vmBody');
  body.innerHTML = '';

  const yamlNode = document.getElementById(id);

  if (!yamlNode) {
    body.appendChild(el('div', { className: 'empty-state' },
      el('div', { className: 'empty-icon' }, '📋'),
      el('p', null, `No YAML block found with id="${id}".`),
      el('p', { style: { marginTop:'8px', fontSize:'0.72rem' } },
        'Add a <script type="text/yaml" id="' + id + '"> block to this file.'),
    ));
  } else {
    // Get the raw text — trim the leading newline the browser adds
    const rawYaml = yamlNode.textContent.replace(/^\n/, '');

    const pre     = el('pre');
    pre.textContent = rawYaml;   // textContent only — never innerHTML

    const copyBtn = el('button', { className: 'copy-btn' }, 'Copy');
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(rawYaml).then(() => {
        copyBtn.textContent = 'Copied!'; copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 2000);
      });
    });

    body.appendChild(
      el('div', { className: 'yaml-block' },
        el('div', { className: 'yaml-block-header' },
          el('span', { className: 'yaml-label' }, card.yamlLabel || `${id}.yaml`),
          copyBtn,
        ),
        pre,
      )
    );
  }

  document.getElementById('viewModal').classList.add('open');
  document.getElementById('vmClose').focus();
}

function closeModal() { document.getElementById('viewModal').classList.remove('open'); }
document.getElementById('vmClose').addEventListener('click', closeModal);
document.getElementById('viewModal').addEventListener('click', e => {
  if (e.target === document.getElementById('viewModal')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ================================================================
  SEARCH + TOAST
================================================================ */
document.getElementById('searchInput').addEventListener('input', renderGrid);

let _toastTimer;
function showToast(type, icon, msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent  = icon;
  document.getElementById('toastIcon').className    = `icon-${type}`;
  document.getElementById('toastMsg').textContent   = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

/* ================================================================
  BOOT
================================================================ */
renderGrid();
</script>
