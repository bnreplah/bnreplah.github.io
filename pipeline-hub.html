          - app_name.txt

    # -------------------------------------------------------------------------
    # SCA
    # Agent-Based Software Composition Analysis (runs on every branch)
    # -------------------------------------------------------------------------
    - step: &sca-scan
        name: Agent-Based SCA
        script:
          - set -e
          - echo "Running Veracode Agent-Based SCA..."
          - curl -sSL https://download.sourceclear.com/ci.sh | bash -s -- scan --recursive --update-advisor || echo "SCA scan completed"

    # -------------------------------------------------------------------------
    # FEATURE PIPELINE SCAN
    # feature/*  -> Pipeline Scan, no gate, per artifact
    # -------------------------------------------------------------------------
    - step: &pipeline-scan
        name: Pipeline Scan (feature)
        script:
          - set -e
          - echo "Installing prerequisites..."
          - apt-get update && apt-get install -y unzip default-jre
          - echo "Downloading Veracode Pipeline Scanner..."
          - curl -fsSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          - unzip -o pipeline-scan-LATEST.zip
          - |
            if [ ! -f "pipeline-scan.jar" ]; then
              echo "ERROR: pipeline-scan.jar not found"
              exit 1
            fi
          - mkdir -p scan_results
          - SCAN_COUNT=0
          # Iterate and scan each artifact individually
          - |
            while IFS= read -r artifact; do
              SCAN_COUNT=$((SCAN_COUNT + 1))
              ARTIFACT_NAME=$(basename "$artifact")
              echo ""
              echo "=========================================="
              echo "Scanning [$SCAN_COUNT] - $ARTIFACT_NAME"
              echo "=========================================="
              java -jar pipeline-scan.jar \
                -f "$artifact" \
                -vid "$VERACODE_API_ID" \
                -vkey "$VERACODE_API_KEY" \
                --fail_on_severity "" \
                --issue_details true \
                -jo true \
                || echo "Pipeline scan completed with findings for $ARTIFACT_NAME"
              if [ -f "results.json" ]; then
                mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
                echo "Results saved - scan_results/${ARTIFACT_NAME}_results.json"
              else
                echo "WARNING - No results.json produced for $ARTIFACT_NAME"
              fi
            done < artifact_list.txt
          - echo "Pipeline Scan completed for $SCAN_COUNT artifacts"
        artifacts:
          - scan_results/**

    # -------------------------------------------------------------------------
    # PR PIPELINE SCAN (GATE)
    # pull-requests -> Pipeline Scan with policy gate (Very High / High)
    # -------------------------------------------------------------------------
    - step: &pipeline-scan-gate
        name: Pipeline Scan (PR Gate)
        script:
          - set -e
          - echo "Installing prerequisites..."
          - apt-get update && apt-get install -y unzip default-jre
          - echo "Downloading Veracode Pipeline Scanner..."
          - curl -fsSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          - unzip -o pipeline-scan-LATEST.zip
          - |
            if [ ! -f "pipeline-scan.jar" ]; then
              echo "ERROR: pipeline-scan.jar not found"
              exit 1
            fi
          - mkdir -p scan_results
          - FAILED=0
          - SCAN_COUNT=0
          - FAILED_ARTIFACTS=""
          # Iterate, scan each artifact, track failures across artifacts
          - |
            while IFS= read -r artifact; do
              SCAN_COUNT=$((SCAN_COUNT + 1))
              ARTIFACT_NAME=$(basename "$artifact")
              echo ""
              echo "=========================================="
              echo "Scanning [$SCAN_COUNT] - $ARTIFACT_NAME"
              echo "=========================================="
              if ! java -jar pipeline-scan.jar \
                -f "$artifact" \
                -vid "$VERACODE_API_ID" \
                -vkey "$VERACODE_API_KEY" \
                --fail_on_severity "Very High, High" \
                --issue_details true \
                --policy_name "Veracode Recommended Very High" \
                -jo true; then
                FAILED=1
                FAILED_ARTIFACTS="$FAILED_ARTIFACTS $ARTIFACT_NAME"
                echo "WARNING - Policy gate failed for $ARTIFACT_NAME"
              fi
              if [ -f "results.json" ]; then
                mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
                echo "Results saved - scan_results/${ARTIFACT_NAME}_results.json"
              else
                echo "WARNING - No results.json produced for $ARTIFACT_NAME"
              fi
            done < artifact_list.txt
          - echo "Pipeline Scan completed for $SCAN_COUNT artifacts"
          - |
            if [ $FAILED -eq 1 ]; then
              echo "ERROR - Policy gate failed for -$FAILED_ARTIFACTS"
              exit 1
            fi
        artifacts:
          - scan_results/**

    # -------------------------------------------------------------------------
    # SANDBOX SCAN
    # release/* -> Upload all artifacts to a Veracode Sandbox
    # -------------------------------------------------------------------------
    - step: &sandbox-scan
        name: Sandbox Scan (Release)
        script:
          - set -e
          - echo "Installing prerequisites..."
          - apt-get update && apt-get install -y unzip
          - echo "Downloading Veracode Java API Wrapper..."
          - mkdir -p .veracode
          - VERSION=$(curl -fsS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
          - |
            if [ -z "$VERSION" ]; then
              echo "ERROR: Failed to get API Wrapper version"
              exit 1
            fi
          - echo "Downloading version $VERSION"
          - curl -fsSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
          - cd .veracode && unzip -o dist.zip && cd ..
          - JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
          - |
            if [ -z "$JAR_PATH" ]; then
              echo "ERROR: VeracodeJavaAPI.jar not found"
              exit 1
            fi
          - cp "$JAR_PATH" vosp-api-wrapper-java.jar
          - APP_NAME=$(cat app_name.txt)
          - echo "Uploading to Veracode Sandbox..."
          - echo "Application - $APP_NAME"
          - echo "Artifacts to upload:"
          - ls -lh verascan/
          # -filepath accepts a directory; the wrapper handles multi-file upload
          - |
            java -jar vosp-api-wrapper-java.jar \
              -vid "$VERACODE_API_ID" \
              -vkey "$VERACODE_API_KEY" \
              -action UploadAndScan \
              -appname "$APP_NAME" \
              -createprofile true \
              -autoscan true \
              -sandboxname "bitbucket-release" \
              -createsandbox true \
              -filepath "verascan" \
              -version "Release $BITBUCKET_BUILD_NUMBER"

    # -------------------------------------------------------------------------
    # POLICY SCAN
    # main -> Upload all artifacts for policy evaluation
    # -------------------------------------------------------------------------
    - step: &policy-scan
        name: Policy Scan (Production)
        script:
          - set -e
          - echo "Installing prerequisites..."
          - apt-get update && apt-get install -y unzip
          - echo "Downloading Veracode Java API Wrapper..."
          - mkdir -p .veracode
          - VERSION=$(curl -fsS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
          - |
            if [ -z "$VERSION" ]; then
              echo "ERROR: Failed to get API Wrapper version"
              exit 1
            fi
          - echo "Downloading version $VERSION"
          - curl -fsSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
          - cd .veracode && unzip -o dist.zip && cd ..
          - JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
          - |
            if [ -z "$JAR_PATH" ]; then
              echo "ERROR: VeracodeJavaAPI.jar not found"
              exit 1
            fi
          - cp "$JAR_PATH" vosp-api-wrapper-java.jar
          - APP_NAME=$(cat app_name.txt)
          - echo "Uploading to Veracode Platform..."
          - echo "Application - $APP_NAME"
          - echo "Artifacts to upload:"
          - ls -lh verascan/
          - |
            java -jar vosp-api-wrapper-java.jar \
              -vid "$VERACODE_API_ID" \
              -vkey "$VERACODE_API_KEY" \
              -action UploadAndScan \
              -appname "$APP_NAME" \
              -createprofile true \
              -autoscan true \
              -filepath "verascan" \
              -version "main $BITBUCKET_BUILD_NUMBER"

# =============================================================================
# PIPELINE TRIGGERS
# Branch and event mappings
# =============================================================================
pipelines:
  branches:
    main:
      - step: *package
      - parallel:
          - step: *sca-scan
          - step: *policy-scan

    release/*:
      - step: *package
      - parallel:
          - step: *sca-scan
          - step: *sandbox-scan

    feature/*:
      - step: *package
      - parallel:
          - step: *sca-scan
          - step: *pipeline-scan

  pull-requests:
    '**':
      - step: *package
      - parallel:
          - step: *sca-scan
          - step: *pipeline-scan-gate
</script>


<script type="text/yaml" id="card11">
# URL: https://github.com/ancient-cthulhu/pipeline-examples/blob/main/bitbucket/spanish/veracode-scans.yml
# =============================================================================
# Pipeline de Seguridad Veracode para Bitbucket (Soporte Multi-Artefacto)
# =============================================================================
#
# Variables de repositorio requeridas (Configuracion > Pipelines > Variables):
#   - VERACODE_API_ID         (requerida)
#   - VERACODE_API_KEY        (requerida, marcar como asegurada)
#   - SRCCLR_API_TOKEN        (opcional, solo si se usa SCA)
#   - VERACODE_APP_NAME       (opcional, sobreescribe el nombre por defecto)
#
# Estrategia de escaneo detectada por rama / evento:
#   feature/*       -> Pipeline Scan (sin gate)                     por artefacto
#   pull-requests   -> Pipeline Scan (gate Very High / High)         por artefacto
#   release/*       -> Sandbox Scan (SAST completo en sandbox)       todos los artefactos
#   main            -> Policy Scan (certificacion de produccion)     todos los artefactos
#
# Formato por defecto del nombre de app: {workspace}/{repo} via $BITBUCKET_REPO_FULL_NAME
# =============================================================================

image: maven:3.9.6-eclipse-temurin-17

definitions:
  steps:
    # -------------------------------------------------------------------------
    # PACKAGE
    # Construir, autoempaquetar, listar y validar artefactos
    # -------------------------------------------------------------------------
    - step: &package
        name: Empaquetar Artefactos
        script:
          - set -e
          # Resolver nombre del perfil de aplicacion en Veracode
          - |
            if [ -n "$VERACODE_APP_NAME" ]; then
              APP_NAME="$VERACODE_APP_NAME"
            else
              APP_NAME="$BITBUCKET_REPO_FULL_NAME"
            fi
            echo "Perfil de Aplicacion Veracode: $APP_NAME"
            echo "$APP_NAME" > app_name.txt
          # Instalar Veracode CLI
          - echo "Instalando Veracode CLI..."
          - curl -fsS -O https://tools.veracode.com/veracode-cli/install
          - chmod +x ./install
          - ./install
          - chmod +x veracode
          - ./veracode version
          # Ejecutar autoempaquetador
          - echo "Ejecutando autoempaquetador de Veracode..."
          - mkdir -p verascan
          - ./veracode package --source . --output verascan --trust
          - echo "Artefactos empaquetados:"
          - ls -lhR verascan
          # Listar y validar artefactos
          - find verascan -type f \( -name "*.war" -o -name "*.jar" -o -name "*.zip" \) > artifact_list.txt
          - |
            if [ ! -s artifact_list.txt ]; then
              echo "ERROR: No se encontraron artefactos empaquetados"
              ls -lR verascan
              exit 1
            fi
          - echo "Artefactos encontrados:"
          - cat artifact_list.txt
          - ARTIFACT_COUNT=$(wc -l < artifact_list.txt)
          - echo "Total de artefactos - $ARTIFACT_COUNT"
        artifacts:
          - veracode
          - verascan/**
          - artifact_list.txt
          - app_name.txt

    # -------------------------------------------------------------------------
    # SCA
    # Analisis de Composicion de Software basado en agente (todas las ramas)
    # -------------------------------------------------------------------------
    - step: &sca-scan
        name: SCA basado en Agente
        script:
          - set -e
          - echo "Ejecutando Veracode Agent-Based SCA..."
          - curl -sSL https://download.sourceclear.com/ci.sh | bash -s -- scan --recursive --update-advisor || echo "Escaneo SCA completado"

    # -------------------------------------------------------------------------
    # PIPELINE SCAN EN FEATURE
    # feature/*  -> Pipeline Scan, sin gate, por artefacto
    # -------------------------------------------------------------------------
    - step: &pipeline-scan
        name: Pipeline Scan (feature)
        script:
          - set -e
          - echo "Instalando prerequisitos..."
          - apt-get update && apt-get install -y unzip default-jre
          - echo "Descargando Veracode Pipeline Scanner..."
          - curl -fsSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          - unzip -o pipeline-scan-LATEST.zip
          - |
            if [ ! -f "pipeline-scan.jar" ]; then
              echo "ERROR: pipeline-scan.jar no encontrado"
              exit 1
            fi
          - mkdir -p scan_results
          - SCAN_COUNT=0
          # Iterar y escanear cada artefacto individualmente
          - |
            while IFS= read -r artifact; do
              SCAN_COUNT=$((SCAN_COUNT + 1))
              ARTIFACT_NAME=$(basename "$artifact")
              echo ""
              echo "=========================================="
              echo "Escaneando [$SCAN_COUNT] - $ARTIFACT_NAME"
              echo "=========================================="
              java -jar pipeline-scan.jar \
                -f "$artifact" \
                -vid "$VERACODE_API_ID" \
                -vkey "$VERACODE_API_KEY" \
                --fail_on_severity "" \
                --issue_details true \
                -jo true \
                || echo "Pipeline scan completado con findings para $ARTIFACT_NAME"
              if [ -f "results.json" ]; then
                mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
                echo "Resultados guardados - scan_results/${ARTIFACT_NAME}_results.json"
              else
                echo "ADVERTENCIA - No se produjo results.json para $ARTIFACT_NAME"
              fi
            done < artifact_list.txt
          - echo "Pipeline Scan completado para $SCAN_COUNT artefactos"
        artifacts:
          - scan_results/**

    # -------------------------------------------------------------------------
    # PIPELINE SCAN EN PR (CON GATE)
    # pull-requests -> Pipeline Scan con gate de politica (Very High / High)
    # -------------------------------------------------------------------------
    - step: &pipeline-scan-gate
        name: Pipeline Scan (Gate de PR)
        script:
          - set -e
          - echo "Instalando prerequisitos..."
          - apt-get update && apt-get install -y unzip default-jre
          - echo "Descargando Veracode Pipeline Scanner..."
          - curl -fsSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          - unzip -o pipeline-scan-LATEST.zip
          - |
            if [ ! -f "pipeline-scan.jar" ]; then
              echo "ERROR: pipeline-scan.jar no encontrado"
              exit 1
            fi
          - mkdir -p scan_results
          - FAILED=0
          - SCAN_COUNT=0
          - FAILED_ARTIFACTS=""
          # Iterar, escanear cada artefacto, rastrear fallos entre artefactos
          - |
            while IFS= read -r artifact; do
              SCAN_COUNT=$((SCAN_COUNT + 1))
              ARTIFACT_NAME=$(basename "$artifact")
              echo ""
              echo "=========================================="
              echo "Escaneando [$SCAN_COUNT] - $ARTIFACT_NAME"
              echo "=========================================="
              if ! java -jar pipeline-scan.jar \
                -f "$artifact" \
                -vid "$VERACODE_API_ID" \
                -vkey "$VERACODE_API_KEY" \
                --fail_on_severity "Very High, High" \
                --issue_details true \
                --policy_name "Veracode Recommended Very High" \
                -jo true; then
                FAILED=1
                FAILED_ARTIFACTS="$FAILED_ARTIFACTS $ARTIFACT_NAME"
                echo "ADVERTENCIA - Gate de politica fallo para $ARTIFACT_NAME"
              fi
              if [ -f "results.json" ]; then
                mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
                echo "Resultados guardados - scan_results/${ARTIFACT_NAME}_results.json"
              else
                echo "ADVERTENCIA - No se produjo results.json para $ARTIFACT_NAME"
              fi
            done < artifact_list.txt
          - echo "Pipeline Scan completado para $SCAN_COUNT artefactos"
          - |
            if [ $FAILED -eq 1 ]; then
              echo "ERROR - Gate de politica fallo para -$FAILED_ARTIFACTS"
              exit 1
            fi
        artifacts:
          - scan_results/**

    # -------------------------------------------------------------------------
    # SANDBOX SCAN
    # release/* -> Subir todos los artefactos a un Sandbox de Veracode
    # -------------------------------------------------------------------------
    - step: &sandbox-scan
        name: Sandbox Scan (Release)
        script:
          - set -e
          - echo "Instalando prerequisitos..."
          - apt-get update && apt-get install -y unzip
          - echo "Descargando Veracode Java API Wrapper..."
          - mkdir -p .veracode
          - VERSION=$(curl -fsS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
          - |
            if [ -z "$VERSION" ]; then
              echo "ERROR: Fallo al obtener la version del API Wrapper"
              exit 1
            fi
          - echo "Descargando version $VERSION"
          - curl -fsSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
          - cd .veracode && unzip -o dist.zip && cd ..
          - JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
          - |
            if [ -z "$JAR_PATH" ]; then
              echo "ERROR: VeracodeJavaAPI.jar no encontrado"
              exit 1
            fi
          - cp "$JAR_PATH" vosp-api-wrapper-java.jar
          - APP_NAME=$(cat app_name.txt)
          - echo "Subiendo al Sandbox de Veracode..."
          - echo "Aplicacion - $APP_NAME"
          - echo "Artefactos a subir:"
          - ls -lh verascan/
          # -filepath acepta un directorio; el wrapper sube multiples archivos
          - |
            java -jar vosp-api-wrapper-java.jar \
              -vid "$VERACODE_API_ID" \
              -vkey "$VERACODE_API_KEY" \
              -action UploadAndScan \
              -appname "$APP_NAME" \
              -createprofile true \
              -autoscan true \
              -sandboxname "bitbucket-release" \
              -createsandbox true \
              -filepath "verascan" \
              -version "Release $BITBUCKET_BUILD_NUMBER"

    # -------------------------------------------------------------------------
    # POLICY SCAN
    # main -> Subir todos los artefactos para evaluacion de politica
    # -------------------------------------------------------------------------
    - step: &policy-scan
        name: Policy Scan (Produccion)
        script:
          - set -e
          - echo "Instalando prerequisitos..."
          - apt-get update && apt-get install -y unzip
          - echo "Descargando Veracode Java API Wrapper..."
          - mkdir -p .veracode
          - VERSION=$(curl -fsS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
          - |
            if [ -z "$VERSION" ]; then
              echo "ERROR: Fallo al obtener la version del API Wrapper"
              exit 1
            fi
          - echo "Descargando version $VERSION"
          - curl -fsSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
          - cd .veracode && unzip -o dist.zip && cd ..
          - JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
          - |
            if [ -z "$JAR_PATH" ]; then
              echo "ERROR: VeracodeJavaAPI.jar no encontrado"
              exit 1
            fi
          - cp "$JAR_PATH" vosp-api-wrapper-java.jar
          - APP_NAME=$(cat app_name.txt)
          - echo "Subiendo a la Plataforma Veracode..."
          - echo "Aplicacion - $APP_NAME"
          - echo "Artefactos a subir:"
          - ls -lh verascan/
          - |
            java -jar vosp-api-wrapper-java.jar \
              -vid "$VERACODE_API_ID" \
              -vkey "$VERACODE_API_KEY" \
              -action UploadAndScan \
              -appname "$APP_NAME" \
              -createprofile true \
              -autoscan true \
              -filepath "verascan" \
              -version "main $BITBUCKET_BUILD_NUMBER"

# =============================================================================
# TRIGGERS DEL PIPELINE
# Mapeo de ramas y eventos
# =============================================================================
pipelines:
  branches:
    main:
      - step: *package
      - parallel:
          - step: *sca-scan
          - step: *policy-scan

    release/*:
      - step: *package
      - parallel:
          - step: *sca-scan
          - step: *sandbox-scan

    feature/*:
      - step: *package
      - parallel:
          - step: *sca-scan
          - step: *pipeline-scan

  pull-requests:
    '**':
      - step: *package
      - parallel:
          - step: *sca-scan
          - step: *pipeline-scan-gate

</script>

<script type="text/yaml" id="card12">
# URL: https://github.com/ancient-cthulhu/pipeline-examples/blob/main/github-actions/english/veracode-scans.yml
name: CI - Veracode

# Veracode Security Scanning for GitHub Actions (Multi-Artifact Support)
#
# Required secrets:
#   - VERACODE_API_ID: Veracode API ID
#   - VERACODE_API_KEY: Veracode API Key
#   - SRCCLR_API_TOKEN: SCA Agent token (optional)
#
# Scan type is auto-detected by branch/event:
#   feature/*  -> Pipeline Scan (no gate) - each artifact individually
#   PR         -> Pipeline Scan (gate on Very High/High) - each artifact individually
#   release/*  -> Sandbox Scan - all artifacts uploaded to folder
#   main       -> Policy Scan - all artifacts uploaded to folder
#
# APP_NAME format: {org}/{repo} (customizable via VERACODE_APP_NAME secret)

on:
  push:
    branches:
      - main
      - 'release/*'
      - 'feature/*'
  pull_request: {}

permissions:
  contents: read

env:
  VERACODE_API_ID: ${{ secrets.VERACODE_API_ID }}
  VERACODE_API_KEY: ${{ secrets.VERACODE_API_KEY }}

jobs:
  # =============================================================================
  # PACKAGE: Build and package artifacts with Veracode CLI
  # =============================================================================
  package:
    name: Package Artifacts
    runs-on: ubuntu-latest
    outputs:
      artifact_count: ${{ steps.list-artifacts.outputs.artifact_count }}
      app_name: ${{ steps.set-app-name.outputs.app_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Veracode App Name
        id: set-app-name
        run: |
          if [ -n "${{ secrets.VERACODE_APP_NAME }}" ]; then
            APP_NAME="${{ secrets.VERACODE_APP_NAME }}"
          else
            APP_NAME="${{ github.repository }}"
          fi
          echo "Veracode Application Profile: $APP_NAME"
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

      - name: Install Veracode CLI
        run: |
          curl -fsS -O https://tools.veracode.com/veracode-cli/install
          chmod +x ./install
          ./install
          ./veracode version

      - name: Run Veracode Autopackager
        run: |
          mkdir -p verascan
          ./veracode package --source . --output verascan --trust
          echo "Packaged artifacts:"
          ls -lhR verascan

      - name: List and Validate Artifacts
        id: list-artifacts
        run: |
          find verascan -type f \( -name "*.war" -o -name "*.jar" -o -name "*.zip" \) > artifact_list.txt
          
          if [ ! -s artifact_list.txt ]; then
            echo "::error::No packaged artifacts found"
            ls -lR verascan
            exit 1
          fi
          
          echo "Artifacts found:"
          cat artifact_list.txt
          
          ARTIFACT_COUNT=$(wc -l < artifact_list.txt)
          echo "Total artifacts: $ARTIFACT_COUNT"
          echo "artifact_count=$ARTIFACT_COUNT" >> $GITHUB_OUTPUT

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verascan
          path: |
            verascan/
            artifact_list.txt

  # =============================================================================
  # SCA: Agent-Based SCA (runs on all branches)
  # =============================================================================
  sca:
    name: Agent-Based SCA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Veracode SCA
        env:
          SRCCLR_API_TOKEN: ${{ secrets.SRCCLR_API_TOKEN }}
        run: |
          curl -sSL https://download.sourceclear.com/ci.sh | bash -s -- scan --recursive --update-advisor || echo "SCA scan completed"

  # =============================================================================
  # FEATURE: feature/* -> Pipeline Scan (no gate, each artifact)
  # =============================================================================
  feature-pipeline-scan:
    name: Pipeline Scan (feature/*)
    needs: package
    if: github.event_name == 'push' && startsWith(github.ref_name, 'feature/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: verascan

      - name: Download Pipeline Scanner
        run: |
          curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          unzip -o pipeline-scan-LATEST.zip
          if [ ! -f "pipeline-scan.jar" ]; then
            echo "::error::Failed to download pipeline-scan.jar"
            exit 1
          fi

      - name: Run Pipeline Scan (all artifacts)
        run: |
          mkdir -p scan_results
          SCAN_COUNT=0
          
          while IFS= read -r artifact; do
            SCAN_COUNT=$((SCAN_COUNT + 1))
            ARTIFACT_NAME=$(basename "$artifact")
            echo ""
            echo "=========================================="
            echo "Scanning [$SCAN_COUNT]: $ARTIFACT_NAME"
            echo "=========================================="
            
            java -jar pipeline-scan.jar \
              -f "$artifact" \
              -vid $VERACODE_API_ID \
              -vkey $VERACODE_API_KEY \
              --fail_on_severity "" \
              --issue_details true \
              -jo true \
              || echo "Pipeline scan completed with findings for $ARTIFACT_NAME"
            
            if [ -f "results.json" ]; then
              mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
              echo "Results saved: scan_results/${ARTIFACT_NAME}_results.json"
            else
              echo "::warning::No results.json produced for $ARTIFACT_NAME (artifact may not be scannable)"
            fi
          done < artifact_list.txt
          
          echo ""
          echo "=========================================="
          echo "Pipeline Scan completed for $SCAN_COUNT artifacts"
          echo "=========================================="

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-scan-results
          path: scan_results/

  # =============================================================================
  # PR: Pull Request -> Pipeline Scan (gate enabled, each artifact)
  # =============================================================================
  pr-pipeline-scan:
    name: Pipeline Scan (PR gate)
    needs: package
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: verascan

      - name: Download Pipeline Scanner
        run: |
          curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          unzip -o pipeline-scan-LATEST.zip
          if [ ! -f "pipeline-scan.jar" ]; then
            echo "::error::Failed to download pipeline-scan.jar"
            exit 1
          fi

      - name: Run Pipeline Scan with Gate (all artifacts)
        run: |
          mkdir -p scan_results
          FAILED=0
          SCAN_COUNT=0
          FAILED_ARTIFACTS=""
          
          while IFS= read -r artifact; do
            SCAN_COUNT=$((SCAN_COUNT + 1))
            ARTIFACT_NAME=$(basename "$artifact")
            echo ""
            echo "=========================================="
            echo "Scanning [$SCAN_COUNT]: $ARTIFACT_NAME"
            echo "=========================================="
            
            if ! java -jar pipeline-scan.jar \
              -f "$artifact" \
              -vid $VERACODE_API_ID \
              -vkey $VERACODE_API_KEY \
              --issue_details true \
              --policy_name "Veracode Recommended Very High" \
              -jo true; then
              FAILED=1
              FAILED_ARTIFACTS="$FAILED_ARTIFACTS $ARTIFACT_NAME"
              echo "::warning::Policy gate failed for: $ARTIFACT_NAME"
            fi
            
            if [ -f "results.json" ]; then
              mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
              echo "Results saved: scan_results/${ARTIFACT_NAME}_results.json"
            else
              echo "::warning::No results.json produced for $ARTIFACT_NAME (artifact may not be scannable)"
            fi
          done < artifact_list.txt
          
          echo ""
          echo "=========================================="
          echo "Pipeline Scan completed for $SCAN_COUNT artifacts"
          if [ $FAILED -eq 1 ]; then
            echo "::error::Policy gate failed for:$FAILED_ARTIFACTS"
          fi
          echo "=========================================="
          
          exit $FAILED

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-scan-gate-results
          path: scan_results/

  # =============================================================================
  # RELEASE: release/* -> Sandbox Upload (all artifacts)
  # =============================================================================
  release-sandbox-scan:
    name: Sandbox Upload (release/*)
    needs: package
    if: github.event_name == 'push' && startsWith(github.ref_name, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: verascan

      - name: List Artifacts for Upload
        run: |
          echo "Artifacts to upload:"
          ls -lh verascan/

      - name: Download Veracode Java API Wrapper
        run: |
          mkdir -p .veracode
          VERSION=$(curl -sS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to get API Wrapper version"
            exit 1
          fi
          echo "Downloading version: $VERSION"
          curl -sSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
          cd .veracode && unzip -o dist.zip && cd ..
          JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
          if [ -z "$JAR_PATH" ]; then
            echo "::error::VeracodeJavaAPI.jar not found"
            exit 1
          fi
          cp "$JAR_PATH" vosp-api-wrapper-java.jar

      - name: Upload to Veracode Sandbox
        run: |
          echo "Uploading artifacts to Veracode Sandbox..."
          java -jar vosp-api-wrapper-java.jar \
            -vid $VERACODE_API_ID \
            -vkey $VERACODE_API_KEY \
            -action UploadAndScan \
            -appname "${{ needs.package.outputs.app_name }}" \
            -createprofile true \
            -autoscan true \
            -sandboxname "github-release" \
            -createsandbox true \
            -filepath "verascan" \
            -version "Release ${{ github.run_number }}"

  # =============================================================================
  # MAIN: main -> Policy Upload (all artifacts)
  # =============================================================================
  main-policy-scan:
    name: Policy Upload (main)
    needs: package
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: verascan

      - name: List Artifacts for Upload
        run: |
          echo "Artifacts to upload:"
          ls -lh verascan/

      - name: Download Veracode Java API Wrapper
        run: |
          mkdir -p .veracode
          VERSION=$(curl -sS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to get API Wrapper version"
            exit 1
          fi
          echo "Downloading version: $VERSION"
          curl -sSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
          cd .veracode && unzip -o dist.zip && cd ..
          JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
          if [ -z "$JAR_PATH" ]; then
            echo "::error::VeracodeJavaAPI.jar not found"
            exit 1
          fi
          cp "$JAR_PATH" vosp-api-wrapper-java.jar

      - name: Upload to Veracode Platform (Policy)
        run: |
          echo "Uploading artifacts to Veracode Platform..."
          java -jar vosp-api-wrapper-java.jar \
            -vid $VERACODE_API_ID \
            -vkey $VERACODE_API_KEY \
            -action UploadAndScan \

<script type="text/yaml" id="card13">
# URL: https://github.com/ancient-cthulhu/pipeline-examples/blob/main/github-actions/spanish/veracode-scans.yml
name: CI - Veracode

# Escaneo de Seguridad Veracode para GitHub Actions (Soporte Multi-Artefacto)
#
# Secrets requeridos:
#   - VERACODE_API_ID: ID de API Veracode
#   - VERACODE_API_KEY: Key de API Veracode
#   - SRCCLR_API_TOKEN: Token de agente SCA (opcional)
#
# El tipo de escaneo se detecta automaticamente por branch/evento:
#   feature/*  -> Pipeline Scan (sin gate) - cada artefacto individualmente
#   PR         -> Pipeline Scan (gate en Very High/High) - cada artefacto individualmente
#   release/*  -> Sandbox Scan - todos los artefactos subidos a carpeta
#   main       -> Policy Scan - todos los artefactos subidos a carpeta
#
# Formato APP_NAME: {org}/{repo} (personalizable via secret VERACODE_APP_NAME)

on:
  push:
    branches:
      - main
      - 'release/*'
      - 'feature/*'
  pull_request: {}

permissions:
  contents: read

env:
  VERACODE_API_ID: ${{ secrets.VERACODE_API_ID }}
  VERACODE_API_KEY: ${{ secrets.VERACODE_API_KEY }}

jobs:
  # =============================================================================
  # EMPAQUETADO: Compilar y empaquetar artefactos con Veracode CLI
  # =============================================================================
  package:
    name: Empaquetar Artefactos
    runs-on: ubuntu-latest
    outputs:
      artifact_count: ${{ steps.list-artifacts.outputs.artifact_count }}
      app_name: ${{ steps.set-app-name.outputs.app_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configurar Nombre de App Veracode
        id: set-app-name
        run: |
          if [ -n "${{ secrets.VERACODE_APP_NAME }}" ]; then
            APP_NAME="${{ secrets.VERACODE_APP_NAME }}"
          else
            APP_NAME="${{ github.repository }}"
          fi
          echo "Perfil de Aplicacion Veracode: $APP_NAME"
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

      - name: Instalar Veracode CLI
        run: |
          curl -fsS -O https://tools.veracode.com/veracode-cli/install
          chmod +x ./install
          ./install
          ./veracode version

      - name: Ejecutar Veracode Autopackager
        run: |
          mkdir -p verascan
          ./veracode package --source . --output verascan --trust
          echo "Artefactos empaquetados:"
          ls -lhR verascan

      - name: Listar y Validar Artefactos
        id: list-artifacts
        run: |
          find verascan -type f \( -name "*.war" -o -name "*.jar" -o -name "*.zip" \) > artifact_list.txt
          
          if [ ! -s artifact_list.txt ]; then
            echo "::error::No se encontraron artefactos empaquetados"
            ls -lR verascan
            exit 1
          fi
          
          echo "Artefactos encontrados:"
          cat artifact_list.txt
          
          ARTIFACT_COUNT=$(wc -l < artifact_list.txt)
          echo "Total de artefactos: $ARTIFACT_COUNT"
          echo "artifact_count=$ARTIFACT_COUNT" >> $GITHUB_OUTPUT

      - name: Subir Artefactos
        uses: actions/upload-artifact@v4
        with:
          name: verascan
          path: |
            verascan/
            artifact_list.txt

  # =============================================================================
  # SCA: Agent-Based SCA (se ejecuta en todos los branches)
  # =============================================================================
  sca:
    name: Agent-Based SCA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ejecutar Veracode SCA
        env:
          SRCCLR_API_TOKEN: ${{ secrets.SRCCLR_API_TOKEN }}
        run: |
          curl -sSL https://download.sourceclear.com/ci.sh | bash -s -- scan --recursive --update-advisor || echo "Escaneo SCA completado"

  # =============================================================================
  # FEATURE: feature/* -> Pipeline Scan (sin gate, cada artefacto)
  # =============================================================================
  feature-pipeline-scan:
    name: Pipeline Scan (feature/*)
    needs: package
    if: github.event_name == 'push' && startsWith(github.ref_name, 'feature/')
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Artefactos
        uses: actions/download-artifact@v4
        with:
          name: verascan

      - name: Descargar Pipeline Scanner
        run: |
          curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          unzip -o pipeline-scan-LATEST.zip
          if [ ! -f "pipeline-scan.jar" ]; then
            echo "::error::No se pudo descargar pipeline-scan.jar"
            exit 1
          fi

      - name: Ejecutar Pipeline Scan (todos los artefactos)
        run: |
          mkdir -p scan_results
          SCAN_COUNT=0
          
          while IFS= read -r artifact; do
            SCAN_COUNT=$((SCAN_COUNT + 1))
            ARTIFACT_NAME=$(basename "$artifact")
            echo ""
            echo "=========================================="
            echo "Escaneando [$SCAN_COUNT]: $ARTIFACT_NAME"
            echo "=========================================="
            
            java -jar pipeline-scan.jar \
              -f "$artifact" \
              -vid $VERACODE_API_ID \
              -vkey $VERACODE_API_KEY \
              --fail_on_severity "" \
              --issue_details true \
              -jo true \
              || echo "Pipeline scan completado con hallazgos para $ARTIFACT_NAME"
            
            # Renombrar archivo de resultados con prefijo del nombre del artefacto
            if [ -f "results.json" ]; then
              mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
              echo "Resultados guardados: scan_results/${ARTIFACT_NAME}_results.json"
            else
              echo "::warning::No se produjo results.json para $ARTIFACT_NAME (el artefacto puede no ser escaneable)"
            fi
          done < artifact_list.txt
          
          echo ""
          echo "=========================================="
          echo "Pipeline Scan completado para $SCAN_COUNT artefactos"
          echo "=========================================="

      - name: Subir Resultados de Escaneo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-scan-results
          path: scan_results/

  # =============================================================================
  # PR: Pull Request -> Pipeline Scan (gate habilitado, cada artefacto)
  # =============================================================================
  pr-pipeline-scan:
    name: Pipeline Scan (PR gate)
    needs: package
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Artefactos
        uses: actions/download-artifact@v4
        with:
          name: verascan

      - name: Descargar Pipeline Scanner
        run: |
          curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          unzip -o pipeline-scan-LATEST.zip
          if [ ! -f "pipeline-scan.jar" ]; then
            echo "::error::No se pudo descargar pipeline-scan.jar"
            exit 1
          fi

      - name: Ejecutar Pipeline Scan con Gate (todos los artefactos)
        run: |
          mkdir -p scan_results
          FAILED=0
          SCAN_COUNT=0
          FAILED_ARTIFACTS=""
          
          while IFS= read -r artifact; do
            SCAN_COUNT=$((SCAN_COUNT + 1))
            ARTIFACT_NAME=$(basename "$artifact")
            echo ""
            echo "=========================================="
            echo "Escaneando [$SCAN_COUNT]: $ARTIFACT_NAME"
            echo "=========================================="
            
            if ! java -jar pipeline-scan.jar \
              -f "$artifact" \
              -vid $VERACODE_API_ID \
              -vkey $VERACODE_API_KEY \
              --issue_details true \
              --policy_name "Veracode Recommended Very High" \
              -jo true; then
              FAILED=1
              FAILED_ARTIFACTS="$FAILED_ARTIFACTS $ARTIFACT_NAME"
              echo "::warning::Policy gate fallido para: $ARTIFACT_NAME"
            fi
            
            # Renombrar archivo de resultados con prefijo del nombre del artefacto
            if [ -f "results.json" ]; then
              mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
              echo "Resultados guardados: scan_results/${ARTIFACT_NAME}_results.json"
            else
              echo "::warning::No se produjo results.json para $ARTIFACT_NAME (el artefacto puede no ser escaneable)"
            fi
          done < artifact_list.txt
          
          echo ""
          echo "=========================================="
          echo "Pipeline Scan completado para $SCAN_COUNT artefactos"
          if [ $FAILED -eq 1 ]; then
            echo "::error::Policy gate fallido para:$FAILED_ARTIFACTS"
          fi
          echo "=========================================="
          
          exit $FAILED

      - name: Subir Resultados de Escaneo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-scan-gate-results
          path: scan_results/

  # =============================================================================
  # RELEASE: release/* -> Sandbox Upload (todos los artefactos)
  # =============================================================================
  release-sandbox-scan:
    name: Sandbox Upload (release/*)
    needs: package
    if: github.event_name == 'push' && startsWith(github.ref_name, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Artefactos
        uses: actions/download-artifact@v4
        with:
          name: verascan

      - name: Listar Artefactos para Upload
        run: |
          echo "Artefactos para upload:"
          ls -lh verascan/

      - name: Descargar Veracode Java API Wrapper
        run: |
          mkdir -p .veracode
          VERSION=$(curl -sS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
          if [ -z "$VERSION" ]; then
            echo "::error::No se pudo obtener la version del API Wrapper"
            exit 1
          fi
          echo "Descargando version: $VERSION"
          curl -sSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
          cd .veracode && unzip -o dist.zip && cd ..
          JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
          if [ -z "$JAR_PATH" ]; then
            echo "::error::No se encontro VeracodeJavaAPI.jar"
            exit 1
          fi
          cp "$JAR_PATH" vosp-api-wrapper-java.jar

      - name: Subir a Veracode Sandbox
        run: |
          echo "Subiendo artefactos a Veracode Sandbox..."
          java -jar vosp-api-wrapper-java.jar \
            -vid $VERACODE_API_ID \
            -vkey $VERACODE_API_KEY \
            -action UploadAndScan \
            -appname "${{ needs.package.outputs.app_name }}" \
            -createprofile true \
            -autoscan true \
            -sandboxname "github-release" \
            -createsandbox true \
            -filepath "verascan" \
            -version "Release ${{ github.run_number }}"

  # =============================================================================
  # MAIN: main -> Policy Upload (todos los artefactos)
  # =============================================================================
  main-policy-scan:
    name: Policy Upload (main)
    needs: package
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Artefactos
        uses: actions/download-artifact@v4
        with:
          name: verascan

      - name: Listar Artefactos para Upload
        run: |
          echo "Artefactos para upload:"
          ls -lh verascan/

      - name: Descargar Veracode Java API Wrapper
        run: |
          mkdir -p .veracode
          VERSION=$(curl -sS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
          if [ -z "$VERSION" ]; then
            echo "::error::No se pudo obtener la version del API Wrapper"
            exit 1
          fi
          echo "Descargando version: $VERSION"
          curl -sSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
          cd .veracode && unzip -o dist.zip && cd ..
          JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
          if [ -z "$JAR_PATH" ]; then
            echo "::error::No se encontro VeracodeJavaAPI.jar"
            exit 1
          fi
          cp "$JAR_PATH" vosp-api-wrapper-java.jar

      - name: Subir a Plataforma Veracode (Policy)
        run: |
          echo "Subiendo artefactos a la Plataforma Veracode..."
          java -jar vosp-api-wrapper-java.jar \
            -vid $VERACODE_API_ID \
            -vkey $VERACODE_API_KEY \
            -action UploadAndScan \
            -appname "${{ needs.package.outputs.app_name }}" \
            -createprofile true \
            -autoscan true \
            -filepath "verascan" \
            -version "main ${{ github.run_number }}"

</script>

<script type="text/yaml" id="card14">
# URL: https://github.com/ancient-cthulhu/pipeline-examples/blob/main/gitlab/english/.gitlab-ci.yml
# =============================================================================
# CI - Veracode (GitLab CI/CD)
#
# Veracode Security Scanning for GitLab (Multi-Artifact Support)
#
# Required CI/CD variables (Settings > CI/CD > Variables, masked + protected):
#   - VERACODE_API_ID    : Veracode API ID
#   - VERACODE_API_KEY   : Veracode API Key
#   - SRCCLR_API_TOKEN   : SCA Agent token (optional)
#   - VERACODE_APP_NAME  : Override default app profile name (optional)
#
# Scan type is auto-detected by branch / pipeline source:
#   feature/*  -> Pipeline Scan (no gate) - each artifact individually
#   MR         -> Pipeline Scan (gate on Very High/High) - each artifact
#   release/*  -> Sandbox Scan - all artifacts uploaded to folder
#   main       -> Policy Scan - all artifacts uploaded to folder
#
# APP_NAME format: {namespace}/{project} (customizable via VERACODE_APP_NAME)
# =============================================================================

stages:
  - package
  - sca
  - scan

# Avoid double pipelines (branch + MR) on the same push.
# When an MR is open for a feature branch, only the MR pipeline runs.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
    - if: $CI_COMMIT_BRANCH =~ /^feature\/.*/

variables:
  # Pin the Java image used by Pipeline Scan and the API Wrapper
  JAVA_IMAGE: "eclipse-temurin:17-jdk"
  # Where the autopackager writes artifacts
  VERASCAN_DIR: "verascan"

# -----------------------------------------------------------------------------
# Reusable script blocks (YAML anchors)
# -----------------------------------------------------------------------------
.set_app_name: &set_app_name |
  if [ -n "$VERACODE_APP_NAME" ]; then
    APP_NAME="$VERACODE_APP_NAME"
  else
    APP_NAME="${CI_PROJECT_PATH}"
  fi
  echo "Veracode Application Profile: $APP_NAME"
  echo "APP_NAME=$APP_NAME" > app_name.env

.download_pipeline_scanner: &download_pipeline_scanner |
  apt-get update -qq && apt-get install -y -qq curl unzip ca-certificates >/dev/null
  curl -fsSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
  unzip -o pipeline-scan-LATEST.zip
  if [ ! -f "pipeline-scan.jar" ]; then
    echo "ERROR: Failed to download pipeline-scan.jar" >&2
    exit 1
  fi

.download_api_wrapper: &download_api_wrapper |
  apt-get update -qq && apt-get install -y -qq curl unzip ca-certificates grep >/dev/null
  mkdir -p .veracode
  VERSION=$(curl -fsS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
  if [ -z "$VERSION" ]; then
    echo "ERROR: Failed to get API Wrapper version" >&2
    exit 1
  fi
  echo "Downloading Veracode Java API Wrapper version: $VERSION"
  curl -fsSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
  cd .veracode && unzip -o dist.zip && cd ..
  JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
  if [ -z "$JAR_PATH" ]; then
    echo "ERROR: VeracodeJavaAPI.jar not found" >&2
    exit 1
  fi
  cp "$JAR_PATH" vosp-api-wrapper-java.jar

# =============================================================================
# PACKAGE: Build and package artifacts with Veracode CLI
# =============================================================================
package:
  stage: package
  image: ubuntu:22.04
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
    - if: $CI_COMMIT_BRANCH =~ /^feature\/.*/
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq curl unzip ca-certificates findutils >/dev/null
  script:
    - *set_app_name
    - |
      echo "Installing Veracode CLI..."
      curl -fsS -O https://tools.veracode.com/veracode-cli/install
      chmod +x ./install
      ./install
      ./veracode version
    - |
      echo "Running Veracode Autopackager..."
      mkdir -p "$VERASCAN_DIR"
      ./veracode package --source . --output "$VERASCAN_DIR" --trust
      echo "Packaged artifacts:"
      ls -lhR "$VERASCAN_DIR"
    - |
      echo "Listing and validating artifacts..."
      find "$VERASCAN_DIR" -type f \( -name "*.war" -o -name "*.jar" -o -name "*.zip" \) > artifact_list.txt
      if [ ! -s artifact_list.txt ]; then
        echo "ERROR: No packaged artifacts found" >&2
        ls -lR "$VERASCAN_DIR"
        exit 1
      fi
      echo "Artifacts found:"
      cat artifact_list.txt
      ARTIFACT_COUNT=$(wc -l < artifact_list.txt)
      echo "Total artifacts: $ARTIFACT_COUNT"
      echo "ARTIFACT_COUNT=$ARTIFACT_COUNT" >> app_name.env
  artifacts:
    name: "verascan-$CI_COMMIT_SHORT_SHA"
    paths:
      - verascan/
      - artifact_list.txt
    reports:
      dotenv: app_name.env
    expire_in: 1 week
    when: on_success

# =============================================================================
# SCA: Agent-Based SCA (runs on all branches/MRs)
# =============================================================================
sca:
  stage: sca
  image: eclipse-temurin:17-jdk
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
    - if: $CI_COMMIT_BRANCH =~ /^feature\/.*/
  needs: []
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq curl ca-certificates git >/dev/null
  script:
    - |
      if [ -z "$SRCCLR_API_TOKEN" ]; then
        echo "WARNING: SRCCLR_API_TOKEN not set; skipping SCA scan."
        exit 0
      fi
      curl -sSL https://sca-downloads.veracode.com/ci.sh | bash -s -- scan --recursive --update-advisor || echo "SCA scan completed"
  allow_failure: true

# =============================================================================
# FEATURE: feature/* -> Pipeline Scan (no gate, each artifact)
# =============================================================================
feature-pipeline-scan:
  stage: scan
  image: $JAVA_IMAGE
  needs:
    - job: package
      artifacts: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^feature\/.*/
  script:
    - *download_pipeline_scanner
    - |
      mkdir -p scan_results
      SCAN_COUNT=0
      while IFS= read -r artifact; do
        SCAN_COUNT=$((SCAN_COUNT + 1))
        ARTIFACT_NAME=$(basename "$artifact")
        echo ""
        echo "=========================================="
        echo "Scanning [$SCAN_COUNT]: $ARTIFACT_NAME"
        echo "=========================================="
        java -jar pipeline-scan.jar \
          -f "$artifact" \
          -vid "$VERACODE_API_ID" \
          -vkey "$VERACODE_API_KEY" \
          --fail_on_severity "" \
          --issue_details true \
          -jo true \
          || echo "Pipeline scan completed with findings for $ARTIFACT_NAME"
        if [ -f "results.json" ]; then
          mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
          echo "Results saved: scan_results/${ARTIFACT_NAME}_results.json"
        else
          echo "WARNING: No results.json produced for $ARTIFACT_NAME (artifact may not be scannable)"
        fi
      done < artifact_list.txt
      echo ""
      echo "=========================================="
      echo "Pipeline Scan completed for $SCAN_COUNT artifacts"
      echo "=========================================="
  artifacts:
    name: "pipeline-scan-results-$CI_COMMIT_SHORT_SHA"
    paths:
      - scan_results/
    when: always
    expire_in: 1 month

# =============================================================================
# MR: Merge Request -> Pipeline Scan (gate enabled, each artifact)
# Forks are excluded: MR pipelines from forks run in the source project
# unless explicitly run from the parent project; this rule keeps the gate
# limited to the parent project.
# =============================================================================
mr-pipeline-scan:
  stage: scan
  image: $JAVA_IMAGE
  needs:
    - job: package
      artifacts: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID == $CI_MERGE_REQUEST_PROJECT_ID
  script:
    - *download_pipeline_scanner
    - |
      mkdir -p scan_results
      FAILED=0
      SCAN_COUNT=0
      FAILED_ARTIFACTS=""
      while IFS= read -r artifact; do
        SCAN_COUNT=$((SCAN_COUNT + 1))
        ARTIFACT_NAME=$(basename "$artifact")
        echo ""
        echo "=========================================="
        echo "Scanning [$SCAN_COUNT]: $ARTIFACT_NAME"
        echo "=========================================="
        if ! java -jar pipeline-scan.jar \
          -f "$artifact" \
          -vid "$VERACODE_API_ID" \
          -vkey "$VERACODE_API_KEY" \
          --issue_details true \
          --policy_name "Veracode Recommended Very High" \
          -jo true; then
          FAILED=1
          FAILED_ARTIFACTS="$FAILED_ARTIFACTS $ARTIFACT_NAME"
          echo "WARNING: Policy gate failed for: $ARTIFACT_NAME"
        fi
        if [ -f "results.json" ]; then
          mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
          echo "Results saved: scan_results/${ARTIFACT_NAME}_results.json"
        else
          echo "WARNING: No results.json produced for $ARTIFACT_NAME (artifact may not be scannable)"
        fi
      done < artifact_list.txt
      echo ""
      echo "=========================================="
      echo "Pipeline Scan completed for $SCAN_COUNT artifacts"
      if [ $FAILED -eq 1 ]; then
        echo "ERROR: Policy gate failed for:$FAILED_ARTIFACTS" >&2
      fi
      echo "=========================================="
      exit $FAILED
  artifacts:
    name: "pipeline-scan-gate-results-$CI_COMMIT_SHORT_SHA"
    paths:
      - scan_results/
    when: always
    expire_in: 1 month

# =============================================================================
# RELEASE: release/* -> Sandbox Upload (all artifacts)
# =============================================================================
release-sandbox-scan:
  stage: scan
  image: $JAVA_IMAGE
  needs:
    - job: package
      artifacts: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^release\/.*/
  script:
    - |
      echo "Artifacts to upload:"
      ls -lh "$VERASCAN_DIR"/
    - *download_api_wrapper
    - |
      echo "Uploading artifacts to Veracode Sandbox..."
      java -jar vosp-api-wrapper-java.jar \
        -vid "$VERACODE_API_ID" \
        -vkey "$VERACODE_API_KEY" \
        -action UploadAndScan \
        -appname "$APP_NAME" \
        -createprofile true \
        -autoscan true \
        -sandboxname "gitlab-release" \
        -createsandbox true \
        -filepath "$VERASCAN_DIR" \
        -version "Release ${CI_PIPELINE_IID}"

# =============================================================================
# MAIN: main -> Policy Upload (all artifacts)
# =============================================================================
main-policy-scan:
  stage: scan
  image: $JAVA_IMAGE
  needs:
    - job: package
      artifacts: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"
  script:
    - |
      echo "Artifacts to upload:"
      ls -lh "$VERASCAN_DIR"/
    - *download_api_wrapper
    - |
      echo "Uploading artifacts to Veracode Platform..."
      java -jar vosp-api-wrapper-java.jar \
        -vid "$VERACODE_API_ID" \
        -vkey "$VERACODE_API_KEY" \
        -action UploadAndScan \
        -appname "$APP_NAME" \
        -createprofile true \
        -autoscan true \
        -filepath "$VERASCAN_DIR" \
        -version "main ${CI_PIPELINE_IID}"
</script>

<script type="text/yaml" id="card15">
# URL: https://github.com/ancient-cthulhu/pipeline-examples/blob/main/gitlab/spanish/.gitlab-ci.yml
# =============================================================================
# CI - Veracode (GitLab CI/CD)
#
# Escaneo de Seguridad Veracode para GitLab (Soporte Multi-Artefacto)
#
# Variables CI/CD requeridas (Settings > CI/CD > Variables, masked + protected):
#   - VERACODE_API_ID    : ID de API de Veracode
#   - VERACODE_API_KEY   : Clave de API de Veracode
#   - SRCCLR_API_TOKEN   : Token del agente SCA (opcional)
#   - VERACODE_APP_NAME  : Sobrescribe el nombre de perfil de aplicacion (opcional)
#
# El tipo de escaneo se detecta automaticamente segun rama / origen del pipeline:
#   feature/*  -> Pipeline Scan (sin gate) - cada artefacto individualmente
#   MR         -> Pipeline Scan (gate en Very High/High) - cada artefacto
#   release/*  -> Sandbox Scan - todos los artefactos subidos a la carpeta
#   main       -> Policy Scan - todos los artefactos subidos a la carpeta
#
# Formato APP_NAME: {namespace}/{project} (personalizable via VERACODE_APP_NAME)
# =============================================================================

stages:
  - package
  - sca
  - scan

# Evitar pipelines duplicados (rama + MR) en el mismo push.
# Cuando hay un MR abierto para una rama feature, solo corre el pipeline del MR.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
    - if: $CI_COMMIT_BRANCH =~ /^feature\/.*/

variables:
  # Imagen Java fijada para Pipeline Scan y el API Wrapper
  JAVA_IMAGE: "eclipse-temurin:17-jdk"
  # Directorio donde el autopackager escribe los artefactos
  VERASCAN_DIR: "verascan"

# -----------------------------------------------------------------------------
# Bloques de script reutilizables (anclas YAML)
# -----------------------------------------------------------------------------
.set_app_name: &set_app_name |
  if [ -n "$VERACODE_APP_NAME" ]; then
    APP_NAME="$VERACODE_APP_NAME"
  else
    APP_NAME="${CI_PROJECT_PATH}"
  fi
  echo "Perfil de Aplicacion Veracode: $APP_NAME"
  echo "APP_NAME=$APP_NAME" > app_name.env

.download_pipeline_scanner: &download_pipeline_scanner |
  apt-get update -qq && apt-get install -y -qq curl unzip ca-certificates >/dev/null
  curl -fsSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
  unzip -o pipeline-scan-LATEST.zip
  if [ ! -f "pipeline-scan.jar" ]; then
    echo "ERROR: Fallo la descarga de pipeline-scan.jar" >&2
    exit 1
  fi

.download_api_wrapper: &download_api_wrapper |
  apt-get update -qq && apt-get install -y -qq curl unzip ca-certificates grep >/dev/null
  mkdir -p .veracode
  VERSION=$(curl -fsS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
  if [ -z "$VERSION" ]; then
    echo "ERROR: Fallo al obtener la version del API Wrapper" >&2
    exit 1
  fi
  echo "Descargando version del Veracode Java API Wrapper: $VERSION"
  curl -fsSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
  cd .veracode && unzip -o dist.zip && cd ..
  JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
  if [ -z "$JAR_PATH" ]; then
    echo "ERROR: VeracodeJavaAPI.jar no encontrado" >&2
    exit 1
  fi
  cp "$JAR_PATH" vosp-api-wrapper-java.jar

# =============================================================================
# PACKAGE: Compilar y empaquetar artefactos con Veracode CLI
# =============================================================================
package:
  stage: package
  image: ubuntu:22.04
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
    - if: $CI_COMMIT_BRANCH =~ /^feature\/.*/
  before_script:

  script:
    - *set_app_name
    - |
      echo "Instalando Veracode CLI..."
      curl -fsS -O https://tools.veracode.com/veracode-cli/install
      chmod +x ./install
      ./install
      ./veracode version
    - |
      echo "Ejecutando Veracode Autopackager..."
      mkdir -p "$VERASCAN_DIR"
      ./veracode package --source . --output "$VERASCAN_DIR" --trust
      echo "Artefactos empaquetados:"
      ls -lhR "$VERASCAN_DIR"
    - |
      echo "Listando y validando artefactos..."
      find "$VERASCAN_DIR" -type f \( -name "*.war" -o -name "*.jar" -o -name "*.zip" \) > artifact_list.txt
      if [ ! -s artifact_list.txt ]; then

      fi
      echo "Artefactos encontrados:"
      cat artifact_list.txt
      ARTIFACT_COUNT=$(wc -l < artifact_list.txt)
      echo "Total de artefactos: $ARTIFACT_COUNT"
      echo "ARTIFACT_COUNT=$ARTIFACT_COUNT" >> app_name.env
  artifacts:
    name: "verascan-$CI_COMMIT_SHORT_SHA"
    paths:
      - verascan/
      - artifact_list.txt
    reports:
      dotenv: app_name.env
    expire_in: 1 week
    when: on_success

# =============================================================================
# SCA: SCA Basado en Agente (corre en todas las ramas/MRs)
# =============================================================================
sca:
  stage: sca
  image: eclipse-temurin:17-jdk
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

  needs: []

# =============================================================================
# FEATURE: feature/* -> Pipeline Scan (sin gate, cada artefacto)
# =============================================================================
feature-pipeline-scan:
  stage: scan
  image: $JAVA_IMAGE
  needs:
    - job: package
      artifacts: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^feature\/.*/
  script:
    - *download_pipeline_scanner
    - |
      mkdir -p scan_results
      SCAN_COUNT=0
      while IFS= read -r artifact; do
        SCAN_COUNT=$((SCAN_COUNT + 1))
        ARTIFACT_NAME=$(basename "$artifact")
        echo ""
        echo "=========================================="
        echo "Escaneando [$SCAN_COUNT]: $ARTIFACT_NAME"
        echo "=========================================="
        java -jar pipeline-scan.jar \
          -f "$artifact" \
          -vid "$VERACODE_API_ID" \
          -vkey "$VERACODE_API_KEY" \
          --fail_on_severity "" \
          --issue_details true \
          -jo true \
          || echo "Pipeline scan completado con hallazgos para $ARTIFACT_NAME"
        if [ -f "results.json" ]; then
          mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
          echo "Resultados guardados: scan_results/${ARTIFACT_NAME}_results.json"
        else
          echo "ADVERTENCIA: No se produjo results.json para $ARTIFACT_NAME (el artefacto puede no ser escaneable)"
        fi
      done < artifact_list.txt
      echo ""
      echo "=========================================="
      echo "Pipeline Scan completado para $SCAN_COUNT artefactos"
      echo "=========================================="
  artifacts:
    name: "pipeline-scan-results-$CI_COMMIT_SHORT_SHA"
    paths:
      - scan_results/
    when: always
    expire_in: 1 month

# =============================================================================
# MR: Merge Request -> Pipeline Scan (gate habilitado, cada artefacto)
# Forks excluidos: los pipelines de MR desde forks corren en el proyecto
# de origen a menos que se ejecuten explicitamente desde el proyecto padre;
# esta regla limita el gate al proyecto padre.
# =============================================================================
mr-pipeline-scan:
  stage: scan
  image: $JAVA_IMAGE
  needs:
    - job: package
      artifacts: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID == $CI_MERGE_REQUEST_PROJECT_ID
  script:
    - *download_pipeline_scanner
    - |
      mkdir -p scan_results
      FAILED=0
      SCAN_COUNT=0
      FAILED_ARTIFACTS=""
      while IFS= read -r artifact; do
        SCAN_COUNT=$((SCAN_COUNT + 1))

          -vkey "$VERACODE_API_KEY" \
          --issue_details true \
          --policy_name "Veracode Recommended Very High" \
          -jo true; then
          FAILED=1
          FAILED_ARTIFACTS="$FAILED_ARTIFACTS $ARTIFACT_NAME"
          echo "ADVERTENCIA: Gate de politica fallo para: $ARTIFACT_NAME"
        fi
        if [ -f "results.json" ]; then
          mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
          echo "Resultados guardados: scan_results/${ARTIFACT_NAME}_results.json"
        else
          echo "ADVERTENCIA: No se produjo results.json para $ARTIFACT_NAME (el artefacto puede no ser escaneable)"
        fi
      done < artifact_list.txt
      echo ""
      echo "=========================================="
      echo "Pipeline Scan completado para $SCAN_COUNT artefactos"
      if [ $FAILED -eq 1 ]; then
        echo "ERROR: Gate de politica fallo para:$FAILED_ARTIFACTS" >&2
      fi
      echo "=========================================="
      exit $FAILED
  artifacts:
    name: "pipeline-scan-gate-results-$CI_COMMIT_SHORT_SHA"
    paths:
      - scan_results/
    when: always
    expire_in: 1 month

# =============================================================================
# RELEASE: release/* -> Subida a Sandbox (todos los artefactos)
# =============================================================================
release-sandbox-scan:
  stage: scan
  image: $JAVA_IMAGE
  needs:
    - job: package

        -sandboxname "gitlab-release" \
        -createsandbox true \
        -filepath "$VERASCAN_DIR" \
        -version "Release ${CI_PIPELINE_IID}"

# =============================================================================
# MAIN: main -> Subida a Politica (todos los artefactos)
# =============================================================================
main-policy-scan:
  stage: scan
  image: $JAVA_IMAGE
  needs:
    - job: package
      artifacts: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"
  script:

      echo "Artefactos a subir:"

    - |
